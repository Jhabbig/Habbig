services:
  redis:
    image: redis:7-alpine
    command: redis-server --requirepass "${REDIS_PASSWORD:?Set REDIS_PASSWORD env var}"
    expose:
      - "6379"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:?Set REDIS_PASSWORD env var}", "ping"]
      interval: 10s
      retries: 3

  gateway:
    build: ./gateway
    ports:
      - "127.0.0.1:7000:7000"
    env_file: ./gateway/.env
    volumes:
      - gateway-data:/app/data
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
      crypto:
        condition: service_healthy
      stock:
        condition: service_healthy
      midterm:
        condition: service_healthy
      top-traders:
        condition: service_healthy
      weather:
        condition: service_healthy
      sports:
        condition: service_healthy
      world:
        condition: service_healthy
      climate:
        condition: service_healthy
      centralbank:
        condition: service_healthy
      whales:
        condition: service_healthy

  crypto:
    build: ./crypto-dashboard
    expose:
      - "8000"
    env_file: ./crypto-dashboard/.env
    volumes:
      - crypto-data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 10s
      timeout: 5s
      retries: 3

  stock:
    build: ./stock-dashboard
    expose:
      - "8050"
    env_file: ./gateway/.env.production
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8050/"]
      interval: 10s
      timeout: 5s
      retries: 3

  midterm:
    build: ./midterm-dashboard
    expose:
      - "8051"
    env_file: ./gateway/.env.production
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8051/"]
      interval: 10s
      timeout: 5s
      retries: 3

  top-traders:
    build: ./top-traders-dashboard
    expose:
      - "8052"
    env_file: ./gateway/.env.production
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8052/"]
      interval: 10s
      timeout: 5s
      retries: 3

  weather:
    build: ./polymarket_weather_dashboard
    expose:
      - "5050"
    env_file: ./gateway/.env.production
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5050/"]
      interval: 10s
      timeout: 5s
      retries: 3

  sports:
    build: ./sports-dashboard
    expose:
      - "8888"
    env_file: ./sports-dashboard/.env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8888/"]
      interval: 10s
      timeout: 5s
      retries: 3

  world:
    build: ./world-state-dashboard
    expose:
      - "7050"
    env_file: ./gateway/.env.production
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7050/"]
      interval: 10s
      timeout: 5s
      retries: 3

  climate:
    build: ./climate-dashboard
    expose:
      - "7052"
    env_file: ./gateway/.env.production
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:7052/api/health',timeout=4).status==200 else 1)"]
      interval: 10s
      timeout: 5s
      retries: 3

  centralbank:
    build: ./centralbank-dashboard
    expose:
      - "7060"
    env_file: ./gateway/.env.production
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7060/healthz"]
      interval: 10s
      timeout: 5s
      retries: 3

  whales:
    build: ./whale-tracker-dashboard
    expose:
      - "8053"
    env_file: ./gateway/.env.production
    volumes:
      - whales-data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8053/healthz',timeout=4).status==200 else 1)"]
      interval: 15s
      timeout: 5s
      retries: 3

volumes:
  gateway-data:
  crypto-data:
  whales-data:
