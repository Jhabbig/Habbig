services:
  redis:
    image: redis:7-alpine
    command: redis-server --requirepass "${REDIS_PASSWORD:-changeme}"
    expose:
      - "6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-changeme}", "ping"]
      interval: 10s
      retries: 3

  gateway:
    build: ./gateway
    ports:
      - "127.0.0.1:7000:7000"
    env_file: ./gateway/.env
    volumes:
      - gateway-data:/app/data
    depends_on:
      redis:
        condition: service_healthy
      crypto:
        condition: service_started
      stock:
        condition: service_started
      midterm:
        condition: service_started
      top-traders:
        condition: service_started
      weather:
        condition: service_started
      sports:
        condition: service_started
      world:
        condition: service_started

  crypto:
    build: ./crypto-dashboard
    expose:
      - "8000"
    env_file: ./crypto-dashboard/.env
    volumes:
      - crypto-data:/app/data

  stock:
    build: ./stock-dashboard
    expose:
      - "8050"

  midterm:
    build: ./midterm-dashboard
    expose:
      - "8051"

  top-traders:
    build: ./top-traders-dashboard
    expose:
      - "8052"

  weather:
    build: ./polymarket_weather_dashboard
    expose:
      - "5050"

  sports:
    build: ./sports-dashboard
    expose:
      - "8888"
    env_file: ./sports-dashboard/.env

  world:
    build: ./world-state-dashboard
    expose:
      - "7050"

volumes:
  gateway-data:
  crypto-data:
