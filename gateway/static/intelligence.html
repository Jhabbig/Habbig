<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Intelligence — narve.ai</title>
  <link rel="stylesheet" href="{{ static: gateway.css }}">
  <link rel="preload" href="/_gateway_static/fonts/Inter-Variable-subset.woff2" as="font" type="font/woff2" crossorigin>
  <style>
    body { display: flex; min-height: 100vh; }
    .intel-shell { display: grid; grid-template-columns: 260px 1fr; width: 100%; min-height: 100vh; background: var(--bg-base); }
    .intel-sidebar { background: var(--bg-surface); border-right: 1px solid var(--border-default); padding: 24px 16px; display: flex; flex-direction: column; gap: 16px; }
    .intel-sidebar-header { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
    .intel-sidebar-title { font-size: 14px; font-weight: 600; color: var(--text-primary); }
    .intel-new-btn { background: var(--text-primary); color: var(--interactive-text); border: 1px solid var(--text-primary); border-radius: 6px; padding: 7px 12px; font-size: 12px; font-weight: 500; cursor: pointer; font-family: inherit; }
    .intel-new-btn:hover { background: var(--interactive-hover); }
    .intel-section-label { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-tertiary); margin: 14px 0 6px; }
    .intel-conv-list { display: flex; flex-direction: column; gap: 2px; overflow-y: auto; flex: 1; }
    .intel-conv-item { padding: 8px 10px; font-size: 12px; color: var(--text-secondary); border-radius: 6px; cursor: pointer; text-overflow: ellipsis; overflow: hidden; white-space: nowrap; }
    .intel-conv-item:hover { background: var(--bg-raised); color: var(--text-primary); }
    .intel-conv-item.active { background: var(--bg-raised); color: var(--text-primary); }
    .intel-back { font-size: 12px; color: var(--text-tertiary); text-decoration: none; margin-top: auto; }
    .intel-back:hover { color: var(--text-secondary); }

    .intel-main { display: flex; flex-direction: column; min-height: 100vh; }
    .intel-header { padding: 24px 32px 0; }
    .intel-title { font-family: var(--font-display); font-size: 28px; font-weight: 500; letter-spacing: -0.02em; margin: 0; color: var(--text-primary); }
    .intel-sub { font-size: 13px; color: var(--text-secondary); margin: 4px 0 0; }

    .intel-messages { flex: 1; overflow-y: auto; padding: 32px; max-width: 820px; width: 100%; margin: 0 auto; }
    .msg { margin-bottom: 28px; }
    .msg-role { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-tertiary); margin-bottom: 8px; }
    .msg-content { font-size: 15px; line-height: 1.7; color: var(--text-primary); white-space: pre-wrap; word-wrap: break-word; }
    .msg.user .msg-content { color: var(--text-primary); }
    .msg.assistant .msg-content { color: var(--text-secondary); }

    .empty-state { max-width: 560px; margin: 80px auto; text-align: center; }
    .empty-state h2 { font-family: var(--font-display); font-size: 24px; font-weight: 500; color: var(--text-primary); margin: 0 0 8px; }
    .empty-state p { font-size: 13px; color: var(--text-secondary); margin: 0 0 28px; }
    .suggested { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .suggested-btn { background: var(--bg-surface); border: 1px solid var(--border-default); border-radius: 8px; padding: 14px 16px; font-size: 13px; color: var(--text-secondary); text-align: left; cursor: pointer; font-family: inherit; transition: all 0.15s; }
    .suggested-btn:hover { color: var(--text-primary); border-color: var(--text-primary); }

    .intel-input-bar { border-top: 1px solid var(--border-default); padding: 16px 32px 24px; background: var(--bg-base); }
    .intel-input-shell { max-width: 820px; margin: 0 auto; display: flex; gap: 10px; align-items: flex-end; }
    .intel-input-shell textarea { flex: 1; padding: 14px 16px; background: var(--bg-surface); color: var(--text-primary); border: 1px solid var(--border-default); border-radius: 10px; font-family: inherit; font-size: 14px; resize: none; min-height: 52px; max-height: 200px; }
    .intel-input-shell textarea:focus { outline: none; border-color: var(--text-primary); }
    .intel-send { background: var(--text-primary); color: var(--interactive-text); border: 1px solid var(--text-primary); border-radius: 10px; padding: 14px 22px; font-size: 14px; font-weight: 500; cursor: pointer; font-family: inherit; }
    .intel-send:disabled { opacity: 0.5; cursor: wait; }

    .upgrade-card { max-width: 540px; margin: 100px auto; padding: 32px; background: var(--bg-surface); border: 1px solid var(--border-default); border-radius: 12px; text-align: center; }
    .upgrade-card h2 { font-family: var(--font-display); font-size: 22px; font-weight: 500; margin: 0 0 8px; color: var(--text-primary); }
    .upgrade-card p { font-size: 13px; color: var(--text-secondary); margin: 0 0 20px; }
  </style>
<script>(function(){try{var m=document.cookie.match(/narve-theme=([^;]*)/)||document.cookie.match(/betyc-theme=([^;]*)/);var t=(m&&m[1])||localStorage.getItem("narve-theme")||localStorage.getItem("betyc-theme")||"light";document.documentElement.setAttribute("data-theme",t);}catch(e){document.documentElement.setAttribute("data-theme","light");}})();</script>
  <link rel="icon" type="image/png" href="/_gateway_static/img/logo.png">
  <link rel="apple-touch-icon" href="/_gateway_static/img/logo.png">
</head>
<body>
  <div class="intel-shell">
    <aside class="intel-sidebar">
      <div class="intel-sidebar-header">
        <div class="intel-sidebar-title">Intelligence</div>
        <button class="intel-new-btn" onclick="newConversation()">+ New</button>
      </div>
      <div class="intel-section-label">Conversations</div>
      <div class="intel-conv-list" id="conv-list"></div>
      <a href="/dashboards" class="intel-back">← Back to dashboards</a>
    </aside>

    <main class="intel-main">
      <div class="intel-header">
        <h1 class="intel-title">Intelligence</h1>
        <p class="intel-sub">Ask anything about predictions, sources, or markets.</p>
      </div>

      <div class="intel-messages" id="messages">
        <div class="empty-state" id="empty-state">
          <h2>What do you want to know?</h2>
          <p>Ask about any prediction, source, or market — I have access to everything on the platform.</p>
          <div class="suggested">
            <button class="suggested-btn" onclick="sendSuggested(this)">What are today's highest-EV bets?</button>
            <button class="suggested-btn" onclick="sendSuggested(this)">Which sources have the best track record in crypto?</button>
            <button class="suggested-btn" onclick="sendSuggested(this)">Tell me about my Signal Search topics</button>
            <button class="suggested-btn" onclick="sendSuggested(this)">Which sources should I trust for politics?</button>
            <button class="suggested-btn" onclick="sendSuggested(this)">Show me the most active market right now</button>
            <button class="suggested-btn" onclick="sendSuggested(this)">Compare Narve probability vs market odds across all best bets</button>
          </div>
        </div>
      </div>

      <div class="intel-input-bar">
        <div class="intel-input-shell">
          <textarea id="msg-input" placeholder="Ask about any prediction, source, or market..." rows="1" onkeydown="handleKey(event)"></textarea>
          <button class="intel-send" id="send-btn" onclick="sendMessage()">Send</button>
        </div>
      </div>
    </main>
  </div>

<script>
var _csrfToken = (document.cookie.match(/(?:^|;\s*)_csrf=([^;]*)/) || [])[1] || '';
var _conversationId = null;
var _streaming = false;

function escapeHtml(s) {
  return String(s == null ? '' : s).replace(/[&<>"']/g, function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];});
}

function loadConversations() {
  fetch('/api/intelligence/conversations').then(function(r){return r.json();}).then(function(data) {
    var list = document.getElementById('conv-list');
    list.innerHTML = '';
    (data.conversations || []).forEach(function(c) {
      var el = document.createElement('div');
      el.className = 'intel-conv-item' + (c.id === _conversationId ? ' active' : '');
      el.textContent = c.title || 'Untitled';
      el.onclick = function(){ openConversation(c.id); };
      list.appendChild(el);
    });
  });
}

function newConversation() {
  fetch('/api/intelligence/conversations', {
    method: 'POST',
    headers: {'Content-Type': 'application/json', 'x-csrf-token': _csrfToken},
    body: '{}'
  }).then(function(r){return r.json();}).then(function(d) {
    _conversationId = d.conversation_id;
    document.getElementById('messages').innerHTML = '<div class="empty-state"><h2>What do you want to know?</h2></div>';
    loadConversations();
  });
}

function openConversation(id) {
  _conversationId = id;
  fetch('/api/intelligence/conversations/' + id).then(function(r){return r.json();}).then(function(d) {
    var msgs = document.getElementById('messages');
    msgs.innerHTML = '';
    (d.messages || []).forEach(function(m) { renderMessage(m.role, m.content); });
    loadConversations();
    msgs.scrollTop = msgs.scrollHeight;
  });
}

function renderMessage(role, content) {
  var msgs = document.getElementById('messages');
  var empty = document.getElementById('empty-state');
  if (empty) empty.remove();
  var el = document.createElement('div');
  el.className = 'msg ' + role;
  el.innerHTML = '<div class="msg-role">' + (role === 'user' ? 'You' : 'Intelligence') + '</div>' +
                 '<div class="msg-content"></div>';
  el.querySelector('.msg-content').textContent = content;
  msgs.appendChild(el);
  msgs.scrollTop = msgs.scrollHeight;
  return el.querySelector('.msg-content');
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
}

function sendSuggested(btn) {
  document.getElementById('msg-input').value = btn.textContent;
  sendMessage();
}

async function sendMessage() {
  if (_streaming) return;
  var input = document.getElementById('msg-input');
  var text = input.value.trim();
  if (!text) return;
  if (!_conversationId) {
    var resp = await fetch('/api/intelligence/conversations', {
      method: 'POST',
      headers: {'Content-Type': 'application/json', 'x-csrf-token': _csrfToken},
      body: '{}'
    });
    var d = await resp.json();
    _conversationId = d.conversation_id;
  }
  renderMessage('user', text);
  input.value = '';
  var assistantEl = renderMessage('assistant', '');
  _streaming = true;
  document.getElementById('send-btn').disabled = true;
  try {
    var r = await fetch('/api/intelligence/conversations/' + _conversationId + '/message', {
      method: 'POST',
      headers: {'Content-Type': 'application/json', 'x-csrf-token': _csrfToken},
      body: JSON.stringify({message: text})
    });
    if (!r.ok) {
      assistantEl.textContent = 'Error: ' + await r.text();
    } else if (r.body && r.headers.get('content-type') && r.headers.get('content-type').indexOf('text/event-stream') !== -1) {
      var reader = r.body.getReader();
      var decoder = new TextDecoder();
      var buffer = '';
      while (true) {
        var chunk = await reader.read();
        if (chunk.done) break;
        buffer += decoder.decode(chunk.value, {stream: true});
        var lines = buffer.split('\n');
        buffer = lines.pop();
        lines.forEach(function(line) {
          if (line.indexOf('data: ') === 0) {
            try {
              var msg = JSON.parse(line.slice(6));
              if (msg.text) {
                assistantEl.textContent += msg.text;
                document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight;
              }
            } catch (e) {}
          }
        });
      }
    } else {
      var json = await r.json();
      assistantEl.textContent = json.response || '';
    }
  } catch (err) {
    assistantEl.textContent = 'Error: ' + err.message;
  } finally {
    _streaming = false;
    document.getElementById('send-btn').disabled = false;
    loadConversations();
  }
}

loadConversations();
</script>
<script src="/_gateway_static/theme.js?v=2" defer></script>
</body>
</html>
