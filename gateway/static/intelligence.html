<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Intelligence — narve.ai</title>
  <meta name="description" content="Ask narve.ai's intelligence layer.">
  <meta name="robots" content="noindex, nofollow">
  <link rel="stylesheet" href="{{ static: gateway.css }}">
  <link rel="preload" href="/_gateway_static/fonts/Inter-Variable-subset.woff2" as="font" type="font/woff2" crossorigin>
  <link rel="stylesheet" href="{{ static: pages/intelligence.css }}">
<script>(function(){try{var m=document.cookie.match(/narve-theme=([^;]*)/)||document.cookie.match(/betyc-theme=([^;]*)/);var t=(m&&m[1])||localStorage.getItem("narve-theme")||localStorage.getItem("betyc-theme")||"light";document.documentElement.setAttribute("data-theme",t);}catch(e){document.documentElement.setAttribute("data-theme","light");}})();</script>
  <link rel="icon" type="image/png" href="/_gateway_static/img/logo.png">
  <link rel="apple-touch-icon" href="/_gateway_static/img/logo.png">
</head>
<body>
  <div class="intel-shell">
    <aside class="intel-sidebar">
      <div class="intel-sidebar-header">
        <div class="intel-sidebar-title">Intelligence</div>
        <button class="intel-new-btn" onclick="newConversation()">+ New</button>
      </div>
      <div class="intel-section-label">Conversations</div>
      <div class="intel-conv-list" id="conv-list"></div>
      <a href="/dashboards" class="intel-back">← Back to dashboards</a>
    </aside>

    <main class="intel-main">
      <div class="intel-header">
        <h1 class="intel-title">Intelligence</h1>
        <p class="intel-sub">Ask anything about predictions, sources, or markets.</p>
      </div>

      <div class="intel-messages" id="messages">
        <div class="empty-state" id="empty-state">
          <h2>What do you want to know?</h2>
          <p>Ask about any prediction, source, or market — I have access to everything on the platform.</p>
          <div class="suggested">
            <button class="suggested-btn" onclick="sendSuggested(this)">What are today's highest-EV bets?</button>
            <button class="suggested-btn" onclick="sendSuggested(this)">Which sources have the best track record in crypto?</button>
            <button class="suggested-btn" onclick="sendSuggested(this)">Tell me about my Signal Search topics</button>
            <button class="suggested-btn" onclick="sendSuggested(this)">Which sources should I trust for politics?</button>
            <button class="suggested-btn" onclick="sendSuggested(this)">Show me the most active market right now</button>
            <button class="suggested-btn" onclick="sendSuggested(this)">Compare Narve probability vs market odds across all best bets</button>
          </div>
        </div>
      </div>

      <div class="intel-input-bar">
        <div class="intel-input-shell">
          <textarea id="msg-input" placeholder="Ask about any prediction, source, or market..." rows="1" onkeydown="handleKey(event)"></textarea>
          <button class="intel-send" id="send-btn" onclick="sendMessage()">Send</button>
        </div>
      </div>
    </main>
  </div>

<script>
var _csrfToken = (document.cookie.match(/(?:^|;\s*)_csrf=([^;]*)/) || [])[1] || '';
var _conversationId = null;
var _streaming = false;

function escapeHtml(s) {
  return String(s == null ? '' : s).replace(/[&<>"']/g, function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];});
}

function loadConversations() {
  fetch('/api/intelligence/conversations').then(function(r){return r.json();}).then(function(data) {
    var list = document.getElementById('conv-list');
    list.innerHTML = '';
    (data.conversations || []).forEach(function(c) {
      var el = document.createElement('div');
      el.className = 'intel-conv-item' + (c.id === _conversationId ? ' active' : '');
      el.textContent = c.title || 'Untitled';
      el.onclick = function(){ openConversation(c.id); };
      list.appendChild(el);
    });
  });
}

function newConversation() {
  fetch('/api/intelligence/conversations', {
    method: 'POST',
    headers: {'Content-Type': 'application/json', 'x-csrf-token': _csrfToken},
    body: '{}'
  }).then(function(r){return r.json();}).then(function(d) {
    _conversationId = d.conversation_id;
    document.getElementById('messages').innerHTML = '<div class="empty-state"><h2>What do you want to know?</h2></div>';
    loadConversations();
  });
}

function openConversation(id) {
  _conversationId = id;
  fetch('/api/intelligence/conversations/' + id).then(function(r){return r.json();}).then(function(d) {
    var msgs = document.getElementById('messages');
    msgs.innerHTML = '';
    (d.messages || []).forEach(function(m) { renderMessage(m.role, m.content); });
    loadConversations();
    msgs.scrollTop = msgs.scrollHeight;
  });
}

function renderMessage(role, content) {
  var msgs = document.getElementById('messages');
  var empty = document.getElementById('empty-state');
  if (empty) empty.remove();
  var el = document.createElement('div');
  el.className = 'msg ' + role;
  el.innerHTML = '<div class="msg-role">' + (role === 'user' ? 'You' : 'Intelligence') + '</div>' +
                 '<div class="msg-content"></div>';
  el.querySelector('.msg-content').textContent = content;
  msgs.appendChild(el);
  msgs.scrollTop = msgs.scrollHeight;
  return el.querySelector('.msg-content');
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
}

function sendSuggested(btn) {
  document.getElementById('msg-input').value = btn.textContent;
  sendMessage();
}

async function sendMessage() {
  if (_streaming) return;
  var input = document.getElementById('msg-input');
  var text = input.value.trim();
  if (!text) return;
  if (!_conversationId) {
    var resp = await fetch('/api/intelligence/conversations', {
      method: 'POST',
      headers: {'Content-Type': 'application/json', 'x-csrf-token': _csrfToken},
      body: '{}'
    });
    var d = await resp.json();
    _conversationId = d.conversation_id;
  }
  renderMessage('user', text);
  input.value = '';
  var assistantEl = renderMessage('assistant', '');
  _streaming = true;
  document.getElementById('send-btn').disabled = true;
  try {
    var r = await fetch('/api/intelligence/conversations/' + _conversationId + '/message', {
      method: 'POST',
      headers: {'Content-Type': 'application/json', 'x-csrf-token': _csrfToken},
      body: JSON.stringify({message: text})
    });
    if (!r.ok) {
      assistantEl.textContent = 'Error: ' + await r.text();
    } else if (r.body && r.headers.get('content-type') && r.headers.get('content-type').indexOf('text/event-stream') !== -1) {
      var reader = r.body.getReader();
      var decoder = new TextDecoder();
      var buffer = '';
      while (true) {
        var chunk = await reader.read();
        if (chunk.done) break;
        buffer += decoder.decode(chunk.value, {stream: true});
        var lines = buffer.split('\n');
        buffer = lines.pop();
        lines.forEach(function(line) {
          if (line.indexOf('data: ') === 0) {
            try {
              var msg = JSON.parse(line.slice(6));
              if (msg.text) {
                assistantEl.textContent += msg.text;
                document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight;
              }
            } catch (e) {}
          }
        });
      }
    } else {
      var json = await r.json();
      assistantEl.textContent = json.response || '';
    }
  } catch (err) {
    assistantEl.textContent = 'Error: ' + err.message;
  } finally {
    _streaming = false;
    document.getElementById('send-btn').disabled = false;
    loadConversations();
  }
}

loadConversations();
</script>
<script src="/_gateway_static/theme.js?v=2" defer></script>
</body>
</html>
