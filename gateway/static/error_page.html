<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <title>{{ title }} · narve.ai</title>
  <meta name="description" content="Something went wrong. Our team has been notified.">
  <meta name="robots" content="noindex, nofollow">
  <meta name="robots" content="noindex">
  <!-- Standalone page — inline CSS so it renders even when the SW has
       evicted gateway.css. Monochrome per design system. No stack
       traces, no implementation detail. The only machine-readable
       piece is the request id, which support quotes. -->
  <link rel="stylesheet" href="{{ static: components.css }}">
  <link rel="stylesheet" href="{{ static: pages/error_page.css }}">
</head>
<body>
  <main>
    <p class="err-status">Error · {{ status }}</p>
    <h1 class="err-title">{{ title }}</h1>
    <p class="err-message">{{ message }}</p>
    {{ retry_line }}
    {{ extra_line }}
    <div class="err-actions">{{ actions }}</div>
    <p class="err-meta">Request ID: <code>{{ request_id }}</code></p>
    <p class="err-support">Quote this ID to <a href="mailto:support@narve.ai">support@narve.ai</a> if this keeps happening.</p>
  </main>
  <script src="/_gateway_static/js/cmdk.js" defer></script>
</body>
</html>
