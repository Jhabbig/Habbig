<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Enter Invite Token — narve.ai</title>
  <meta name="description" content="Redeem your narve.ai invite.">
  <link rel="stylesheet" href="{{ static: gateway.css }}">
  <link rel="preload" href="/_gateway_static/fonts/Inter-Variable-subset.woff2" as="font" type="font/woff2" crossorigin>
  <link rel="stylesheet" href="{{ static: scroll-animations.css }}">
  <link rel="stylesheet" href="{{ static: pages/invite.css }}">
<script>(function(){try{var m=document.cookie.match(/narve-theme=([^;]*)/)||document.cookie.match(/betyc-theme=([^;]*)/);var t=(m&&m[1])||localStorage.getItem("narve-theme")||localStorage.getItem("betyc-theme")||"light";document.documentElement.setAttribute("data-theme",t);}catch(e){document.documentElement.setAttribute("data-theme","light");}})();</script>
  <link rel="icon" type="image/png" href="/_gateway_static/img/logo.png">
  <link rel="apple-touch-icon" href="/_gateway_static/img/logo.png">
</head>
<body class="auth-body">
  <div class="auth-wrap">
    <a href="/" class="auth-brand">
      <img src="/_gateway_static/img/logo.png" alt="narve.ai" style="width:24px;height:24px;filter:invert(1);border-radius:4px">
      <span>narve.ai</span>
    </a>

    <div class="auth-card reveal-scale" style="text-align: center;">
      <div class="gate-icon">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M15.75 5.25a3 3 0 013 3m3 0a6 6 0 01-7.029 5.912c-.563-.097-1.159.026-1.563.43L10.5 17.25H8.25v2.25H6v2.25H2.25v-2.818c0-.597.237-1.17.659-1.591l6.499-6.499c.404-.404.527-1 .43-1.563A6 6 0 1121.75 8.25z"/></svg>
      </div>
      <div class="auth-title">Enter your invite token</div>
      <div class="auth-sub">You need a valid invite token to create or access your account.</div>

      <form class="auth-form" method="post" action="/invite">
        {{ raw_csrf_field }}
        <label for="token">Invite Token</label>
        <input id="token" type="text" name="token" required autofocus class="token-input"
               placeholder="Paste your invite token">

        <button type="submit" class="auth-submit">Continue →</button>
      </form>

      <div class="auth-error">{{ error }}</div>
    </div>

    <div class="auth-reassure">
      No token? Contact the admin for an invite.<br>
      <a href="/token" style="color:var(--text-primary)">Already have an account? Sign in directly</a>
    </div>
  </div>
<script src="/_gateway_static/scroll-animations.js" defer></script>
<script src="/_gateway_static/theme.js?v=2" defer></script>
</body>
</html>
