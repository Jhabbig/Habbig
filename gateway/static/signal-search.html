<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Signal Search — narve.ai</title>
  <meta name="description" content="Cross-source signal search on narve.ai.">
  <meta name="robots" content="noindex, nofollow">
  <link rel="stylesheet" href="{{ static: gateway.css }}">
  <link rel="stylesheet" href="{{ static: components.css }}">
  <link rel="preload" href="/_gateway_static/fonts/Inter-Variable-subset.woff2" as="font" type="font/woff2" crossorigin>
  <link rel="stylesheet" href="{{ static: pages/signal-search.css }}">
<script>(function(){try{var m=document.cookie.match(/narve-theme=([^;]*)/)||document.cookie.match(/betyc-theme=([^;]*)/);var t=(m&&m[1])||localStorage.getItem("narve-theme")||localStorage.getItem("betyc-theme")||"light";document.documentElement.setAttribute("data-theme",t);}catch(e){document.documentElement.setAttribute("data-theme","light");}})();</script>
  <link rel="icon" type="image/png" href="/_gateway_static/img/logo.png">
  <link rel="apple-touch-icon" href="/_gateway_static/img/logo.png">
</head>
<body>
  <div class="app-shell">

    {{ raw_sidebar }}

    <main class="main-content" id="main" tabindex="-1" role="main">
    <div class="ss-container">

      <header class="ss-hero">
        <h1 class="ss-hero__title">Signal Search</h1>
        <p class="ss-hero__subtitle">Save topics, auto-pull X posts, extract predictions with AI analysis.</p>
      </header>

      <div class="ss-searchbar" role="search">
        <input class="ss-searchbar__input"
               id="ss-search-input"
               type="search"
               placeholder="Search saved signals, sources, predictions…"
               aria-label="Search signals">
        <button class="ss-add-btn" onclick="openModal()" type="button">+ Add Topic</button>
      </div>

      <div class="ss-grid">

        <section class="ss-feed" aria-label="Signal results">
          <div id="topics-container" class="ss-topics">
            <div class="ss-empty" id="empty-state">
              <div class="ss-empty__title">No signals yet</div>
              <p class="ss-empty__body">Add your first topic and we'll start surfacing predictions worth reading.</p>
            </div>
          </div>
        </section>

        <aside class="ss-filters">
          <details>
            <summary>Filters</summary>
            <h3 class="ss-filters__title">Refine</h3>

            <div class="ss-filters__group">
              <label class="ss-filters__label" for="ss-filter-source">Source</label>
              <select class="ss-filters__select" id="ss-filter-source">
                <option value="">All sources</option>
                <option value="x">X / Twitter</option>
              </select>
            </div>

            <div class="ss-filters__group">
              <label class="ss-filters__label" for="ss-filter-confidence">Confidence</label>
              <select class="ss-filters__select" id="ss-filter-confidence">
                <option value="">Any</option>
                <option value="high">High</option>
                <option value="medium">Medium</option>
                <option value="low">Low</option>
              </select>
            </div>

            <div class="ss-filters__group">
              <label class="ss-filters__label">Signal</label>
              <label class="ss-filters__check"><input type="checkbox" value="bullish"> Bullish</label>
              <label class="ss-filters__check"><input type="checkbox" value="bearish"> Bearish</label>
              <label class="ss-filters__check"><input type="checkbox" value="mixed"> Mixed</label>
            </div>
          </details>
        </aside>

      </div>

      {{ raw_admin_x_token_panel }}

    </div>
    </main>

  </div>

  <!-- Add Topic Modal -->
  <div class="ss-modal-overlay" id="add-modal" onclick="if(event.target===this)closeModal()">
    <div class="ss-modal">
      <div class="ss-modal-title">Add Topic</div>
      <label for="topic-name">Topic name</label>
      <input type="text" id="topic-name" placeholder="e.g. US Elections 2026">
      <label for="topic-keywords">Keywords (comma separated)</label>
      <input type="text" id="topic-keywords" placeholder="e.g. election, senate, congress">
      <label for="topic-schedule">Auto-pull schedule</label>
      <select id="topic-schedule">
        <option value="60">Every hour</option>
        <option value="30">Every 30 minutes</option>
        <option value="360">Every 6 hours</option>
        <option value="1440">Daily</option>
      </select>
      <div class="ss-modal-actions">
        <button class="ss-modal-cancel" onclick="closeModal()">Cancel</button>
        <button class="ss-modal-save" onclick="saveTopic()">Save Topic</button>
      </div>
    </div>
  </div>

{{ raw_sitemap }}
<script src="/_gateway_static/skeletons.js" defer></script>
<script>
function openModal() { document.getElementById('add-modal').classList.add('open'); }
function closeModal() { document.getElementById('add-modal').classList.remove('open'); }

function saveTopic() {
  var name = document.getElementById('topic-name').value.trim();
  var kw = document.getElementById('topic-keywords').value.trim();
  var schedule = parseInt(document.getElementById('topic-schedule').value);
  if (!name || !kw) { alert('Name and keywords required'); return; }
  var keywords = kw.split(',').map(function(k) { return k.trim(); }).filter(Boolean);
  fetch('/api/topics', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ name: name, keywords: keywords, schedule_minutes: schedule })
  }).then(function(r) { return r.json(); }).then(function(data) {
    if (data.error) { alert(data.error); return; }
    closeModal();
    loadTopics();
  });
}

function deleteTopic(id) {
  if (!confirm('Delete this topic and all its data?')) return;
  fetch('/api/topics/' + id, { method: 'DELETE' })
    .then(function() { loadTopics(); });
}

function pullTopic(id) {
  fetch('/api/topics/' + id + '/pull', { method: 'POST' })
    .then(function(r) { return r.json(); })
    .then(function() { loadTopics(); });
}

function toggleAnalysis(el) {
  var body = el.nextElementSibling;
  body.classList.toggle('open');
  el.textContent = body.classList.contains('open') ? 'Hide AI analysis' : 'Show AI analysis';
}

// Build a topic card using DOM APIs only. textContent escapes everything,
// so attacker-controlled topic names / keywords cannot inject script.
function buildTopicCard(t) {
  var card = document.createElement('article');
  card.className = 'ss-result ss-topic';

  var head = document.createElement('div');
  head.className = 'ss-result__head ss-topic-head';
  var name = document.createElement('h2');
  name.className = 'ss-result__title ss-topic-name';
  name.textContent = t.name;
  head.appendChild(name);

  var actions = document.createElement('div');
  actions.className = 'ss-result__actions ss-topic-actions';
  var pullBtn = document.createElement('button');
  pullBtn.className = 'ss-pull';
  pullBtn.textContent = 'Pull now';
  pullBtn.addEventListener('click', function() { pullTopic(t.id); });
  var delBtn = document.createElement('button');
  delBtn.className = 'ss-delete';
  delBtn.textContent = 'Delete';
  delBtn.addEventListener('click', function() { deleteTopic(t.id); });
  actions.appendChild(pullBtn);
  actions.appendChild(delBtn);
  head.appendChild(actions);
  card.appendChild(head);

  var meta = document.createElement('div');
  meta.className = 'ss-result__meta ss-topic-meta';
  var ago = t.last_pulled_at
    ? Math.round((Date.now() / 1000 - t.last_pulled_at) / 60) + ' min ago'
    : 'Never';
  var srcSpan = document.createElement('span');
  srcSpan.textContent = '@x.com';
  var ageSpan = document.createElement('span');
  ageSpan.textContent = 'Pulled ' + ago;
  var kwSpan = document.createElement('span');
  kwSpan.textContent = 'Keywords: ' + (Array.isArray(t.keywords) ? t.keywords.join(', ') : '');
  meta.appendChild(srcSpan);
  meta.appendChild(ageSpan);
  meta.appendChild(kwSpan);
  card.appendChild(meta);

  // Chips: confidence + EV — Inter sans per spec.
  var chips = document.createElement('div');
  chips.className = 'ss-chips';
  var posts = (t.posts_found_total | 0);
  var preds = (t.predictions_extracted_total | 0);
  function chip(label, value) {
    var c = document.createElement('span');
    c.className = 'ss-chip';
    var l = document.createElement('span'); l.className = 'ss-chip__label'; l.textContent = label;
    var v = document.createElement('span'); v.className = 'ss-chip__value'; v.textContent = value;
    c.appendChild(l); c.appendChild(v);
    return c;
  }
  chips.appendChild(chip('Posts', String(posts)));
  chips.appendChild(chip('Predictions', String(preds)));
  card.appendChild(chips);

  var analysis = document.createElement('div');
  analysis.className = 'ss-result__analysis ss-analysis';
  var toggle = document.createElement('span');
  toggle.className = 'ss-result__analysis-toggle ss-analysis-toggle';
  toggle.textContent = 'Show AI analysis';
  toggle.addEventListener('click', function() { toggleAnalysis(toggle); });
  var body = document.createElement('div');
  body.className = 'ss-result__analysis-body ss-analysis-body';
  body.id = 'analysis-' + (t.id | 0);
  body.textContent = 'Loading...';
  analysis.appendChild(toggle);
  analysis.appendChild(body);
  card.appendChild(analysis);

  return card;
}

function loadTopics() {
  var container = document.getElementById('topics-container');
  // Use narveSkel for the loading state per spec.
  if (window.narveSkel && window.narveSkel.show) {
    window.narveSkel.show('topics-container', 'detail-panel', 3);
  }
  fetch('/api/topics').then(function(r) { return r.json(); }).then(function(data) {
    var empty = document.getElementById('empty-state');
    if (empty && empty.parentNode !== container) {
      // empty-state was wiped by skeleton render; reconstruct.
      empty = null;
    }
    while (container.firstChild) container.removeChild(container.firstChild);
    if (!data.topics || data.topics.length === 0) {
      // Rebuild the empty-state node — it may have been removed by the
      // skeleton render replacing innerHTML.
      var es = document.createElement('div');
      es.className = 'ss-empty';
      es.id = 'empty-state';
      var t = document.createElement('div');
      t.className = 'ss-empty__title';
      t.textContent = 'No signals yet';
      var b = document.createElement('p');
      b.className = 'ss-empty__body';
      b.textContent = "Add your first topic and we'll start surfacing predictions worth reading.";
      es.appendChild(t);
      es.appendChild(b);
      container.appendChild(es);
      return;
    }
    data.topics.forEach(function(t) {
      container.appendChild(buildTopicCard(t));
    });
  }).catch(function() {
    if (window.narveSkel && window.narveSkel.error) {
      window.narveSkel.error('topics-container', "Couldn't load signals.", loadTopics);
    }
  });
}

loadTopics();
</script>
<script src="/_gateway_static/theme.js?v=2" defer></script>
  <script src="/_gateway_static/js/cmdk.js" defer></script>
  <script src="/_gateway_static/js/share_menu.js" defer></script>
</body>
</html>
