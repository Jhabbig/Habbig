<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ username }}'s predictions · narve.ai</title>
  <meta name="description" content="Public prediction history for {{ username }} on narve.ai — accuracy, Brier score, and history.">
  <link rel="stylesheet" href="{{ static: gateway.css }}">
  <link rel="preload" href="/_gateway_static/fonts/Inter-Variable-subset.woff2" as="font" type="font/woff2" crossorigin>
  <link rel="icon" type="image/png" href="/_gateway_static/img/logo.png">
  <meta property="og:type" content="profile">
  <meta property="og:title" content="{{ username }}'s predictions · narve.ai">
  <meta name="twitter:card" content="summary">
  <link rel="stylesheet" href="{{ static: pages/user_prediction_profile.css }}">
</head>
<body>
  <main class="wrap" id="main">
    <h1>{{ username }}</h1>
    <div class="sub">Public prediction history on narve.ai</div>

    <div class="stat-grid">{{ raw_summary_cards }}</div>
    <h2>Predictions</h2>
    <div class="adm-list">{{ raw_prediction_rows }}</div>
  </main>
</body>
</html>
