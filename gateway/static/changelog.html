<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Changelog — narve.ai</title>
  <meta name="description" content="Product updates, new features, and recent releases on narve.ai. Subscribe via RSS or email for weekly digests.">
  <link rel="canonical" href="https://narve.ai/changelog">
  <link rel="stylesheet" href="{{ static: gateway.css }}">
  <link rel="stylesheet" href="{{ static: components.css }}">
  <link rel="preload" href="/_gateway_static/fonts/Inter-Variable-subset.woff2" as="font" type="font/woff2" crossorigin>
  <link rel="icon" type="image/png" href="/_gateway_static/img/logo.png">

  <!-- Feed discovery — readers like NetNewsWire / Feedly auto-detect this. -->
  <link rel="alternate" type="application/rss+xml" title="narve.ai changelog" href="/changelog.rss">

  <meta property="og:type" content="website">
  <meta property="og:title" content="Changelog · narve.ai">
  <meta property="og:description" content="Product updates and recent releases on narve.ai. RSS available.">
  <meta property="og:url" content="https://narve.ai/changelog">
  <meta property="og:site_name" content="narve.ai">
  <meta property="og:image" content="https://narve.ai/og/default">
  <meta name="twitter:card" content="summary_large_image">

  <script type="application/ld+json">
  {"@context":"https://schema.org","@type":"CollectionPage","name":"narve.ai Changelog","url":"https://narve.ai/changelog","about":{"@type":"SoftwareApplication","name":"narve.ai","applicationCategory":"FinanceApplication","operatingSystem":"Web","url":"https://narve.ai"}}
  </script>

  <link rel="stylesheet" href="{{ static: pages/changelog.css }}">
</head>
<body>
  <div class="cl-subscribe-bar" data-cl-subscribe>
    <div class="cl-subscribe-bar__inner">
      <span class="cl-subscribe-bar__label">Subscribe to updates</span>
      <div class="cl-subscribe-bar__actions">
        <a class="cl-subscribe-bar__btn cl-subscribe-bar__btn--ghost" href="/changelog.rss" rel="alternate" type="application/rss+xml">RSS feed</a>
        <button type="button" class="cl-subscribe-bar__btn cl-subscribe-bar__btn--primary" data-cl-email-toggle aria-expanded="false" aria-controls="cl-email-form">Email digest</button>
      </div>
    </div>
    <form id="cl-email-form" class="cl-subscribe-bar__form" hidden action="/api/newsletter" method="post">
      {{ raw_csrf_field }}
      <input type="hidden" name="source" value="changelog-page">
      <input type="hidden" name="list" value="changelog-digest">
      <label for="cl-email-input" class="cl-subscribe-bar__form-label">Weekly digest, no marketing — opt out one-click.</label>
      <div class="cl-subscribe-bar__form-row">
        <input id="cl-email-input" type="email" name="email" required autocomplete="email" placeholder="you@work.example" class="cl-subscribe-bar__input">
        <button type="submit" class="cl-subscribe-bar__btn cl-subscribe-bar__btn--primary">Subscribe</button>
      </div>
    </form>
  </div>

  <main class="cl-wrap" id="main">
    <a class="cl-backlink" href="/">&larr; narve.ai</a>
    <header class="cl-page-head">
      <h1 class="cl-page-title">Changelog</h1>
      <p class="cl-page-tagline">What's shipped on narve.ai. Updated every deploy.</p>
    </header>

    <div class="cl-stack">
      {{ raw_changelog_html }}
    </div>

    <p class="cl-footnote">Older history lives in the repo commit log. For technical release notes, see <a class="cl-inline" href="/methodology">methodology</a>.</p>

    <nav class="cl-footer-nav" aria-label="Footer navigation">
      <a href="/about">About</a>
      <a href="/how-it-works">How it works</a>
      <a href="/methodology">Methodology</a>
      <a href="/faq">FAQ</a>
      <a href="/team">Team</a>
      <a href="/press">Press</a>
      <a href="/pricing">Pricing</a>
    </nav>
  </main>

  <script>
    // Minimal vanilla DOM — no external JS. Toggles the email-digest form
    // beneath the sticky subscribe bar, and applies a "shrunk" state on
    // scroll so the bar gets out of the way once the user has scrolled in.
    (function () {
      var bar = document.querySelector("[data-cl-subscribe]");
      if (!bar) return;
      var toggle = bar.querySelector("[data-cl-email-toggle]");
      var form = bar.querySelector("#cl-email-form");
      if (toggle && form) {
        toggle.addEventListener("click", function () {
          var open = form.hasAttribute("hidden");
          if (open) {
            form.removeAttribute("hidden");
            toggle.setAttribute("aria-expanded", "true");
            var input = form.querySelector("input[type=email]");
            if (input) input.focus();
          } else {
            form.setAttribute("hidden", "");
            toggle.setAttribute("aria-expanded", "false");
          }
        });
      }
      var shrunk = false;
      function onScroll() {
        var y = window.scrollY || document.documentElement.scrollTop || 0;
        var want = y > 120;
        if (want !== shrunk) {
          shrunk = want;
          bar.classList.toggle("cl-subscribe-bar--shrunk", shrunk);
        }
      }
      window.addEventListener("scroll", onScroll, { passive: true });
      onScroll();
    })();
  </script>
  <script src="/_gateway_static/js/cmdk.js" defer></script>
  <script src="/_gateway_static/js/share_menu.js" defer></script>
</body>
</html>
