<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Your Referrals — narve.ai</title>
  <meta name="description" content="Refer friends to narve.ai.">
  <meta name="robots" content="noindex, nofollow">
  <link rel="stylesheet" href="{{ static: gateway.css }}">
  <link rel="stylesheet" href="{{ static: components.css }}">
  <link rel="preload" href="/_gateway_static/fonts/Inter-Variable-subset.woff2" as="font" type="font/woff2" crossorigin>
  <script>(function(){try{var m=document.cookie.match(/narve-theme=([^;]*)/)||document.cookie.match(/betyc-theme=([^;]*)/);var t=(m&&m[1])||localStorage.getItem("narve-theme")||localStorage.getItem("betyc-theme")||"light";document.documentElement.setAttribute("data-theme",t);}catch(e){document.documentElement.setAttribute("data-theme","light");}})();</script>
  <link rel="stylesheet" href="{{ static: pages/referrals.css }}">
</head>
<body>
  <main class="ref-main">
    
    {{ raw_breadcrumb }}
    <div class="ref-crumb">
      <a href="/settings">Settings</a> · Referrals
    </div>
    <h1 class="ref-h1">Your referrals</h1>
    <p class="ref-sub">
      Invite other serious traders to narve.ai. Every converted referral earns
      you free months — invisible to the outside, rewarding when it lands.
    </p>

    <div class="ref-card">
      <div class="ref-label">Your invite link</div>
      <div class="ref-link-row">
        <input id="ref-link" class="ref-link-input" readonly value="Loading…">
        <button id="ref-copy" class="ref-copy-btn" type="button">Copy link</button>
      </div>
    </div>

    <div class="ref-card">
      <div class="ref-label">Rewards</div>
      <ul id="ref-rewards" class="ref-rewards-list">
        <li class="ref-empty">Loading…</li>
      </ul>
    </div>

    <div class="ref-card">
      <div class="ref-label">Progress to next reward</div>
      <div class="ref-progress-wrap">
        <div class="ref-progress-bar"><div id="ref-progress-fill" class="ref-progress-fill" style="width:0%"></div></div>
        <div id="ref-progress-text" class="ref-progress-text">—</div>
      </div>
    </div>

    <div class="ref-card">
      <div class="ref-label">People you've invited</div>
      <div id="ref-invitees">
        <div class="ref-empty">Loading…</div>
      </div>
    </div>
  </main>
  <script src="/_gateway_static/referrals.js?v=1"></script>
  <script src="/_gateway_static/js/cmdk.js" defer></script>
  <script src="/_gateway_static/js/share_menu.js" defer></script>
</body>
</html>
