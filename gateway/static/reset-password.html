<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Set new password — narve.ai</title>
  <meta name="description" content="Set a new password for your narve.ai account.">
  <meta name="robots" content="noindex, nofollow">
  <link rel="stylesheet" href="{{ static: gateway.css }}">
  <link rel="stylesheet" href="{{ static: components.css }}">
  <link rel="preload" href="/_gateway_static/fonts/Inter-Variable-subset.woff2" as="font" type="font/woff2" crossorigin>
  <link rel="stylesheet" href="{{ static: pages/reset-password.css }}">
<script>(function(){try{var m=document.cookie.match(/narve-theme=([^;]*)/)||document.cookie.match(/betyc-theme=([^;]*)/);var t=(m&&m[1])||localStorage.getItem("narve-theme")||localStorage.getItem("betyc-theme")||"light";document.documentElement.setAttribute("data-theme",t);}catch(e){document.documentElement.setAttribute("data-theme","light");}})();</script>
  <link rel="icon" type="image/png" href="/_gateway_static/img/logo.png">
  <link rel="apple-touch-icon" href="/_gateway_static/img/logo.png">
</head>
<body class="auth-body">
  <div class="auth-wrap">
    <a href="/" class="auth-brand">
      <img src="/_gateway_static/img/logo.png" alt="narve.ai" class="brand-logo" width="24" height="24">
      <span>narve.ai</span>
    </a>

    <div class="auth-card">
      <div class="auth-icon">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="1.5">
          <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 5.25a3 3 0 0 1 3 3m3 0a6 6 0 0 1-7.029 5.912c-.563-.097-1.159.026-1.563.43L10.5 17.25H8.25v2.25H6v2.25H2.25v-2.818c0-.597.237-1.17.659-1.591l6.499-6.499c.404-.404.527-1 .43-1.563A6 6 0 1 1 21.75 8.25Z"/>
        </svg>
      </div>
      <div class="auth-title">Set a new password</div>
      <div class="auth-sub">Choose a strong password for your account.</div>

      {{ raw_success }}

      <form class="auth-form" method="post" action="/reset-password" id="reset-form" onsubmit="return handleSubmit(event)">
        {{ raw_csrf_field }}
        <input type="hidden" name="token" value="{{ token }}">

        <div>
          <label for="new_password">New password</label>
          <input id="new_password" type="password" name="new_password" required autocomplete="new-password" autofocus minlength="12">
          <div class="req-list" id="pw-reqs">
            <div class="req-item" id="req-length">
              <span class="req-icon"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"/></svg></span>
              At least 12 characters
            </div>
            <div class="req-item" id="req-upper">
              <span class="req-icon"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"/></svg></span>
              One uppercase letter
            </div>
            <div class="req-item" id="req-lower">
              <span class="req-icon"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"/></svg></span>
              One lowercase letter
            </div>
            <div class="req-item" id="req-number">
              <span class="req-icon"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"/></svg></span>
              One number
            </div>
            <div class="req-item" id="req-special">
              <span class="req-icon"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"/></svg></span>
              One special character
            </div>
          </div>
        </div>

        <div>
          <label for="confirm_password">Confirm password</label>
          <input id="confirm_password" type="password" name="confirm_password" required autocomplete="new-password">
          <div class="field-hint" id="confirm-hint"></div>
        </div>

        <button type="submit" class="auth-submit" id="submit-btn">Reset password</button>
      </form>

      <div class="auth-error" id="form-error">{{ error }}</div>

      <div class="auth-footer">
        <a href="/login">Back to sign in</a>
      </div>
    </div>
  </div>

<script>
(function() {
  var pw = document.getElementById('new_password');
  var confirm = document.getElementById('confirm_password');
  var reqs = document.getElementById('pw-reqs');
  var confirmHint = document.getElementById('confirm-hint');

  function setReq(id, met) {
    var el = document.getElementById(id);
    if (met) el.classList.add('met');
    else el.classList.remove('met');
  }

  function allMet() {
    var v = pw.value;
    return v.length >= 12 && /[A-Z]/.test(v) && /[a-z]/.test(v) && /[0-9]/.test(v) && /[^A-Za-z0-9]/.test(v);
  }

  // Password: show checklist on focus, update on input
  pw.addEventListener('focus', function() { reqs.classList.add('visible'); });
  pw.addEventListener('input', function() {
    var v = this.value;
    setReq('req-length', v.length >= 12);
    setReq('req-upper', /[A-Z]/.test(v));
    setReq('req-lower', /[a-z]/.test(v));
    setReq('req-number', /[0-9]/.test(v));
    setReq('req-special', /[^A-Za-z0-9]/.test(v));

    this.classList.remove('field-valid', 'field-invalid');
    if (v.length > 0 && allMet()) this.classList.add('field-valid');

    // Re-validate confirm if it has content
    if (confirm.value.length > 0) checkConfirm();
  });
  pw.addEventListener('blur', function() {
    var v = this.value;
    if (v.length > 0) {
      this.classList.remove('field-valid', 'field-invalid');
      if (allMet()) this.classList.add('field-valid');
      else this.classList.add('field-invalid');
    }
  });

  function checkConfirm() {
    var cv = confirm.value;
    confirmHint.classList.remove('visible', 'valid', 'invalid');
    confirm.classList.remove('field-valid', 'field-invalid');
    if (!cv) return;
    if (cv === pw.value && allMet()) {
      confirm.classList.add('field-valid');
      confirmHint.textContent = 'Passwords match';
      confirmHint.classList.add('visible', 'valid');
    } else if (cv !== pw.value) {
      confirm.classList.add('field-invalid');
      confirmHint.textContent = 'Passwords don\'t match';
      confirmHint.classList.add('visible', 'invalid');
    }
  }

  confirm.addEventListener('blur', checkConfirm);
  confirm.addEventListener('input', checkConfirm);
  confirm.addEventListener('focus', function() {
    this.classList.remove('field-valid', 'field-invalid');
    confirmHint.classList.remove('visible');
  });

})();

// Register a 'button' skeleton shape on first use (idempotent).
function ensureButtonSkel() {
  if (!window.narveSkel || window.narveSkel.templates['button']) return;
  window.narveSkel.registerTemplate('button', function () {
    return '<span class="skeleton skeleton-bar" style="display:inline-block;width:80px;height:10px;vertical-align:middle"></span>';
  });
}

function setLoading(btn, on) {
  if (on) {
    btn.dataset.label = btn.textContent;
    btn.disabled = true;
    btn.setAttribute('aria-busy', 'true');
    ensureButtonSkel();
    if (window.narveSkel && btn.id) {
      window.narveSkel.show(btn.id, 'button', 1);
    }
  } else {
    btn.disabled = false;
    btn.removeAttribute('aria-busy');
    btn.textContent = btn.dataset.label || 'Reset password';
  }
}

function handleSubmit(ev) {
  var pw = document.getElementById('new_password');
  var confirmEl = document.getElementById('confirm_password');
  var reqs = document.getElementById('pw-reqs');
  var confirmHint = document.getElementById('confirm-hint');
  var v = pw.value;
  var allMet = v.length >= 12 && /[A-Z]/.test(v) && /[a-z]/.test(v) && /[0-9]/.test(v) && /[^A-Za-z0-9]/.test(v);

  if (!allMet) {
    ev.preventDefault();
    reqs.classList.add('visible');
    pw.classList.add('field-invalid');
    pw.focus();
    if (window.narveToast) {
      window.narveToast('Password does not meet requirements', { type: 'error' });
    }
    return false;
  }
  if (confirmEl.value !== pw.value) {
    ev.preventDefault();
    confirmEl.classList.add('field-invalid');
    confirmHint.textContent = "Passwords don't match";
    confirmHint.classList.add('visible', 'invalid');
    confirmEl.focus();
    if (window.narveToast) {
      window.narveToast("Passwords don't match", { type: 'error' });
    }
    return false;
  }

  var btn = document.getElementById('submit-btn');
  setLoading(btn, true);
  return true;
}

// Surface any server-rendered error via toast for consistency.
(function () {
  function showServerError() {
    var err = document.getElementById('form-error');
    if (!err) return;
    var msg = (err.textContent || '').trim();
    if (msg && window.narveToast) {
      window.narveToast(msg, { type: 'error' });
    }
  }
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', showServerError);
  } else {
    showServerError();
  }
})();
</script>
<link rel="stylesheet" href="/_gateway_static/skeletons.css">
<script src="/_gateway_static/skeletons.js" defer></script>
<script src="/_gateway_static/js/toast.js" defer></script>
<script src="/_gateway_static/theme.js?v=2" defer></script>
  <script src="/_gateway_static/js/cmdk.js" defer></script>
  <script src="/_gateway_static/js/share_menu.js" defer></script>
</body>
</html>
