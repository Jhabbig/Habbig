<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Billing — narve.ai</title>
  <meta name="description" content="Your narve.ai billing.">
  <meta name="robots" content="noindex, nofollow">
  <link rel="stylesheet" href="{{ static: gateway.css }}">
  <link rel="stylesheet" href="{{ static: components.css }}">
  <link rel="preload" href="/_gateway_static/fonts/Inter-Variable-subset.woff2" as="font" type="font/woff2" crossorigin>
  <link rel="stylesheet" href="{{ static: scroll-animations.css }}">
  <link rel="stylesheet" href="{{ static: pages/billing.css }}">
<script>(function(){try{var m=document.cookie.match(/narve-theme=([^;]*)/)||document.cookie.match(/betyc-theme=([^;]*)/);var t=(m&&m[1])||localStorage.getItem("narve-theme")||localStorage.getItem("betyc-theme")||"light";document.documentElement.setAttribute("data-theme",t);}catch(e){document.documentElement.setAttribute("data-theme","light");}})();</script>
  <link rel="icon" type="image/png" href="/_gateway_static/img/logo.png">
  <link rel="apple-touch-icon" href="/_gateway_static/img/logo.png">
</head>
<body>
  <div class="app-shell">

    <!-- Sidebar -->
    {{ raw_sidebar }}

    <!-- Main content -->
    <div class="main-content">
      <div class="breadcrumb">
        <span class="breadcrumb-item">narve.ai</span>
        <span class="breadcrumb-separator">/</span>
        <span class="breadcrumb-item current">Billing</span>
      </div>

      <div class="page-header">
        <h1 class="page-title">Billing &amp; subscriptions</h1>
        <p class="page-subtitle">Manage your plan and dashboard access.</p>
      </div>

      <div class="content-area">
        {{ raw_plan_card }}

        <div class="billing-dashboards-title">Dashboard access</div>
        <p style="font-size:13px;color:var(--text-tertiary);margin-bottom:16px">{{ raw_access_desc }}</p>

        <div class="billing-list" data-empty-hint="No dashboards available yet — check back once your plan is active.">
          {{ billing_rows }}
        </div>
      </div>
    </div>

    <!-- Status bar -->
    <div class="status-bar">
      <div class="status-item">
        <div class="status-dot running"></div>
        narve.ai
      </div>
      <div class="status-separator"></div>
      <div class="status-item">Billing</div>
      <div class="status-spacer"></div>
      <div class="status-item"><a href="/logout" style="color:inherit;text-decoration:none">Sign out</a></div>
    </div>

  </div>
{{ raw_sitemap }}
<script src="/_gateway_static/scroll-animations.js" defer></script>
<script src="/_gateway_static/user-features.js" defer></script>
<script src="/_gateway_static/theme.js?v=2" defer></script>
  <script src="/_gateway_static/js/cmdk.js" defer></script>
  <script src="/_gateway_static/js/share_menu.js" defer></script>
</body>
</html>
