<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset password — Habbig</title>
  <link rel="stylesheet" href="/_gateway_static/gateway.css">
  <style>
    .auth-error:empty { display: none; }
    .auth-success:empty { display: none; }
    .auth-success {
      background: var(--green-bg);
      color: var(--green);
      border: 1px solid var(--green);
      border-radius: var(--radius-sm);
      padding: 10px 14px;
      font-size: 13px;
      margin-bottom: 8px;
    }
    .auth-icon {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: var(--accent-light);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 16px;
    }
    .auth-icon svg {
      width: 24px;
      height: 24px;
      color: var(--accent);
    }
  </style>
</head>
<body class="auth-body">
  <div class="auth-wrap">
    <a href="/" class="auth-brand">
      <div class="gw-brand-logo">H</div>
      <span>Habbig</span>
    </a>

    <div class="auth-card">
      <div class="auth-icon">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="1.5">
          <path stroke-linecap="round" stroke-linejoin="round" d="M16.5 10.5V6.75a4.5 4.5 0 1 0-9 0v3.75m-.75 11.25h10.5a2.25 2.25 0 0 0 2.25-2.25v-6.75a2.25 2.25 0 0 0-2.25-2.25H6.75a2.25 2.25 0 0 0-2.25 2.25v6.75a2.25 2.25 0 0 0 2.25 2.25Z"/>
        </svg>
      </div>
      <div class="auth-title">Reset your password</div>
      <div class="auth-sub">Enter your email and we'll send you a reset link.</div>

      {{ raw_success }}

      <form class="auth-form" method="post" action="/forgot-password">
        <label for="email">Email address</label>
        <input id="email" type="email" name="email" required autocomplete="email" autofocus
               placeholder="you@company.com">

        <button type="submit" class="auth-submit">Send reset link</button>
      </form>

      <div class="auth-error">{{ error }}</div>

      <div class="auth-footer">
        <a href="/login">Back to sign in</a>
      </div>
    </div>
  </div>
</body>
</html>
