<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Account Suspended — narve.ai</title>
  <meta name="description" content="This account has been suspended. Contact support for assistance.">
  <meta name="robots" content="noindex, nofollow">
  <link rel="stylesheet" href="{{ static: gateway.css }}">
  <link rel="preload" href="/_gateway_static/fonts/Inter-Variable-subset.woff2" as="font" type="font/woff2" crossorigin>
  <style>
    .sus-page { min-height: 100vh; background: var(--bg); display: flex; align-items: center; justify-content: center; padding: 32px; }
    .sus-card { max-width: 440px; width: 100%; text-align: center; }
    .sus-icon { width: 80px; height: 80px; border-radius: 50%; background: var(--interactive-ghost); display: flex; align-items: center; justify-content: center; margin: 0 auto 28px; }
    .sus-icon svg { width: 40px; height: 40px; color: var(--red); }
    .sus-code { font-size: 13px; font-weight: 600; color: var(--red); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 12px; }
    .sus-title { font-size: 28px; font-weight: 700; color: var(--text-primary); margin-bottom: 12px; letter-spacing: -0.02em; }
    .sus-body { font-size: 15px; color: var(--text-secondary); line-height: 1.7; margin-bottom: 32px; }
    .sus-btn { display: inline-block; padding: 13px 28px; border-radius: var(--radius-sm); font-size: 14px; font-weight: 600; text-decoration: none; border: 1px solid var(--border); color: var(--text-primary); background: var(--surface); transition: border-color 0.15s, background 0.15s; min-height: 44px; }
    .sus-btn:hover { border-color: var(--accent); background: var(--accent-light); color: var(--accent); text-decoration: none; }
    .sus-divider { height: 1px; background: var(--border); margin: 32px 0; }
    .sus-footer { font-size: 12px; color: var(--text-muted); }
  </style>
<script>(function(){try{var m=document.cookie.match(/narve-theme=([^;]*)/)||document.cookie.match(/betyc-theme=([^;]*)/);var t=(m&&m[1])||localStorage.getItem("narve-theme")||localStorage.getItem("betyc-theme")||"light";document.documentElement.setAttribute("data-theme",t);}catch(e){document.documentElement.setAttribute("data-theme","light");}})();</script>
  <link rel="icon" type="image/png" href="/_gateway_static/img/logo.png">
  <link rel="apple-touch-icon" href="/_gateway_static/img/logo.png">
</head>
<body>
<div class="sus-page">
  <div class="sus-card">
    <div class="sus-icon">
      <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M18.364 18.364A9 9 0 005.636 5.636m12.728 12.728A9 9 0 015.636 5.636m12.728 12.728L5.636 5.636"/></svg>
    </div>
    <div class="sus-code">Error 226</div>
    <h1 class="sus-title">Account Suspended</h1>
    <p class="sus-body">This account has been suspended and access has been revoked. No further action is available.</p>
    <a href="/support" class="sus-btn">Submit a Support Ticket</a>
    <div class="sus-divider"></div>
    <p class="sus-footer">Support tickets are reviewed within 24-48 hours.</p>
  </div>
</div>
<script src="/_gateway_static/theme.js?v=2" defer></script>
</body>
</html>
