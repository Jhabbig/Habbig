<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Access Denied — narve.ai</title>
  <meta name="description" content="You don't have access to this page.">
  <meta name="robots" content="noindex, nofollow">
  <link rel="stylesheet" href="{{ static: gateway.css }}">
  <link rel="stylesheet" href="{{ static: components.css }}">
  <link rel="preload" href="/_gateway_static/fonts/Inter-Variable-subset.woff2" as="font" type="font/woff2" crossorigin>
  <link rel="stylesheet" href="{{ static: pages/403.css }}">
  <link rel="stylesheet" href="{{ static: pages/error_page.css }}">
<script>(function(){try{var m=document.cookie.match(/narve-theme=([^;]*)/)||document.cookie.match(/betyc-theme=([^;]*)/);var t=(m&&m[1])||localStorage.getItem("narve-theme")||localStorage.getItem("betyc-theme")||"light";document.documentElement.setAttribute("data-theme",t);}catch(e){document.documentElement.setAttribute("data-theme","light");}try{var dm=document.cookie.match(/nv-density=([^;]*)/);var d=(dm&&dm[1])||localStorage.getItem("nv-density")||"comfortable";if(d!=="comfortable"&&d!=="compact"){d="comfortable";}document.documentElement.setAttribute("data-density",d);}catch(e2){document.documentElement.setAttribute("data-density","comfortable");}})();</script>
  <link rel="icon" type="image/png" href="/_gateway_static/img/logo.png">
  <link rel="apple-touch-icon" href="/_gateway_static/img/logo.png">
</head>
<body>
<!-- Audit flagged the previous version as over-decorated (icon +
     countdown + auto-redirect). This iteration is monochrome and
     intentional: code chip, italic title, short body, two buttons.
     No auto-redirect — surprise navigation erodes trust more than it
     helps when the user landed here by mistake. -->
<main class="nv-error">
  <p class="nv-error__code">Error · 403</p>
  <h1 class="nv-error__title">You don't have access</h1>
  <p class="nv-error__body">This area is restricted to administrators. If you think you should be able to see it, ping an admin.</p>
  <div class="nv-error__actions">
    <a href="/pricing">View pricing</a>
    <a href="/dashboards">Back to dashboard</a>
  </div>
  <p class="nv-error__support">
    Trouble persists? Email <a href="mailto:support@narve.ai">support@narve.ai</a>.
  </p>
</main>
<script src="/_gateway_static/theme.js?v=2" defer></script>
  <script src="/_gateway_static/js/cmdk.js" defer></script>
  <script src="/_gateway_static/js/share_menu.js" defer></script>
</body>
</html>
