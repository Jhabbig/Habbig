<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Access Denied — narve.ai</title>
  <link rel="stylesheet" href="/_gateway_static/gateway.css?v=9">
  <style>
    .denied-page { min-height: 100vh; background: var(--bg); display: flex; align-items: center; justify-content: center; padding: 32px; }
    .denied-card { max-width: 440px; width: 100%; text-align: center; }
    .denied-icon { width: 80px; height: 80px; border-radius: 50%; background: var(--interactive-ghost); display: flex; align-items: center; justify-content: center; margin: 0 auto 28px; }
    .denied-icon svg { width: 40px; height: 40px; color: var(--text-secondary); }
    .denied-code { font-size: 13px; font-weight: 600; color: var(--text-secondary); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 12px; }
    .denied-title { font-size: 28px; font-weight: 700; color: var(--text-primary); margin-bottom: 12px; letter-spacing: -0.02em; }
    .denied-body { font-size: 15px; color: var(--text-secondary); line-height: 1.7; margin-bottom: 32px; }
    .denied-countdown { font-size: 48px; font-weight: 700; color: var(--accent); margin-bottom: 24px; font-variant-numeric: tabular-nums; }
    .denied-redirect { font-size: 13px; color: var(--text-muted); margin-bottom: 32px; }
    .denied-btn { display: inline-block; padding: 13px 28px; border-radius: var(--radius-sm); font-size: 14px; font-weight: 600; text-decoration: none; border: 1px solid var(--border); color: var(--text-primary); background: var(--surface); transition: border-color 0.15s, background 0.15s; min-height: 44px; }
    .denied-btn:hover { border-color: var(--accent); background: var(--accent-light); color: var(--accent); text-decoration: none; }
    .denied-divider { height: 1px; background: var(--border); margin: 32px 0; }
    .denied-footer { font-size: 12px; color: var(--text-muted); }
  </style>
<script>(function(){try{var m=document.cookie.match(/narve-theme=([^;]*)/)||document.cookie.match(/betyc-theme=([^;]*)/);var t=(m&&m[1])||localStorage.getItem("narve-theme")||localStorage.getItem("betyc-theme")||"light";document.documentElement.setAttribute("data-theme",t);}catch(e){document.documentElement.setAttribute("data-theme","light");}})();</script>
  <link rel="icon" type="image/png" href="/_gateway_static/img/logo.png">
  <link rel="apple-touch-icon" href="/_gateway_static/img/logo.png">
</head>
<body>
<div class="denied-page">
  <div class="denied-card">
    <div class="denied-icon">
      <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v.01M12 9v2m0-8a10 10 0 100 20 10 10 0 000-20z"/></svg>
    </div>
    <div class="denied-code">Error 403</div>
    <h1 class="denied-title">You're Not an Admin</h1>
    <p class="denied-body">This area is restricted to administrators only. You don't have permission to access this page.</p>
    <div class="denied-countdown" id="countdown">5</div>
    <div class="denied-redirect">Redirecting in <span id="countdown-text">5</span> seconds…</div>
    <a href="/dashboards" class="denied-btn">Go to Dashboards Now</a>
    <div class="denied-divider"></div>
    <p class="denied-footer">If you believe this is a mistake, contact your administrator.</p>
  </div>
</div>
<script>
(function() {
  var seconds = 5;
  var numEl = document.getElementById('countdown');
  var textEl = document.getElementById('countdown-text');
  var timer = setInterval(function() {
    seconds--;
    numEl.textContent = seconds;
    textEl.textContent = seconds;
    if (seconds <= 0) {
      clearInterval(timer);
      window.location.href = '/dashboards';
    }
  }, 1000);
})();
</script>
<script src="/_gateway_static/theme.js?v=2" defer></script>
</body>
</html>
