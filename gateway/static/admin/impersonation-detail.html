<!-- Converted from admin-impersonation-detail.html. Body-only — wrapped by admin_shell. -->
<div style="max-width:1100px">

          <div class="stat-grid" style="margin-bottom:24px">
            {{ raw_summary_cards }}
          </div>

          <div class="settings-card">
            <div class="settings-section">
              <div class="settings-section-title">Reason (as given by admin)</div>
              <div class="settings-section-desc" style="margin-bottom:14px">
                {{ reason }}
              </div>
              <div class="field-row" style="padding-top:0">
                <span class="field-label">IP address</span>
                <span class="field-control" style="padding-top:10px">
                  <code style="font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:13px">{{ ip_address }}</code>
                </span>
              </div>
            </div>
          </div>

          <div class="admin-section">
            <div class="admin-section-head">
              <h2>Actions performed</h2>
              <span class="admin-section-count">oldest first</span>
            </div>
            <div class="admin-card">
              {{ raw_action_rows }}
            </div>
          </div>

        </div>
