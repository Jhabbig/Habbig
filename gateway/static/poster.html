<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Something's coming — narve.ai</title>
  <meta name="description" content="narve.ai promotional poster.">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Instrument+Serif:ital@1&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ static: pages/poster.css }}">
<script>(function(){try{var m=document.cookie.match(/narve-theme=([^;]*)/)||document.cookie.match(/betyc-theme=([^;]*)/);var t=(m&&m[1])||localStorage.getItem("narve-theme")||localStorage.getItem("betyc-theme")||"light";document.documentElement.setAttribute("data-theme",t);}catch(e){document.documentElement.setAttribute("data-theme","light");}})();</script>
  <link rel="icon" type="image/png" href="/_gateway_static/img/logo.png">
  <link rel="apple-touch-icon" href="/_gateway_static/img/logo.png">
</head>
<body>
  <button class="p-download" onclick="downloadPoster()">Download PNG</button>

  <canvas id="particles" style="position:fixed;inset:0;z-index:-1;pointer-events:none"></canvas>

  <div class="p-hero">
    <div class="p-line1">Something's</div>
    <div class="p-line2">
      <span class="p-line2-serif">coming.</span>
    </div>
    <div class="p-sub">coming soon.</div>
    <div class="p-tagline">Prediction markets decoded — dashboards built for edge.</div>
  </div>

  <div class="p-logo-corner">
    <img src="/_gateway_static/img/logo.png" alt="narve.ai">
    <span>narve.ai</span>
  </div>

<script>
document.addEventListener('DOMContentLoaded', function() {
  var canvas = document.getElementById('particles');
  var ctx = canvas.getContext('2d');
  var particles = [];
  var count = 80;

  function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
  resize();
  window.addEventListener('resize', resize);

  for (var i = 0; i < count; i++) {
    particles.push({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height,
      r: 1 + Math.random() * 0.5,
      vx: (Math.random() - 0.5) * 0.4 + (Math.random() > 0.5 ? 0.1 : -0.1),
      vy: (Math.random() - 0.5) * 0.4 + (Math.random() > 0.5 ? 0.1 : -0.1)
    });
  }

  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = 'rgba(0, 0, 0, 0.12)';
    for (var i = 0; i < particles.length; i++) {
      var p = particles[i];
      p.x += p.vx; p.y += p.vy;
      if (p.x < 0) p.x = canvas.width;
      if (p.x > canvas.width) p.x = 0;
      if (p.y < 0) p.y = canvas.height;
      if (p.y > canvas.height) p.y = 0;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fill();
    }
    requestAnimationFrame(draw);
  }
  draw();
});

function downloadPoster() {
  var btn = document.querySelector('.p-download');
  btn.style.display = 'none';

  // Wait for animations to settle
  setTimeout(function() {
    var w = 3000;
    var h = 4000;
    var c = document.createElement('canvas');
    c.width = w;
    c.height = h;
    var ctx = c.getContext('2d');

    // Background
    ctx.fillStyle = '#fafafa';
    ctx.fillRect(0, 0, w, h);

    // Subtle gradient flares
    var g1 = ctx.createRadialGradient(w * 0.1, h * 0.15, 0, w * 0.1, h * 0.15, w * 0.6);
    g1.addColorStop(0, 'rgba(0,0,0,0.04)');
    g1.addColorStop(1, 'transparent');
    ctx.fillStyle = g1;
    ctx.fillRect(0, 0, w, h);

    var g2 = ctx.createRadialGradient(w * 0.9, h * 0.8, 0, w * 0.9, h * 0.8, w * 0.5);
    g2.addColorStop(0, 'rgba(0,0,0,0.03)');
    g2.addColorStop(1, 'transparent');
    ctx.fillStyle = g2;
    ctx.fillRect(0, 0, w, h);

    // Particles
    ctx.fillStyle = 'rgba(0, 0, 0, 0.10)';
    for (var i = 0; i < 80; i++) {
      var px = Math.random() * w;
      var py = Math.random() * h;
      var pr = 2.5 + Math.random() * 2;
      ctx.beginPath();
      ctx.arc(px, py, pr, 0, Math.PI * 2);
      ctx.fill();
    }

    // Text
    ctx.fillStyle = '#0d0d0d';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';

    // "Something's"
    ctx.font = '300 160px Inter, -apple-system, sans-serif';
    ctx.fillText("Something's", w / 2, h * 0.40);

    // "coming." in italic serif
    ctx.font = 'italic 400 160px "Instrument Serif", Georgia, serif';
    ctx.fillText("coming.", w / 2, h * 0.47);

    // "coming soon."
    ctx.fillStyle = '#999999';
    ctx.font = '400 36px Inter, sans-serif';
    ctx.fillText("coming soon.", w / 2, h * 0.55);

    // Tagline
    ctx.fillStyle = '#666666';
    ctx.font = '300 30px Inter, sans-serif';
    ctx.fillText("Prediction markets decoded — dashboards built for edge.", w / 2, h * 0.60);

    // Logo image only — bottom-right corner
    var logo = new Image();
    logo.crossOrigin = 'anonymous';
    logo.onload = function() {
      ctx.drawImage(logo, w - 120, h - 120, 72, 72);
      var link = document.createElement('a');
      link.download = 'narve-poster.png';
      link.href = c.toDataURL('image/png');
      link.click();
      btn.style.display = '';
    };
    logo.onerror = function() {
      var link = document.createElement('a');
      link.download = 'narve-poster.png';
      link.href = c.toDataURL('image/png');
      link.click();
      btn.style.display = '';
    };
    logo.src = '/_gateway_static/img/logo.png';
  }, 300);
}
</script>
<script src="/_gateway_static/theme.js?v=2" defer></script>
</body>
</html>
