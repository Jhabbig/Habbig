<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Two-factor verification — narve.ai</title>
  <link rel="stylesheet" href="/_gateway_static/gateway.css?v=9">
  <style>
    .auth-error:empty { display: none; }
    .code-row {
      display: flex;
      gap: 10px;
      justify-content: center;
      margin: 20px 0 8px;
    }
    .code-row input {
      width: 48px;
      height: 56px;
      text-align: center;
      font-size: 24px;
      font-family: var(--font-mono);
      font-weight: 600;
      background: var(--bg-overlay);
      border: 1px solid var(--border-default);
      border-radius: 8px;
      color: var(--text-primary);
      padding: 0;
    }
    .code-row input:focus {
      border-color: var(--border-strong);
      outline: none;
    }
    .backup-wrap {
      display: none;
      margin-top: 20px;
    }
    .backup-wrap.visible { display: block; }
    .backup-wrap input {
      width: 100%;
      padding: 12px 14px;
      font-size: 16px;
      font-family: var(--font-mono);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      background: var(--bg-overlay);
      border: 1px solid var(--border-default);
      border-radius: 8px;
      color: var(--text-primary);
    }
    .two-fa-hint {
      font-size: 13px;
      color: var(--text-secondary);
      text-align: center;
      line-height: 1.5;
      margin-top: 8px;
    }
    .two-fa-switch {
      display: block;
      text-align: center;
      margin-top: 24px;
      font-size: 12px;
      color: var(--text-secondary);
      cursor: pointer;
      background: none;
      border: none;
      padding: 6px;
    }
    .two-fa-switch:hover { color: var(--text-primary); }
    #resend-btn {
      background: none;
      border: none;
      color: var(--text-secondary);
      cursor: pointer;
      font-size: 12px;
      margin-top: 12px;
    }
    #resend-btn:hover { color: var(--text-primary); }
    #resend-btn:disabled { opacity: 0.4; cursor: default; }
  </style>
<script>(function(){try{var m=document.cookie.match(/narve-theme=([^;]*)/)||document.cookie.match(/betyc-theme=([^;]*)/);var t=(m&&m[1])||localStorage.getItem("narve-theme")||localStorage.getItem("betyc-theme")||"light";document.documentElement.setAttribute("data-theme",t);}catch(e){document.documentElement.setAttribute("data-theme","light");}})();</script>
  <link rel="icon" type="image/png" href="/_gateway_static/img/logo.png">
  <link rel="apple-touch-icon" href="/_gateway_static/img/logo.png">
</head>
<body class="auth-body">
  <div class="auth-wrap">
    <a href="/" class="auth-brand">
      <img src="/_gateway_static/img/logo.png" alt="narve.ai" style="width:24px;height:24px;filter:invert(1);border-radius:4px">
      <span>narve.ai</span>
    </a>

    <div class="auth-card reveal-scale">
      <div class="auth-title">Two-factor verification</div>
      <div class="auth-sub" id="method-sub">Loading…</div>

      <form class="auth-form" id="verify-form" onsubmit="return submitVerify(event)">
        {{ raw_csrf_field }}
        <input type="hidden" id="method" name="method" value="{{ method }}">

        <div id="code-wrap">
          <div class="code-row" id="code-row">
            <input type="text" inputmode="numeric" pattern="[0-9]*" maxlength="1" autocomplete="one-time-code" autofocus>
            <input type="text" inputmode="numeric" pattern="[0-9]*" maxlength="1" autocomplete="one-time-code">
            <input type="text" inputmode="numeric" pattern="[0-9]*" maxlength="1" autocomplete="one-time-code">
            <input type="text" inputmode="numeric" pattern="[0-9]*" maxlength="1" autocomplete="one-time-code">
            <input type="text" inputmode="numeric" pattern="[0-9]*" maxlength="1" autocomplete="one-time-code">
            <input type="text" inputmode="numeric" pattern="[0-9]*" maxlength="1" autocomplete="one-time-code">
          </div>
          <div class="two-fa-hint" id="email-hint" style="display:none">
            We sent a 6-digit code to <span id="masked-email">{{ masked_email }}</span>. It expires in 10 minutes.
            <br>
            <button type="button" id="resend-btn" onclick="resendOtp()">Resend code</button>
          </div>
        </div>

        <div class="backup-wrap" id="backup-wrap">
          <label for="backup-code" style="font-size:12px;color:var(--text-secondary);margin-bottom:6px;display:block">Backup code</label>
          <input type="text" id="backup-code" placeholder="XXXX-XXXX" maxlength="9" autocapitalize="characters">
        </div>

        <button type="submit" class="auth-submit" id="submit-btn" style="margin-top:16px">Verify</button>
      </form>

      <button type="button" class="two-fa-switch" id="switch-btn" onclick="toggleBackup()">Use a backup code instead</button>

      <div class="auth-error" id="error-box" style="margin-top:14px">{{ error }}</div>

      <div style="text-align:center;margin-top:24px">
        <a href="/logout" style="font-size:12px;color:var(--text-secondary);text-decoration:none">Sign out</a>
      </div>
    </div>
  </div>

<script>
(function() {
  var method = document.getElementById('method').value || 'totp';
  var sub = document.getElementById('method-sub');
  var emailHint = document.getElementById('email-hint');
  if (method === 'email_otp') {
    sub.textContent = 'Enter the code we just sent to your email.';
    emailHint.style.display = 'block';
  } else {
    sub.textContent = 'Enter the 6-digit code from your authenticator app.';
  }
  // Auto-advance between digit boxes
  var boxes = document.querySelectorAll('#code-row input');
  boxes.forEach(function(box, i) {
    box.addEventListener('input', function(e) {
      var v = e.target.value.replace(/[^0-9]/g, '');
      e.target.value = v.slice(0, 1);
      if (v && i < boxes.length - 1) {
        boxes[i + 1].focus();
      }
    });
    box.addEventListener('keydown', function(e) {
      if (e.key === 'Backspace' && !box.value && i > 0) {
        boxes[i - 1].focus();
      }
    });
    box.addEventListener('paste', function(e) {
      var text = (e.clipboardData || window.clipboardData).getData('text').replace(/[^0-9]/g, '');
      if (!text) return;
      e.preventDefault();
      for (var j = 0; j < boxes.length && j < text.length; j++) {
        boxes[j].value = text[j];
      }
      if (text.length >= boxes.length) {
        document.getElementById('submit-btn').focus();
      } else {
        boxes[Math.min(text.length, boxes.length - 1)].focus();
      }
    });
  });
})();

function toggleBackup() {
  var bw = document.getElementById('backup-wrap');
  var cw = document.getElementById('code-wrap');
  var btn = document.getElementById('switch-btn');
  if (bw.classList.contains('visible')) {
    bw.classList.remove('visible');
    cw.style.display = 'block';
    btn.textContent = 'Use a backup code instead';
    document.getElementById('method').value = document.getElementById('method').getAttribute('value') || 'totp';
  } else {
    bw.classList.add('visible');
    cw.style.display = 'none';
    btn.textContent = 'Use your main code instead';
    document.getElementById('method').value = 'backup_code';
    document.getElementById('backup-code').focus();
  }
}

function getCsrf() {
  var m = document.cookie.match(/(?:^|;\s*)_csrf=([^;]*)/);
  return m ? decodeURIComponent(m[1]) : '';
}

function submitVerify(e) {
  e.preventDefault();
  var method = document.getElementById('method').value;
  var code;
  if (method === 'backup_code') {
    code = document.getElementById('backup-code').value.trim();
  } else {
    var boxes = document.querySelectorAll('#code-row input');
    code = Array.from(boxes).map(function(b) { return b.value; }).join('');
  }
  var fd = new FormData();
  fd.append('code', code);
  fd.append('method', method);
  var errBox = document.getElementById('error-box');
  var btn = document.getElementById('submit-btn');
  errBox.textContent = '';
  btn.disabled = true;
  btn.textContent = 'Verifying…';

  fetch('/api/auth/2fa/verify', {
    method: 'POST',
    headers: { 'X-CSRF-Token': getCsrf() },
    body: fd,
  })
  .then(function(r) { return r.json().then(function(d) { return { ok: r.ok, status: r.status, data: d }; }); })
  .then(function(res) {
    if (res.ok && res.data.verified) {
      window.location.href = res.data.redirect || '/dashboards';
      return;
    }
    errBox.textContent = res.data.error || 'Verification failed. Try again.';
    btn.disabled = false;
    btn.textContent = 'Verify';
  })
  .catch(function() {
    errBox.textContent = 'Network error. Please try again.';
    btn.disabled = false;
    btn.textContent = 'Verify';
  });
  return false;
}

function resendOtp() {
  var btn = document.getElementById('resend-btn');
  btn.disabled = true;
  btn.textContent = 'Sending…';
  fetch('/api/auth/2fa/email/resend', {
    method: 'POST',
    headers: { 'X-CSRF-Token': getCsrf() },
  })
  .then(function(r) { return r.json().then(function(d) { return { ok: r.ok, data: d }; }); })
  .then(function(res) {
    if (res.ok && res.data.success) {
      btn.textContent = 'Code sent';
      setTimeout(function() { btn.disabled = false; btn.textContent = 'Resend code'; }, 60000);
    } else {
      btn.textContent = res.data.error || 'Failed to send';
      setTimeout(function() { btn.disabled = false; btn.textContent = 'Resend code'; }, 5000);
    }
  })
  .catch(function() {
    btn.textContent = 'Network error';
    setTimeout(function() { btn.disabled = false; btn.textContent = 'Resend code'; }, 5000);
  });
}
</script>
<script src="/_gateway_static/theme.js?v=2" defer></script>
</body>
</html>
