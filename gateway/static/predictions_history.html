<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Prediction history · narve.ai</title>
  <meta name="description" content="Your full prediction history.">
  <meta name="robots" content="noindex, nofollow">
  <link rel="stylesheet" href="{{ static: gateway.css }}">
  <link rel="stylesheet" href="{{ static: components.css }}">
<script>(function(){try{var m=document.cookie.match(/narve-theme=([^;]*)/)||document.cookie.match(/betyc-theme=([^;]*)/);var t=(m&&m[1])||localStorage.getItem("narve-theme")||localStorage.getItem("betyc-theme")||"light";document.documentElement.setAttribute("data-theme",t);}catch(e){document.documentElement.setAttribute("data-theme","light");}})();</script>
  <link rel="icon" type="image/png" href="/_gateway_static/img/logo.png">
  <link rel="apple-touch-icon" href="/_gateway_static/img/logo.png">
</head>
<body>
  <div class="app-shell">

    {{ raw_sidebar }}

    <div class="main-content">
      <div class="breadcrumb">
        <a href="/dashboards" class="breadcrumb-item" style="text-decoration:none;color:inherit">narve.ai</a>
        <span class="breadcrumb-separator">/</span>
        <a href="/predictions" class="breadcrumb-item" style="text-decoration:none;color:inherit">Predictions</a>
        <span class="breadcrumb-separator">/</span>
        <span class="breadcrumb-item current">History</span>
      </div>

      <div class="page-header">
        <h1 class="page-title">Prediction history</h1>
        <p class="page-subtitle">
          Every call you've made, resolved or still open. Row detail links to
          the market and the score breakdown.
        </p>
      </div>

      <div class="content-area">
        <div style="max-width:1000px">

          <!-- Summary KPIs — rendered server-side via
               {{ raw_summary_cards }}. Each card is a .stat-tile so the
               row renders identically to /predictions and /dashboard/models. -->
          <div class="stat-grid" style="margin-bottom:24px">
            {{ raw_summary_cards }}
          </div>

          <div class="admin-section">
            <div class="admin-section-head">
              <h2>History</h2>
              <span class="admin-section-count">oldest at the bottom</span>
            </div>
            <div class="admin-card">
              {{ raw_prediction_rows }}
            </div>
          </div>

        </div>
      </div>
    </div>

    <div class="status-bar">
      <span class="status-item"><span class="status-dot running"></span> Connected</span>
      <span class="status-separator"></span>
      <span class="status-item">Predictions · History</span>
      <span class="status-spacer"></span>
      <a href="/logout" class="status-item" style="text-decoration:none;color:inherit">Sign out</a>
    </div>
  </div>

<script src="/_gateway_static/theme.js?v=2" defer></script>
  <script src="/_gateway_static/js/cmdk.js" defer></script>
  <script src="/_gateway_static/js/share_menu.js" defer></script>
</body>
</html>
