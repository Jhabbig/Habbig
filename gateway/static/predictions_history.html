<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Your predictions · narve.ai</title>
  <link rel="stylesheet" href="{{ static: gateway.css }}">
  <link rel="preload" href="/_gateway_static/fonts/Inter-Variable-subset.woff2" as="font" type="font/woff2" crossorigin>
  <link rel="icon" type="image/png" href="/_gateway_static/img/logo.png">
  <style>
    body { margin: 0; background: var(--bg, #0d0d0d); color: var(--text-primary, #fff); font-family: Inter, -apple-system, BlinkMacSystemFont, sans-serif; line-height: 1.55; }
    .wrap { max-width: 1000px; margin: 0 auto; padding: 40px 24px 80px; }
    .head { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 20px; flex-wrap: wrap; gap: 16px; }
    .head h1 { margin: 0; font-size: 26px; font-weight: 600; }
    .backlink { opacity: 0.55; color: inherit; text-decoration: none; font-size: 13px; }
    .backlink:hover { opacity: 1; }
    .stat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 10px; margin-bottom: 28px; }
    .stat-card { background: var(--surface, #141414); border: 1px solid var(--border, rgba(255,255,255,0.06)); border-radius: 6px; padding: 12px 14px; }
    .stat-label { font-size: 10px; opacity: 0.55; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
    .stat-value { font-size: 18px; font-weight: 600; }
    h2 { font-size: 15px; text-transform: uppercase; letter-spacing: 0.5px; opacity: 0.7; margin: 20px 0 12px; }
    .adm-list { background: var(--surface, #141414); border: 1px solid var(--border, rgba(255,255,255,0.06)); border-radius: 8px; overflow: hidden; }
    .admin-row { display: block; padding: 14px 18px; border-bottom: 1px solid var(--border, rgba(255,255,255,0.06)); }
    .admin-row:last-child { border-bottom: 0; }
    .admin-row-main { font-size: 14px; margin-bottom: 4px; }
    .admin-row-meta { font-size: 12px; opacity: 0.55; line-height: 1.5; }
    .badge { display: inline-block; font-size: 10px; font-weight: 600; padding: 2px 8px; border-radius: 10px; margin-left: 6px; vertical-align: middle; }
  </style>
</head>
<body>
  <main class="wrap" id="main">
    <div class="head">
      <div>
        <a class="backlink" href="/dashboards">← Dashboards</a>
        <h1>Your predictions {{ raw_nav_role }}</h1>
      </div>
    </div>

    <div class="stat-grid">{{ raw_summary_cards }}</div>

    <h2>History</h2>
    <div class="adm-list">{{ raw_prediction_rows }}</div>
  </main>
</body>
</html>
