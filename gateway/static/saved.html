<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Saved — narve.ai</title>
  <meta name="description" content="Your saved narve.ai predictions, markets, and sources.">
  <meta name="robots" content="noindex, nofollow">
  <link rel="stylesheet" href="{{ static: gateway.css }}">
  <link rel="stylesheet" href="{{ static: components.css }}">
  <link rel="stylesheet" href="/_gateway_static/states.css">
  <link rel="stylesheet" href="/_gateway_static/skeletons.css">
  <link rel="stylesheet" href="/_gateway_static/filter_panel.css">
  <link rel="stylesheet" href="{{ static: pages/feeds.css }}">
  <link rel="preload" href="/_gateway_static/fonts/Inter-Variable-subset.woff2" as="font" type="font/woff2" crossorigin>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:opsz,wght@8..60,400;8..60,500;8..60,600&display=swap" rel="stylesheet">
<script>(function(){try{var m=document.cookie.match(/narve-theme=([^;]*)/)||document.cookie.match(/betyc-theme=([^;]*)/);var t=(m&&m[1])||localStorage.getItem("narve-theme")||localStorage.getItem("betyc-theme")||"light";document.documentElement.setAttribute("data-theme",t);}catch(e){document.documentElement.setAttribute("data-theme","light");}try{var dm=document.cookie.match(/nv-density=([^;]*)/);var d=(dm&&dm[1])||localStorage.getItem("nv-density")||"comfortable";if(d!=="comfortable"&&d!=="compact"){d="comfortable";}document.documentElement.setAttribute("data-density",d);}catch(e2){document.documentElement.setAttribute("data-density","comfortable");}})();</script>
  <link rel="icon" type="image/png" href="/_gateway_static/img/logo.png">
  <link rel="apple-touch-icon" href="/_gateway_static/img/logo.png">
</head>
<body>
  <div class="app-shell">

    {{ raw_sidebar }}

    <div class="main-content">
      <div class="feed-shell">

        <nav class="feed-back" aria-label="Breadcrumb">
          <a href="/dashboards" style="color:inherit;text-decoration:none">← narve.ai</a>
        </nav>

        <header class="feed-hero">
          <div class="feed-eyebrow">Your library</div>
          <h1 class="feed-title">Saved</h1>
          <p class="feed-lede">
            Predictions, markets, and sources you've bookmarked. See which calls
            land and which sources you trust most when the markets resolve.
          </p>
        </header>

        <div class="feed-filters" role="tablist" aria-label="Saved categories">
          <button type="button" class="feed-chip is-active" role="tab" aria-selected="true" data-tab="predictions">Predictions</button>
          <button type="button" class="feed-chip" role="tab" aria-selected="false" data-tab="markets">Markets</button>
          <button type="button" class="feed-chip" role="tab" aria-selected="false" data-tab="sources">Sources</button>
          <input type="search" id="saved-search" class="feed-search" placeholder="Search prediction, market, or source…" aria-label="Search saved items">
          <span class="feed-count" id="saved-count" aria-live="polite"></span>
        </div>

        <main>
          <ul class="feed-list" id="saved-body" aria-live="polite"></ul>
        </main>

      </div>
    </div>

  </div>

<script>
(function(){
  var body = document.getElementById('saved-body');
  var countEl = document.getElementById('saved-count');
  var currentTab = 'predictions';
  var cache = { predictions: null, markets: null, sources: null };

  function esc(s){
    if (s === null || s === undefined) return '';
    return String(s).replace(/[&<>"']/g, function(m){
      return ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[m];
    });
  }

  function fmtDate(ts){
    if (!ts) return '';
    var d = new Date(ts * 1000);
    return d.toLocaleDateString();
  }

  function initial(s){
    s = (s || '').trim();
    return s ? s.charAt(0).toUpperCase() : '?';
  }

  function statusLabel(p){
    if (!p.resolved) return 'OPEN';
    return p.resolved_correct ? 'CORRECT' : 'MISS';
  }

  function getCsrf(){
    var m = document.cookie.match(/(?:^|;\s*)_csrf=([^;]*)/);
    return m ? decodeURIComponent(m[1]) : '';
  }

  /* ---------- renderers (one per tab) ---------- */

  function renderPredictions(items){
    if (!items.length) return renderEmpty('predictions');
    return items.map(function(it){
      var p = it.prediction || {};
      var handle = p.source_handle || '';
      var saved = fmtDate(it.saved_at);
      var cred = (p.credibility === null || p.credibility === undefined) ? null : p.credibility;
      var searchBlob = ((p.content || '') + ' ' + handle).toLowerCase();
      return (
        '<li data-pid="' + p.id + '" data-search="' + esc(searchBlob) + '">' +
          '<a class="feed-row" href="/source/' + encodeURIComponent(handle) + '">' +
            '<span class="feed-avatar" aria-hidden="true">' + esc(initial(handle)) + '</span>' +
            '<div class="feed-body">' +
              '<div class="feed-handle">@' + esc(handle) + (saved ? ' · saved ' + esc(saved) : '') + ' · ' + statusLabel(p) + '</div>' +
              '<p class="feed-prose">' + esc(p.content || '') + '</p>' +
            '</div>' +
            '<div class="feed-stats">' +
              '<span class="feed-stat-value">' + (cred !== null ? cred.toFixed(2) : '—') + '</span>' +
              '<span class="feed-stat-label">Credibility</span>' +
            '</div>' +
            '<button type="button" class="feed-action feed-action--ghost unsave-btn" data-kind="prediction" data-id="' + p.id + '">Remove</button>' +
          '</a>' +
        '</li>'
      );
    }).join('');
  }

  function renderMarkets(items){
    if (!items.length) return renderEmpty('markets');
    return items.map(function(m){
      var slug = m.slug || '';
      var question = m.question || m.title || slug;
      var price = (m.yes_price !== null && m.yes_price !== undefined) ? Math.round(m.yes_price * 100) : null;
      var src = (m.source || '').toUpperCase();
      var searchBlob = (question + ' ' + slug).toLowerCase();
      return (
        '<li data-mid="' + esc(slug) + '" data-search="' + esc(searchBlob) + '">' +
          '<a class="feed-row" href="/market/' + encodeURIComponent(slug) + '">' +
            '<span class="feed-avatar" aria-hidden="true">' + esc(initial(question)) + '</span>' +
            '<div class="feed-body">' +
              '<div class="feed-handle">' + esc(src) + ' · ' + esc(slug) + '</div>' +
              '<p class="feed-prose">' + esc(question) + '</p>' +
            '</div>' +
            '<div class="feed-stats">' +
              '<span class="feed-stat-value">' + (price !== null ? price + '%' : '—') + '</span>' +
              '<span class="feed-stat-label">YES</span>' +
            '</div>' +
            '<button type="button" class="feed-action feed-action--ghost unsave-btn" data-kind="market" data-id="' + esc(slug) + '">Remove</button>' +
          '</a>' +
        '</li>'
      );
    }).join('');
  }

  function renderSources(items){
    if (!items.length) return renderEmpty('sources');
    return items.map(function(s){
      var handle = s.handle || '';
      var name = s.name || handle;
      var desc = s.description || '';
      var cred = (s.global_credibility === null || s.global_credibility === undefined) ? null : s.global_credibility;
      var searchBlob = (handle + ' ' + name + ' ' + desc).toLowerCase();
      return (
        '<li data-handle="' + esc(handle) + '" data-search="' + esc(searchBlob) + '">' +
          '<a class="feed-row" href="/source/' + encodeURIComponent(handle) + '">' +
            '<span class="feed-avatar" aria-hidden="true">' + esc(initial(name)) + '</span>' +
            '<div class="feed-body">' +
              '<div class="feed-handle">@' + esc(handle) + '</div>' +
              '<p class="feed-prose">' + esc(name) + (desc ? ' — ' + esc(desc) : '') + '</p>' +
            '</div>' +
            '<div class="feed-stats">' +
              '<span class="feed-stat-value">' + (cred !== null ? cred.toFixed(2) : '—') + '</span>' +
              '<span class="feed-stat-label">Credibility</span>' +
            '</div>' +
            '<button type="button" class="feed-action feed-action--ghost unsave-btn" data-kind="source" data-id="' + esc(handle) + '">Unfollow</button>' +
          '</a>' +
        '</li>'
      );
    }).join('');
  }

  function renderEmpty(tab){
    var copy = {
      predictions: ['Nothing saved yet', 'Tap the bookmark icon on any prediction to track it here. When the market resolves, you\'ll see who called it right.'],
      markets: ['No saved markets', 'Bookmark markets you want to follow. They\'ll show up here with live YES prices.'],
      sources: ['Not following anyone yet', 'Follow sources whose calls you respect. Their predictions land in your feed and on your dashboard.']
    }[tab] || ['Nothing here', 'Save items from anywhere on narve.'];
    return (
      '<div class="nv-empty" role="status" data-feed-empty>' +
        '<h2 class="nv-empty__title">' + esc(copy[0]) + '</h2>' +
        '<p class="nv-empty__body">' + esc(copy[1]) + '</p>' +
        '<div class="nv-empty__actions">' +
          '<a class="nv-empty__action nv-empty__action--primary" href="/dashboards">Browse dashboards</a>' +
          '<a class="nv-empty__action" href="/sources">All sources</a>' +
        '</div>' +
      '</div>'
    );
  }

  /* ---------- skeleton ---------- */
  function showSkeleton(){
    var html = '';
    for (var i = 0; i < 6; i++) {
      html += '<li><div class="feed-row feed-row--skeleton" aria-hidden="true">' +
        '<span class="feed-avatar"></span>' +
        '<div class="feed-body">' +
          '<div class="feed-handle"></div>' +
          '<p class="feed-prose"></p>' +
        '</div>' +
        '<div class="feed-stats">' +
          '<span class="feed-stat-value"></span>' +
          '<span class="feed-stat-label"></span>' +
        '</div>' +
        '<span></span>' +
        '</div></li>';
    }
    body.innerHTML = html;
  }

  function applyClientFilter(){
    var q = (document.getElementById('saved-search').value || '').trim().toLowerCase();
    var rows = body.querySelectorAll('li[data-search]');
    var shown = 0;
    rows.forEach(function(row){
      var match = !q || (row.getAttribute('data-search') || '').indexOf(q) !== -1;
      row.style.display = match ? '' : 'none';
      if (match) shown += 1;
    });
    countEl.textContent = shown + ' / ' + rows.length;
  }

  function paint(tab, items){
    var html = '';
    if (tab === 'predictions') html = renderPredictions(items);
    else if (tab === 'markets') html = renderMarkets(items);
    else html = renderSources(items);
    body.innerHTML = html;
    if (!items.length) { countEl.textContent = ''; return; }
    applyClientFilter();
    wireUnsave();
  }

  function wireUnsave(){
    body.querySelectorAll('.unsave-btn').forEach(function(btn){
      btn.addEventListener('click', function(e){
        e.preventDefault();
        e.stopPropagation();
        var kind = btn.getAttribute('data-kind');
        var id = btn.getAttribute('data-id');
        var url = null;
        if (kind === 'prediction') url = '/api/saved/' + encodeURIComponent(id);
        else if (kind === 'market') url = '/api/watchlist/' + encodeURIComponent(id);
        else if (kind === 'source') url = '/api/sources/' + encodeURIComponent(id) + '/follow';
        if (!url) return;
        fetch(url, { method: 'DELETE', headers: { 'X-CSRF-Token': getCsrf() } })
          .then(function(){
            cache[currentTab] = null;
            loadTab(currentTab);
          });
      });
    });
  }

  /* ---------- loading ---------- */

  var endpoints = {
    predictions: '/api/saved?resolved=all',
    markets: '/api/watchlist/me',
    sources: '/api/sources/following/me'
  };

  function extractItems(tab, data){
    if (tab === 'predictions') return data.items || [];
    if (tab === 'markets')     return data.items || data.markets || [];
    if (tab === 'sources')     return data.items || data.sources || data.following || [];
    return [];
  }

  function loadTab(tab){
    if (cache[tab]) { paint(tab, cache[tab]); return; }
    showSkeleton();
    fetch(endpoints[tab])
      .then(function(r){
        if (!r.ok) throw new Error('http_' + r.status);
        return r.json();
      })
      .then(function(d){
        var items = extractItems(tab, d);
        cache[tab] = items;
        paint(tab, items);
      })
      .catch(function(err){
        var is401 = err && String(err.message || '').indexOf('http_401') === 0;
        body.innerHTML =
          '<div class="error-state">' +
            '<div class="error-state__title">' +
              (is401 ? 'Your session expired' : 'Could not load saved') +
            '</div>' +
            '<div class="error-state__body">' +
              (is401
                ? 'Sign in again to pick up where you left off.'
                : 'Check your connection and retry.') +
            '</div>' +
            '<div class="error-state__actions">' +
              (is401
                ? '<a href="/token">Sign in</a>'
                : '<button type="button" id="saved-retry">Retry</button>') +
              '<a href="/dashboards">Back to dashboards</a>' +
            '</div>' +
          '</div>';
        var retry = document.getElementById('saved-retry');
        if (retry) retry.addEventListener('click', function(){ cache[tab] = null; loadTab(tab); });
      });
  }

  /* ---------- tab + search wiring ---------- */
  document.querySelectorAll('.feed-chip[data-tab]').forEach(function(chip){
    chip.addEventListener('click', function(){
      document.querySelectorAll('.feed-chip[data-tab]').forEach(function(c){
        c.classList.remove('is-active');
        c.setAttribute('aria-selected', 'false');
      });
      chip.classList.add('is-active');
      chip.setAttribute('aria-selected', 'true');
      currentTab = chip.getAttribute('data-tab');
      loadTab(currentTab);
    });
  });

  var searchInput = document.getElementById('saved-search');
  if (searchInput) {
    searchInput.addEventListener('input', applyClientFilter);
  }

  loadTab(currentTab);
})();
</script>
{{ raw_sitemap }}
<script src="/_gateway_static/user-features.js" defer></script>
<script src="/_gateway_static/theme.js?v=2" defer></script>
<script src="/_gateway_static/skeletons.js" defer></script>
<script src="/_gateway_static/toast.js" defer></script>
<script src="/_gateway_static/filter_panel.js" defer></script>
<script>
  document.addEventListener("DOMContentLoaded", function () {
    if (!window.NarveFilterPanel) return;
    if (typeof window.NarveFilterPanel.mountSidebar === "function") {
      window.NarveFilterPanel.mountSidebar();
    }
  });
</script>
  <script src="/_gateway_static/js/cmdk.js" defer></script>
  <script src="/_gateway_static/js/share_menu.js" defer></script>
</body>
</html>
