<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>@{{ source_handle }} — narve.ai</title>
  <link rel="stylesheet" href="{{ static: gateway.css }}">
  <link rel="preload" href="/_gateway_static/fonts/Inter-Variable-subset.woff2" as="font" type="font/woff2" crossorigin>
  <meta name="robots" content="noindex, nofollow">
  <meta property="og:type" content="website">
  <meta property="og:title" content="@{{ source_handle }} — tracked by narve.ai">
  <meta property="og:description" content="Source credibility + accuracy tracked since prediction history">
  <meta property="og:image" content="/og/shared/source/{{ token }}">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:image" content="/og/shared/source/{{ token }}">
  <script>(function(){try{var m=document.cookie.match(/narve-theme=([^;]*)/)||document.cookie.match(/betyc-theme=([^;]*)/);var t=(m&&m[1])||localStorage.getItem("narve-theme")||localStorage.getItem("betyc-theme")||"light";document.documentElement.setAttribute("data-theme",t);}catch(e){document.documentElement.setAttribute("data-theme","light");}})();</script>
  <style>
    body { background: var(--bg-base); color: var(--text-primary); font-family: var(--font-ui); margin: 0; min-height: 100vh; }
    .share-main { max-width: 640px; margin: 0 auto; padding: 64px 24px; }
    .share-brand { font-family: var(--font-display); font-weight: 500; font-size: 13px; color: var(--text-tertiary); letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 32px; }
    .share-handle { font-family: var(--font-display); font-size: 36px; line-height: 1.1; letter-spacing: -0.02em; margin: 0 0 8px; font-weight: 500; }
    .share-subline { font-size: 13px; color: var(--text-tertiary); margin-bottom: 32px; }
    .share-metrics { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 32px; }
    .metric-card { background: var(--bg-surface); border: 1px solid var(--border-default); border-radius: var(--radius-lg); padding: 24px; }
    .metric-label { font-size: 11px; color: var(--text-tertiary); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 8px; }
    .metric-value { font-family: var(--font-display); font-size: 28px; font-weight: 500; letter-spacing: -0.01em; font-variant-numeric: tabular-nums; }
    .share-meta { font-size: 12px; color: var(--text-tertiary); margin: 32px 0 48px; text-align: center; }
    .share-cta { display: block; text-align: center; background: var(--text-primary); color: var(--bg-base); padding: 16px 24px; border-radius: var(--radius-md); text-decoration: none; font-weight: 500; letter-spacing: 0.01em; margin-bottom: 16px; }
    .share-cta:hover { opacity: 0.88; }
    .share-fineprint { text-align: center; font-size: 12px; color: var(--text-tertiary); }
    .share-fineprint a { color: var(--text-primary); }
  </style>
</head>
<body>
  <main class="share-main">
    <div class="share-brand">narve.ai · source profile</div>
    <h1 class="share-handle">@{{ source_handle }}</h1>
    <div class="share-subline">Tracked by narve.ai</div>

    <div class="share-metrics">
      <div class="metric-card">
        <div class="metric-label">Credibility</div>
        <div class="metric-value">{{ cred_score }}</div>
      </div>
      <div class="metric-card">
        <div class="metric-label">Accuracy</div>
        <div class="metric-value">{{ accuracy_pct }}</div>
      </div>
    </div>

    <div class="share-meta">
      {% if sharer_handle %}
        Shared by @{{ sharer_handle }}
      {% else %}
        Shared via narve.ai
      {% endif %}
    </div>

    <a class="share-cta" href="/#waitlist">Request invite to see full profile</a>
    <div class="share-fineprint">
      narve.ai is invite-only. <a href="/about">Learn more</a>.
    </div>
  </main>
</body>
</html>
