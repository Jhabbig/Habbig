<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>betyc — staging</title>
  <link rel="stylesheet" href="/_gateway_static/gateway.css">
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: var(--bg-primary, #0a0b14);
      color: var(--text-primary, #e2e4ea);
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }
    .staging-banner {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      background: #f59e0b;
      color: #000;
      text-align: center;
      padding: 6px 12px;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.03em;
      z-index: 9999;
    }
    .teaser {
      text-align: center;
      padding: 32px;
    }
    .teaser-logo {
      width: 64px;
      height: 64px;
      border-radius: 16px;
      background: #1a1e2e;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 40px;
    }
    .teaser-logo svg {
      width: 28px;
      height: 28px;
      fill: #e2e2e8;
    }
    .teaser h1 {
      font-size: clamp(28px, 5vw, 48px);
      font-weight: 700;
      letter-spacing: -0.03em;
      margin: 0 0 16px;
      color: var(--text-primary, #e2e4ea);
    }
    .teaser p {
      font-size: 16px;
      color: var(--text-muted, #5a5e72);
      margin: 0 0 40px;
    }
    .teaser-login {
      display: inline-block;
      font-size: 14px;
      font-weight: 500;
      color: var(--accent, #6366f1);
      text-decoration: none;
      border: 1px solid var(--accent, #6366f1);
      padding: 10px 24px;
      border-radius: 8px;
      transition: background 0.15s;
    }
    .teaser-login:hover {
      background: rgba(99, 102, 241, 0.08);
    }
  </style>
</head>
<body class="landing-body">
  <div class="staging-banner">STAGING — edit files in gateway/static/dummy/</div>
  <div class="teaser">
    <div class="teaser-logo"><svg viewBox="0 0 24 24" fill="#e2e2e8"><polygon points="8,5 18,12 8,19"/></svg></div>
    <h1>Something is coming.</h1>
    <p>Stay tuned.</p>
    <a href="/gate" class="teaser-login">Client Login</a>
  </div>
</body>
</html>
