<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign in — Habbig</title>
  <link rel="stylesheet" href="/_gateway_static/gateway.css">
  <style>
    .auth-error:empty { display: none; }
    .token-display {
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 12px;
      letter-spacing: 0.04em;
      background: var(--surface-hover);
      color: var(--text-muted);
      cursor: not-allowed;
    }
    .email-hint {
      display: inline-block;
      margin-top: 6px;
      font-size: 13px;
      color: var(--accent);
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    }
  </style>
</head>
<body class="auth-body">
  <div class="auth-wrap">
    <a href="/" class="auth-brand">
      <div class="gw-brand-logo">H</div>
      <span>Habbig</span>
    </a>

    <div class="auth-card">
      <div class="auth-title">Welcome back</div>
      <div class="auth-sub">Enter your password to sign in.</div>

      <form class="auth-form" method="post" action="/login">
        <label for="invite_token">Invite Token</label>
        <input id="invite_token" type="text" name="invite_token" value="{{ invite_token }}" readonly class="token-display">
        <div class="email-hint">{{ email_hint }}</div>

        <label for="password">Password</label>
        <input id="password" type="password" name="password" required autocomplete="current-password" autofocus>

        <button type="submit" class="auth-submit">Sign in</button>
      </form>

      <div class="auth-error">{{ error }}</div>

      <div class="auth-footer">
        <a href="/gate">Use a different token</a>
      </div>
    </div>

    <div class="auth-reassure">
      Your invite token identifies your account. Only your password is needed to sign in.
    </div>
  </div>
</body>
</html>
