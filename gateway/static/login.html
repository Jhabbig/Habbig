<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign in — Habbig</title>
  <link rel="stylesheet" href="/_gateway_static/gateway.css">
  <style>
    .auth-error:empty { display: none; }
    .auth-success:empty { display: none; }
    .auth-success {
      background: var(--green-bg);
      color: var(--green);
      border: 1px solid var(--green);
      border-radius: var(--radius-sm);
      padding: 10px 14px;
      font-size: 13px;
      margin-bottom: 8px;
    }
    .token-display {
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 12px;
      letter-spacing: 0.04em;
      background: var(--surface-hover);
      color: var(--text-muted);
      cursor: not-allowed;
    }
    .email-hint {
      display: inline-block;
      margin-top: 6px;
      font-size: 13px;
      color: var(--accent);
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    }
    .email-hint:empty { display: none; }
  </style>
</head>
<body class="auth-body">
  <div class="auth-wrap">
    <a href="/" class="auth-brand">
      <div class="gw-brand-logo">H</div>
      <span>Habbig</span>
    </a>

    <div class="auth-card">
      <div class="auth-title">Welcome back</div>
      <div class="auth-sub">Sign in to access your dashboards.</div>

      <form class="auth-form" method="post" action="/login">
        {{ raw_token_section }}

        <label for="identifier">Username or Email</label>
        <input id="identifier" type="text" name="identifier" required autocomplete="username" autofocus
               placeholder="Enter your username or email">

        <label for="password">Password</label>
        <input id="password" type="password" name="password" required autocomplete="current-password">

        <button type="submit" class="auth-submit">Sign in</button>
      </form>

      {{ raw_success }}
      <div class="auth-error">{{ error }}</div>

      <div style="text-align:center;margin-top:12px">
        <a href="/forgot-password" style="font-size:13px;color:var(--text-muted);text-decoration:none">Forgot your password?</a>
      </div>

      <div class="auth-footer">
        {{ raw_footer_link }}
      </div>
    </div>

    <div class="auth-reassure">
      Need an account? Contact the admin for an invite token, then use it at the <a href="/gate">gate</a>.
    </div>
  </div>
</body>
</html>
