<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign in — narve.ai</title>
  <meta name="description" content="Sign in to narve.ai.">
  <link rel="stylesheet" href="{{ static: gateway.css }}">
  <link rel="stylesheet" href="{{ static: components.css }}">
  <link rel="preload" href="/_gateway_static/fonts/Inter-Variable-subset.woff2" as="font" type="font/woff2" crossorigin>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@1&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ static: pages/auth.css }}">
<script>(function(){try{var m=document.cookie.match(/narve-theme=([^;]*)/)||document.cookie.match(/betyc-theme=([^;]*)/);var t=(m&&m[1])||localStorage.getItem("narve-theme")||localStorage.getItem("betyc-theme")||"light";document.documentElement.setAttribute("data-theme",t);}catch(e){document.documentElement.setAttribute("data-theme","light");}})();</script>
  <link rel="icon" type="image/png" href="/_gateway_static/img/logo.png">
  <link rel="apple-touch-icon" href="/_gateway_static/img/logo.png">
</head>
<body>
  <a href="/" class="auth-brand">
    <img src="/_gateway_static/img/logo.png" alt="narve.ai">
    <span>narve.ai</span>
  </a>

  <div class="auth-card">
    <h1 class="auth-hero">Sign in</h1>
    <p class="auth-sub">Welcome back. Sign in to reach your dashboards.</p>

    <div class="auth-success" id="success-msg">{{ raw_success }}</div>
    <div class="auth-error" id="form-error">{{ error }}</div>

    <form class="auth-form" id="login-form" onsubmit="return submitLogin(event)">
      {{ raw_csrf_field }}

      <div>
        <label for="email">Email address</label>
        <input class="auth-input" id="email" name="email" type="email"
               required autocomplete="email" autofocus
               placeholder="you@company.com">
        <div class="auth-field-error" id="email-err"></div>
      </div>

      <div>
        <div class="label-row">
          <label for="password">Password</label>
          <a class="auth-link-serif" href="/forgot-password">Forgot password?</a>
        </div>
        <div class="pw-wrap">
          <input class="auth-input" id="password" name="password" type="password"
                 required autocomplete="current-password">
          <button class="pw-toggle" type="button" onclick="togglePw()" aria-label="Show password">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg>
          </button>
        </div>
        <div class="auth-field-error" id="pw-err"></div>
      </div>

      <button class="auth-btn" id="login-btn" type="submit">Sign in</button>
    </form>

    <!--
      TODO(auth): /register route was deleted 2026-05-16 (audit #18 MED #3).
      Re-add a sign-up CTA once the new self-serve registration flow lands.
    -->
    <!--
    <p class="auth-footer-note">
      Don't have an account?
      <a class="auth-link-serif" href="/register">Create one</a>
    </p>
    -->

  </div>

<script>
function togglePw() {
  var input = document.getElementById('password');
  input.type = input.type === 'password' ? 'text' : 'password';
}

function getCsrf() {
  return (document.cookie.match(/(?:^|;\s*)_csrf=([^;]*)/) || [])[1] || '';
}

// Register a 'button' skeleton shape on first use (idempotent).
function ensureButtonSkel() {
  if (!window.narveSkel || window.narveSkel.templates['button']) return;
  window.narveSkel.registerTemplate('button', function () {
    return '<span class="skeleton skeleton-bar" style="display:inline-block;width:80px;height:10px;vertical-align:middle"></span>';
  });
}

function setLoading(btn, on) {
  if (on) {
    btn.dataset.label = btn.textContent;
    btn.disabled = true;
    btn.setAttribute('aria-busy', 'true');
    ensureButtonSkel();
    if (window.narveSkel && btn.id) {
      window.narveSkel.show(btn.id, 'button', 1);
    }
  } else {
    btn.disabled = false;
    btn.removeAttribute('aria-busy');
    btn.textContent = btn.dataset.label || 'Sign in';
  }
}

function submitLogin(ev) {
  ev.preventDefault();
  var btn = document.getElementById('login-btn');
  var formErr = document.getElementById('form-error');
  var emailErr = document.getElementById('email-err');
  var pwErr = document.getElementById('pw-err');
  formErr.textContent = '';
  emailErr.textContent = '';
  pwErr.textContent = '';
  setLoading(btn, true);

  fetch('/auth/login', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'x-csrf-token': getCsrf() },
    body: JSON.stringify({
      email: document.getElementById('email').value.trim(),
      password: document.getElementById('password').value,
    }),
  }).then(function(r) {
    return r.json().then(function(d){ return { ok: r.ok, status: r.status, data: d }; });
  }).then(function(res) {
    if (res.ok && res.data && res.data.success) {
      window.location.href = (res.data && res.data.redirect) || '/dashboards';
      return;
    }
    setLoading(btn, false);
    var err = (res.data && res.data.error) || 'Incorrect email or password.';
    var field = (res.data && res.data.field) || null;
    if (field === 'email') emailErr.textContent = err;
    else if (field === 'password') pwErr.textContent = err;
    else formErr.textContent = err;
  }).catch(function() {
    setLoading(btn, false);
    if (window.narveToast) {
      window.narveToast('Network error — try again', { type: 'error' });
    } else {
      formErr.textContent = 'Network error — try again';
    }
  });

  return false;
}
</script>
<link rel="stylesheet" href="/_gateway_static/skeletons.css">
<script src="/_gateway_static/skeletons.js" defer></script>
<script src="/_gateway_static/js/toast.js" defer></script>
<script src="/_gateway_static/theme.js?v=2" defer></script>
  <script src="/_gateway_static/js/cmdk.js" defer></script>
  <script src="/_gateway_static/js/share_menu.js" defer></script>
</body>
</html>
