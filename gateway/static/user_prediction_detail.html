<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Prediction #{{ prediction_id }} · narve.ai</title>
  <link rel="stylesheet" href="{{ static: gateway.css }}">
  <link rel="icon" type="image/png" href="/_gateway_static/img/logo.png">
  <link rel="canonical" href="https://narve.ai/predictions/{{ prediction_id }}">
  <meta property="og:type" content="article">
  <meta property="og:title" content="Prediction on narve.ai">
  <meta name="twitter:card" content="summary">
  <style>
    body { margin: 0; background: var(--bg, #0d0d0d); color: var(--text-primary, #fff); font-family: Inter, -apple-system, BlinkMacSystemFont, sans-serif; line-height: 1.6; }
    .wrap { max-width: 700px; margin: 0 auto; padding: 52px 24px 100px; }
    .backlink { opacity: 0.55; color: inherit; text-decoration: none; font-size: 13px; }
    .backlink:hover { opacity: 1; }
    h1 { font-size: 24px; font-weight: 600; margin: 28px 0 8px; letter-spacing: -0.01em; }
    .sub { font-size: 13px; opacity: 0.55; margin-bottom: 32px; }
    .fact { display: grid; grid-template-columns: 160px 1fr; gap: 10px 18px; padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,0.06); font-size: 14px; }
    .fact .lbl { opacity: 0.55; font-size: 12px; text-transform: uppercase; letter-spacing: 0.5px; }
    .reason { background: var(--surface, #141414); border: 1px solid rgba(255,255,255,0.06); border-radius: 8px; padding: 16px 20px; margin-top: 28px; line-height: 1.65; font-size: 14px; white-space: pre-wrap; }
  </style>
</head>
<body>
  <main class="wrap" id="main">
    <a class="backlink" href="/predictions">← Your predictions</a>
    <h1>{{ market_question }}</h1>
    <div class="sub">Prediction #{{ prediction_id }} · {{ author }} · {{ created }}</div>

    <div class="fact"><div class="lbl">Outcome</div><div>{{ predicted_outcome }}</div></div>
    <div class="fact"><div class="lbl">Probability</div><div>{{ probability }}</div></div>
    <div class="fact"><div class="lbl">Resolved</div><div>{{ resolved }}</div></div>
    <div class="fact"><div class="lbl">Result</div><div>{{ resolved_correct }}</div></div>
    <div class="fact"><div class="lbl">Brier score</div><div>{{ brier_score }}</div></div>

    <div class="reason">{{ reasoning }}</div>

    <div style="margin-top:24px">{{ raw_owner_controls }}</div>
  </main>
</body>
</html>
