<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <link rel="stylesheet" href="/_gateway_static/gateway.css">
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: var(--bg-primary, #0a0b14);
      color: var(--text-primary, #e2e4ea);
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }
    .teaser {
      text-align: center;
      padding: 32px;
    }
    .teaser-logo {
      width: 64px;
      height: 64px;
      border-radius: 16px;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      font-weight: 700;
      color: white;
      margin: 0 auto 40px;
    }
    .teaser h1 {
      font-size: clamp(28px, 5vw, 48px);
      font-weight: 700;
      letter-spacing: -0.03em;
      margin: 0 0 16px;
      color: var(--text-primary, #e2e4ea);
    }
    .teaser p {
      font-size: 16px;
      color: var(--text-muted, #5a5e72);
      margin: 0 0 40px;
    }
    .teaser-login {
      display: inline-block;
      font-size: 14px;
      font-weight: 500;
      color: var(--accent, #6366f1);
      text-decoration: none;
      border: 1px solid var(--accent, #6366f1);
      padding: 10px 24px;
      border-radius: 8px;
      transition: background 0.15s;
    }
    .teaser-login:hover {
