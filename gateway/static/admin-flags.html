<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Feature flags · narve.ai admin</title>
  <link rel="stylesheet" href="{{ static: gateway.css }}">
  <link rel="preload" href="/_gateway_static/fonts/Inter-Variable-subset.woff2" as="font" type="font/woff2" crossorigin>
  <link rel="icon" type="image/png" href="/_gateway_static/img/logo.png">
  <style>
    body { margin: 0; background: var(--bg, #0d0d0d); color: var(--text-primary, #fff); font-family: Inter, -apple-system, BlinkMacSystemFont, sans-serif; }
    .adm-wrap { max-width: 1100px; margin: 0 auto; padding: 40px 24px 80px; }
    .adm-head { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 28px; flex-wrap: wrap; gap: 16px; }
    .adm-head h1 { margin: 0; font-size: 26px; font-weight: 600; }
    .adm-nav-back { opacity: 0.6; color: inherit; text-decoration: none; font-size: 13px; }
    .adm-nav-back:hover { opacity: 1; }
    .adm-list { display: flex; flex-direction: column; background: var(--surface, #141414); border: 1px solid var(--border, rgba(255,255,255,0.06)); border-radius: 8px; overflow: hidden; margin-bottom: 28px; }
    .admin-row { display: flex; align-items: center; padding: 14px 18px; border-bottom: 1px solid var(--border, rgba(255,255,255,0.06)); gap: 16px; }
    .admin-row:last-child { border-bottom: 0; }
    .admin-row-info { flex: 1; min-width: 0; }
    .admin-row-main { font-size: 14px; margin-bottom: 4px; }
    .admin-row-meta { font-size: 12px; opacity: 0.55; line-height: 1.5; }
    .admin-row-actions { flex-shrink: 0; }
    .badge { display: inline-block; font-size: 10px; font-weight: 600; padding: 2px 8px; border-radius: 10px; margin-left: 6px; vertical-align: middle; }
    .btn, .btn-primary-outline { display: inline-block; padding: 7px 14px; border-radius: 6px; text-decoration: none; color: inherit; border: 1px solid var(--border, rgba(255,255,255,0.15)); background: transparent; cursor: pointer; font-family: inherit; font-size: 12px; }
    .btn-primary-outline:hover { background: var(--surface-hover, rgba(255,255,255,0.04)); }
    .create-card { background: var(--surface, #141414); border: 1px solid var(--border, rgba(255,255,255,0.06)); border-radius: 8px; padding: 22px; }
    .create-card h2 { margin: 0 0 14px; font-size: 15px; text-transform: uppercase; letter-spacing: 0.5px; opacity: 0.75; }
    .form-grid { display: grid; grid-template-columns: 160px 1fr; gap: 12px 14px; align-items: center; }
    .form-grid label { font-size: 12px; opacity: 0.7; }
    .form-grid input, .form-grid textarea { background: rgba(0,0,0,0.3); border: 1px solid var(--border, rgba(255,255,255,0.12)); border-radius: 5px; padding: 9px 11px; color: inherit; font: inherit; font-size: 13px; width: 100%; box-sizing: border-box; }
    .form-actions { display: flex; gap: 10px; margin-top: 16px; justify-content: flex-end; }
    .btn-primary { background: var(--accent, #fff); color: var(--bg, #0d0d0d); border: 0; padding: 9px 18px; border-radius: 5px; font-weight: 600; cursor: pointer; font-size: 13px; }
    code { font-family: ui-monospace, Menlo, monospace; background: rgba(255,255,255,0.05); padding: 2px 6px; border-radius: 3px; font-size: 12px; }
  </style>
</head>
<body>
  <div class="adm-wrap">
    <div class="adm-head">
      <div>
        <a class="adm-nav-back" href="/admin">← Admin</a>
        <h1>Feature flags {{ raw_nav_role }}</h1>
      </div>
    </div>

    <div class="adm-list">
      {{ raw_flag_rows }}
    </div>

    <div class="create-card">
      <h2>Create new flag</h2>
      <form method="post" action="/admin/flags">
        <div class="form-grid">
          <label for="new-flag-key">Key</label>
          <input id="new-flag-key" name="key" type="text" pattern="[a-z0-9_\-]{1,80}" required placeholder="e.g. insider_signals">
          <label for="new-flag-name">Name</label>
          <input id="new-flag-name" name="name" type="text" placeholder="Human-readable label">
          <label for="new-flag-desc">Description</label>
          <textarea id="new-flag-desc" name="description" rows="2" placeholder="Optional — what this flag gates"></textarea>
        </div>
        <div class="form-actions">
          <button class="btn-primary" type="submit">Create flag</button>
        </div>
      </form>
    </div>
  </div>
</body>
</html>
