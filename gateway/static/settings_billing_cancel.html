<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Cancel subscription — Settings — narve.ai</title>
  <meta name="description" content="Cancel your narve.ai subscription.">
  <meta name="robots" content="noindex, nofollow">
  <link rel="stylesheet" href="{{ static: gateway.css }}">
  <link rel="preload" href="/_gateway_static/fonts/Inter-Variable-subset.woff2" as="font" type="font/woff2" crossorigin>
  <style>
    .cancel-wrap { max-width: 560px; margin: 40px auto; padding: 0 16px; }
    .cancel-card {
      background: var(--bg-raised);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 32px;
    }
    .cancel-card h2 {
      font-family: var(--font-display);
      font-size: 20px;
      font-weight: 700;
      letter-spacing: -0.01em;
      color: var(--text-primary);
    }
    .sb-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 10px 16px;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      border: 1px solid transparent;
      text-decoration: none;
      transition: all 0.15s;
    }
    .sb-btn-primary {
      background: var(--interactive-primary);
      color: var(--interactive-primary-contrast);
    }
    .sb-btn-primary:hover { opacity: 0.92; }
    .sb-btn-outline {
      background: transparent;
      color: var(--text-primary);
      border-color: var(--border);
    }
    .sb-btn-outline:hover { background: var(--interactive-ghost); }
    .sb-btn-ghost {
      background: transparent;
      color: var(--text-muted);
      border-color: transparent;
    }
    .sb-btn-ghost:hover { color: var(--text-primary); }
    .sb-crumbs {
      font-size: 12px;
      color: var(--text-muted);
      margin-bottom: 12px;
    }
    .sb-crumbs a { color: var(--text-muted); text-decoration: none; }
    .sb-crumbs a:hover { color: var(--text-primary); }
  </style>
</head>
<body>
  [[NAV_PLACEHOLDER]]
  <div class="cancel-wrap">
    <div class="sb-crumbs">
      <a href="/settings">Settings</a> /
      <a href="/settings/billing">Billing</a> /
      Cancel subscription
    </div>
    <div class="cancel-card">
      {{ raw_cancel_inner }}
    </div>
  </div>
</body>
</html>
