<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Access — narve.ai</title>
  <meta name="description" content="Enter your site access token to continue to narve.ai.">
  <link rel="stylesheet" href="{{ static: gateway.css }}">
  <link rel="preload" href="/_gateway_static/fonts/Inter-Variable-subset.woff2" as="font" type="font/woff2" crossorigin>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { min-height: 100vh; background: var(--bg-void); color: var(--text-primary); font-family: var(--font-ui); display: flex; flex-direction: column; justify-content: center; align-items: center; }

    .gate-logo {
      position: fixed;
      top: 24px;
      left: 24px;
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
      z-index: 10;
    }
    .gate-logo-icon { width: 28px; height: 28px; filter: invert(1); border-radius: 4px; }
    .gate-logo-text {
      font-family: var(--font-ui);
      font-weight: 500;
      font-size: 1.1rem;
      letter-spacing: -0.04em;
      color: var(--text-primary);
    }

    .gate-card { text-align: center; width: 100%; max-width: 340px; padding: 24px; }
    .gate-heading {
      font-family: var(--font-display);
      font-weight: 400;
      font-size: 1.2rem;
      color: var(--text-primary);
      margin-bottom: 1.5rem;
    }
    .gate-input {
      width: 100%;
      height: 44px;
      padding: 0 16px;
      border: 1px solid var(--border-default);
      border-radius: var(--radius-sm);
      background: var(--bg-overlay);
      font-family: var(--font-ui);
      font-size: 0.9rem;
      color: var(--text-primary);
      outline: none;
      transition: border-color var(--duration-fast);
      -webkit-text-security: disc;
    }
    .gate-input:focus { border-color: var(--border-strong); box-shadow: 0 0 0 3px rgba(240,240,240,0.04); }
    .gate-input::placeholder { color: var(--text-tertiary); }
    .gate-btn {
      width: 100%;
      height: 44px;
      margin-top: 10px;
      background: var(--interactive-bg);
      color: var(--interactive-text);
      border: none;
      border-radius: var(--radius-sm);
      font-family: var(--font-ui);
      font-size: 0.9rem;
      cursor: pointer;
      transition: background var(--duration-fast);
    }
    .gate-btn:hover { background: var(--interactive-hover); }
    .gate-error {
      font-size: 0.8rem;
      color: var(--text-secondary);
      margin-top: 10px;
      min-height: 20px;
    }
    .gate-error:empty { display: none; }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      15%, 45%, 75% { transform: translateX(-6px); }
      30%, 60%, 90% { transform: translateX(6px); }
    }
    .shake { animation: shake 0.4s ease-in-out; }
  </style>
  <link rel="stylesheet" href="{{ static: scroll-animations.css }}">
<script>(function(){try{var m=document.cookie.match(/narve-theme=([^;]*)/)||document.cookie.match(/betyc-theme=([^;]*)/);var t=(m&&m[1])||localStorage.getItem("narve-theme")||localStorage.getItem("betyc-theme")||"light";document.documentElement.setAttribute("data-theme",t);}catch(e){document.documentElement.setAttribute("data-theme","light");}})();</script>
  <link rel="icon" type="image/png" href="/_gateway_static/img/logo.png">
  <link rel="apple-touch-icon" href="/_gateway_static/img/logo.png">
</head>
<body>
  <a href="/" class="gate-logo">
    <img class="gate-logo-icon" src="/_gateway_static/img/logo.png" alt="narve.ai">
    <span class="gate-logo-text">narve.ai</span>
  </a>

  <main id="main" class="gate-card reveal-scale">
    <h1 class="gate-heading">Access required</h1>
    <form method="post" action="/gate" id="gate-form">
        {{ raw_csrf_field }}
      <label for="gate-token" class="narve-sr-only">Access token</label>
      <input class="gate-input" type="password" name="token" id="gate-token" required autofocus
             placeholder="Enter access token" autocomplete="off">
      <button type="submit" class="gate-btn">Continue</button>
    </form>
    <div class="gate-error" id="gate-error" role="alert">{{ error }}</div>
    <p style="font-size:11px;color:var(--text-tertiary);margin-top:18px;line-height:1.5">
      By entering, you agree to our
      <a href="/terms" style="color:var(--text-secondary);text-decoration:underline">Terms</a>
      and <a href="/privacy" style="color:var(--text-secondary);text-decoration:underline">Privacy Policy</a>.
      We use essential cookies only.
    </p>
  </main>

<script>
(function() {
  var err = document.getElementById('gate-error');
  if (err && err.textContent.trim()) {
    document.getElementById('gate-form').classList.add('shake');
    setTimeout(function() { document.getElementById('gate-form').classList.remove('shake'); }, 500);
  }
})();
</script>
<script src="/_gateway_static/scroll-animations.js" defer></script>
<script src="/_gateway_static/theme.js?v=2" defer></script>
</body>
</html>
