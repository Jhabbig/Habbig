<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Impersonation session {{ session_id }} · narve.ai admin</title>
  <link rel="stylesheet" href="{{ static: gateway.css }}">
  <link rel="icon" type="image/png" href="/_gateway_static/img/logo.png">
  <style>
    body { margin: 0; background: var(--bg, #0d0d0d); color: var(--text-primary, #fff); font-family: Inter, -apple-system, BlinkMacSystemFont, sans-serif; }
    .adm-wrap { max-width: 1100px; margin: 0 auto; padding: 40px 24px 80px; }
    .adm-head { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 18px; flex-wrap: wrap; gap: 16px; }
    .adm-head h1 { margin: 0; font-size: 22px; font-weight: 600; }
    .adm-nav-back { opacity: 0.6; color: inherit; text-decoration: none; font-size: 13px; }
    .adm-nav-back:hover { opacity: 1; }
    .stat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 10px; margin-bottom: 22px; }
    .stat-card { background: var(--surface, #141414); border: 1px solid var(--border, rgba(255,255,255,0.06)); border-radius: 6px; padding: 12px 14px; }
    .stat-label { font-size: 10px; opacity: 0.55; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
    .stat-value { font-size: 18px; font-weight: 600; }
    .reason-box { background: var(--surface, #141414); border: 1px solid var(--border, rgba(255,255,255,0.06)); border-radius: 6px; padding: 14px 16px; font-size: 13px; line-height: 1.5; margin-bottom: 22px; }
    .reason-box .lbl { font-size: 10px; opacity: 0.55; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
    .adm-list { background: var(--surface, #141414); border: 1px solid var(--border, rgba(255,255,255,0.06)); border-radius: 8px; overflow: hidden; }
    .admin-row { padding: 10px 16px; border-bottom: 1px solid var(--border, rgba(255,255,255,0.06)); }
    .admin-row:last-child { border-bottom: 0; }
    .admin-row-main { font-size: 13px; margin-bottom: 3px; }
    .admin-row-meta { font-size: 11px; opacity: 0.55; }
    .badge { display: inline-block; font-size: 9px; font-weight: 600; padding: 1px 6px; border-radius: 8px; margin-left: 4px; vertical-align: middle; }
  </style>
</head>
<body>
  <div class="adm-wrap">
    <div class="adm-head">
      <div>
        <a class="adm-nav-back" href="/admin/impersonations">← Impersonation log</a>
        <h1>Session #{{ session_id }} {{ raw_nav_role }}</h1>
      </div>
    </div>

    <div class="stat-grid">{{ raw_summary_cards }}</div>

    <div class="reason-box">
      <div class="lbl">Reason (as given by admin)</div>
      {{ reason }}
      <div class="lbl" style="margin-top:10px">IP</div>
      {{ ip_address }}
    </div>

    <h2 style="font-size:13px;text-transform:uppercase;letter-spacing:0.5px;opacity:0.7;margin-bottom:10px">Actions performed</h2>
    <div class="adm-list">
      {{ raw_action_rows }}
    </div>
  </div>
</body>
</html>
