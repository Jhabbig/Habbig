<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Share unavailable — narve.ai</title>
  <meta name="description" content="This share link is no longer valid.">
  <link rel="stylesheet" href="{{ static: gateway.css }}">
  <meta name="robots" content="noindex, nofollow">
  <script>(function(){try{var m=document.cookie.match(/narve-theme=([^;]*)/)||document.cookie.match(/betyc-theme=([^;]*)/);var t=(m&&m[1])||localStorage.getItem("narve-theme")||localStorage.getItem("betyc-theme")||"light";document.documentElement.setAttribute("data-theme",t);}catch(e){document.documentElement.setAttribute("data-theme","light");}})();</script>
  <style>
    body { background: var(--bg-base); color: var(--text-primary); font-family: var(--font-ui); margin: 0; min-height: 100vh; }
    .share-main { max-width: 560px; margin: 0 auto; padding: 96px 24px; text-align: center; }
    .share-brand { font-family: var(--font-display); font-weight: 500; font-size: 13px; color: var(--text-tertiary); letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 40px; }
    .share-h1 { font-family: var(--font-display); font-size: 28px; line-height: 1.25; letter-spacing: -0.02em; margin: 0 0 16px; font-weight: 500; }
    .share-body { color: var(--text-secondary); margin-bottom: 40px; line-height: 1.6; }
    .share-cta { display: inline-block; background: var(--text-primary); color: var(--bg-base); padding: 14px 22px; border-radius: var(--radius-md); text-decoration: none; font-weight: 500; letter-spacing: 0.01em; }
    .share-cta:hover { opacity: 0.88; }
  </style>
</head>
<body>
  <main class="share-main">
    <div class="share-brand">narve.ai</div>
    <h1 class="share-h1">Share unavailable</h1>
    <p class="share-body">
      This {{ kind }} share link is invalid or has expired.
      Shared links are signed and valid for seven days.
    </p>
    <a class="share-cta" href="/#waitlist">Request invite to narve.ai</a>
  </main>
</body>
</html>
