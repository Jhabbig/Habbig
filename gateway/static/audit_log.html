<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Audit log — narve.ai admin</title>
  <meta name="description" content="Your audit log.">
  <meta name="robots" content="noindex, nofollow">
  <link rel="stylesheet" href="{{ static: gateway.css }}">
  <link rel="stylesheet" href="{{ static: components.css }}">
  <link rel="preload" href="/_gateway_static/fonts/Inter-Variable-subset.woff2" as="font" type="font/woff2" crossorigin>
  <link rel="stylesheet" href="{{ static: pages/audit_log.css }}">
<script>(function(){try{var m=document.cookie.match(/narve-theme=([^;]*)/)||document.cookie.match(/betyc-theme=([^;]*)/);var t=(m&&m[1])||localStorage.getItem("narve-theme")||localStorage.getItem("betyc-theme")||"light";document.documentElement.setAttribute("data-theme",t);}catch(e){document.documentElement.setAttribute("data-theme","light");}})();</script>
  <link rel="icon" type="image/png" href="/_gateway_static/img/logo.png">
  <link rel="apple-touch-icon" href="/_gateway_static/img/logo.png">
</head>
<body>
  <header class="admin-header">
    <h1>narve.ai admin {{ raw_nav_role }}</h1>
    <nav class="admin-nav">
      <a href="/admin">Overview</a>
      <a href="/admin/audit-log" class="active">Audit log</a>
      <a href="/dashboards">← Dashboards</a>
      <a href="/logout">Sign out</a>
    </nav>
  </header>
  <div class="admin-shell">
    {{ raw_body }}
  </div>
<script src="/_gateway_static/theme.js?v=2" defer></script>
  <script src="/_gateway_static/js/cmdk.js" defer></script>
  <script src="/_gateway_static/js/share_menu.js" defer></script>
  <script>
    // Click any audit-row to reveal the matching audit-expand row that
    // contains its before/after JSON, user agent, request id, and notes.
    // Keyboard users get the same toggle via Enter/Space because rows
    // carry tabindex="0".
    (function () {
      function toggleRow(row) {
        var id = row.getAttribute('data-expand-target');
        if (!id) return;
        var target = document.getElementById(id);
        if (!target) return;
        var nowHidden = target.hasAttribute('hidden');
        if (nowHidden) {
          target.removeAttribute('hidden');
          row.classList.add('audit-row--open');
        } else {
          target.setAttribute('hidden', '');
          row.classList.remove('audit-row--open');
        }
      }
      document.addEventListener('click', function (e) {
        var row = e.target && e.target.closest && e.target.closest('.audit-row');
        if (!row) return;
        if (e.target.closest && e.target.closest('a, button')) return;
        toggleRow(row);
      });
      document.addEventListener('keydown', function (e) {
        if (e.key !== 'Enter' && e.key !== ' ') return;
        var row = e.target && e.target.classList && e.target.classList.contains('audit-row')
          ? e.target : null;
        if (!row) return;
        e.preventDefault();
        toggleRow(row);
      });
    })();
  </script>
</body>
</html>
