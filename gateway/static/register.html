<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create account — narve.ai</title>
  <meta name="description" content="Create a narve.ai account.">
  <meta name="robots" content="noindex, nofollow">
  <link rel="stylesheet" href="{{ static: gateway.css }}">
  <link rel="stylesheet" href="{{ static: components.css }}">
  <link rel="preload" href="/_gateway_static/fonts/Inter-Variable-subset.woff2" as="font" type="font/woff2" crossorigin>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@1&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ static: pages/auth.css }}">
<script>(function(){try{var m=document.cookie.match(/narve-theme=([^;]*)/)||document.cookie.match(/betyc-theme=([^;]*)/);var t=(m&&m[1])||localStorage.getItem("narve-theme")||localStorage.getItem("betyc-theme")||"light";document.documentElement.setAttribute("data-theme",t);}catch(e){document.documentElement.setAttribute("data-theme","light");}})();</script>
  <link rel="icon" type="image/png" href="/_gateway_static/img/logo.png">
  <link rel="apple-touch-icon" href="/_gateway_static/img/logo.png">
</head>
<body>
  <a href="/" class="auth-brand">
    <img src="/_gateway_static/img/logo.png" alt="narve.ai">
    <span>narve.ai</span>
  </a>

  <div class="auth-card">
    <h1 class="auth-hero">Create account</h1>
    <p class="auth-sub">Set up your narve.ai account to continue.</p>

    <div class="auth-error" id="form-error">{{ error }}</div>

    <form class="auth-form" id="reg-form" onsubmit="return submitRegister(event)">
      {{ raw_csrf_field }}

      <div>
        <label for="display_name">Display name</label>
        <input class="auth-input" id="display_name" name="display_name" type="text"
               required minlength="2" maxlength="40" autocomplete="nickname" autofocus
               placeholder="How should we greet you?">
        <div class="auth-field-error" id="name-err"></div>
      </div>

      <div>
        <label for="email">Email address</label>
        <input class="auth-input" id="email" name="email" type="email"
               required autocomplete="email" placeholder="you@company.com">
        <div class="auth-field-error" id="email-err"></div>
      </div>

      <div>
        <label for="password">Password</label>
        <div class="pw-wrap">
          <input class="auth-input" id="password" name="password" type="password"
                 required minlength="12" autocomplete="new-password">
          <button class="pw-toggle" type="button" onclick="togglePw('password')" aria-label="Show password">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg>
          </button>
        </div>
        <div class="pw-strength">
          <div class="pw-seg" id="seg-1"></div>
          <div class="pw-seg" id="seg-2"></div>
          <div class="pw-seg" id="seg-3"></div>
          <div class="pw-seg" id="seg-4"></div>
        </div>
        <ul class="pw-rules">
          <li class="pw-rule" id="rule-len">At least 12 characters</li>
          <li class="pw-rule" id="rule-upper">One uppercase letter</li>
          <li class="pw-rule" id="rule-num">One number</li>
          <li class="pw-rule" id="rule-special">One special character</li>
        </ul>
        <div class="auth-field-error" id="pw-err"></div>
      </div>

      <div>
        <label for="confirm_password">Confirm password</label>
        <div class="pw-wrap">
          <input class="auth-input" id="confirm_password" name="confirm_password" type="password"
                 required minlength="12" autocomplete="new-password">
          <button class="pw-toggle" type="button" onclick="togglePw('confirm_password')" aria-label="Show password">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg>
          </button>
        </div>
        <div class="auth-field-error" id="confirm-err"></div>
      </div>

      <label class="auth-terms">
        <input type="checkbox" id="agree-terms" required>
        <span>I agree to the <a class="auth-link-serif" href="/terms">Terms</a> and <a class="auth-link-serif" href="/privacy">Privacy Policy</a>.</span>
      </label>

      <button class="auth-btn" id="reg-btn" type="submit">Create account</button>
    </form>
  </div>

<script>
function togglePw(id) {
  var input = document.getElementById(id);
  input.type = input.type === 'password' ? 'text' : 'password';
}

function getCsrf() {
  return (document.cookie.match(/(?:^|;\s*)_csrf=([^;]*)/) || [])[1] || '';
}

function checkPw() {
  var pw = document.getElementById('password').value;
  var rules = {
    'rule-len': pw.length >= 12,
    'rule-upper': /[A-Z]/.test(pw),
    'rule-num': /[0-9]/.test(pw),
    'rule-special': /[^A-Za-z0-9]/.test(pw),
  };
  var met = 0;
  for (var id in rules) {
    document.getElementById(id).classList.toggle('met', rules[id]);
    if (rules[id]) met++;
  }
  for (var i = 1; i <= 4; i++) {
    document.getElementById('seg-' + i).classList.toggle('filled', i <= met);
  }
  return met === 4;
}

document.getElementById('password').addEventListener('input', checkPw);

function submitRegister(ev) {
  ev.preventDefault();
  var btn = document.getElementById('reg-btn');
  var formErr = document.getElementById('form-error');
  formErr.textContent = '';
  ['name-err', 'email-err', 'pw-err', 'confirm-err'].forEach(function(id){
    document.getElementById(id).textContent = '';
  });

  var payload = {
    display_name: document.getElementById('display_name').value.trim(),
    email: document.getElementById('email').value.trim(),
    password: document.getElementById('password').value,
    confirm_password: document.getElementById('confirm_password').value,
  };

  if (!document.getElementById('agree-terms').checked) {
    formErr.textContent = 'Please agree to the Terms and Privacy Policy.';
    return false;
  }
  if (payload.password !== payload.confirm_password) {
    document.getElementById('confirm-err').textContent = 'Passwords do not match.';
    return false;
  }
  if (!checkPw()) {
    document.getElementById('pw-err').textContent = 'Password does not meet requirements.';
    return false;
  }

  btn.disabled = true;
  btn.textContent = 'Creating...';

  fetch('/auth/register', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'x-csrf-token': getCsrf() },
    body: JSON.stringify(payload),
  }).then(function(r) {
    return r.json().then(function(d){ return { ok: r.ok, status: r.status, data: d }; });
  }).then(function(res) {
    if (res.ok && res.data && res.data.success) {
      window.location.href = '/dashboards';
      return;
    }
    btn.disabled = false;
    btn.textContent = 'Create account';
    var err = (res.data && res.data.error) || 'Could not create account.';
    var field = (res.data && res.data.field) || null;
    if (field === 'email') document.getElementById('email-err').textContent = err;
    else if (field === 'password') document.getElementById('pw-err').textContent = err;
    else if (field === 'display_name') document.getElementById('name-err').textContent = err;
    else formErr.textContent = err;
  }).catch(function() {
    btn.disabled = false;
    btn.textContent = 'Create account';
    formErr.textContent = 'Network error. Try again.';
  });

  return false;
}
</script>
<script src="/_gateway_static/theme.js?v=2" defer></script>
  <script src="/_gateway_static/js/cmdk.js" defer></script>
  <script src="/_gateway_static/js/share_menu.js" defer></script>
</body>
</html>
