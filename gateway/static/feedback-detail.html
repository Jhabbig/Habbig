<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Feedback — narve.ai</title>
  <meta name="description" content="Admin: feedback item detail.">
  <meta name="robots" content="noindex, nofollow">
  <link rel="stylesheet" href="{{ static: gateway.css }}">
  <link rel="preload" href="/_gateway_static/fonts/Inter-Variable-subset.woff2" as="font" type="font/woff2" crossorigin>
  <link rel="stylesheet" href="{{ static: pages/feedback-detail.css }}">
<script>(function(){try{var m=document.cookie.match(/narve-theme=([^;]*)/)||document.cookie.match(/betyc-theme=([^;]*)/);var t=(m&&m[1])||localStorage.getItem("narve-theme")||localStorage.getItem("betyc-theme")||"light";document.documentElement.setAttribute("data-theme",t);}catch(e){document.documentElement.setAttribute("data-theme","light");}})();</script>
  <link rel="icon" type="image/png" href="/_gateway_static/img/logo.png">
  <link rel="apple-touch-icon" href="/_gateway_static/img/logo.png">
</head>
<body>
  <header class="gw-header">
    <div class="gw-brand">
      <img src="/_gateway_static/img/logo.png" alt="narve.ai" style="width:24px;height:24px;filter:invert(1);border-radius:4px">
      <span>narve.ai</span>
    </div>
    <nav class="gw-nav">
      <a href="/dashboards">Dashboards</a>
      <a href="/feedback" class="active">Feedback</a>
      <a href="/billing">Billing</a>
      <a href="/settings">Settings</a>
      {{ raw_admin_link }}
      <a href="/profile" class="gw-user-pill" style="text-decoration:none">{{ username }}</a>{{ raw_nav_role }}
      <a href="/logout">Sign out</a>
    </nav>
  </header>

  <main class="gw-main">
    <div class="fb-wrap">
      <div class="fb-crumbs">
        <a href="/feedback">Feedback</a> / #{{ feedback_id }}
      </div>

      <div class="fb-card">
        {{ raw_detail }}
      </div>

      <div class="fb-card">
        <h2 class="fb-section-title">Comments</h2>
        {{ raw_comments }}

        <form class="fb-comment-form" method="post" action="/api/feedback/{{ feedback_id }}/comment" style="margin-top:16px">
          <textarea name="body" placeholder="Add a comment…" maxlength="2000" required></textarea>
          <button type="submit">Post comment</button>
        </form>
      </div>
    </div>
  </main>

  <script src="/_gateway_static/feedback_button.js" defer></script>
</body>
</html>
