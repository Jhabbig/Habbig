<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Predictions — narve.ai</title>
  <meta name="description" content="Your predictions — track accuracy, Brier score, and streaks.">
  <meta name="robots" content="noindex, nofollow">
  <link rel="stylesheet" href="{{ static: gateway.css }}">
  <link rel="stylesheet" href="{{ static: components.css }}">
  <link rel="stylesheet" href="/_gateway_static/states.css">
  <link rel="stylesheet" href="/_gateway_static/skeletons.css">
  <link rel="stylesheet" href="/_gateway_static/filter_panel.css">
  <link rel="stylesheet" href="{{ static: pages/feeds.css }}">
  <link rel="preload" href="/_gateway_static/fonts/Inter-Variable-subset.woff2" as="font" type="font/woff2" crossorigin>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:opsz,wght@8..60,400;8..60,500;8..60,600&display=swap" rel="stylesheet">
<script>(function(){try{var m=document.cookie.match(/narve-theme=([^;]*)/)||document.cookie.match(/betyc-theme=([^;]*)/);var t=(m&&m[1])||localStorage.getItem("narve-theme")||localStorage.getItem("betyc-theme")||"light";document.documentElement.setAttribute("data-theme",t);}catch(e){document.documentElement.setAttribute("data-theme","light");}try{var dm=document.cookie.match(/nv-density=([^;]*)/);var d=(dm&&dm[1])||localStorage.getItem("nv-density")||"comfortable";if(d!=="comfortable"&&d!=="compact"){d="comfortable";}document.documentElement.setAttribute("data-density",d);}catch(e2){document.documentElement.setAttribute("data-density","comfortable");}})();</script>
  <link rel="icon" type="image/png" href="/_gateway_static/img/logo.png">
  <link rel="apple-touch-icon" href="/_gateway_static/img/logo.png">
</head>
<body>
  <div class="app-shell">

    {{ raw_sidebar }}

    <div class="main-content">
      <div class="feed-shell">

        <nav class="feed-back" aria-label="Breadcrumb">
          <a href="/dashboards" style="color:inherit;text-decoration:none">← narve.ai</a>
        </nav>

        <header class="feed-hero">
          <div class="feed-eyebrow">Your calls</div>
          <h1 class="feed-title">Predictions</h1>
          <p class="feed-lede">
            Every market you've called, tracked from open to resolution. Accuracy,
            Brier score, and streaks populate as markets close — lower Brier is
            better, 0.25 is a coin flip.
          </p>
        </header>

        <div class="feed-filters" role="toolbar" aria-label="Filter predictions">
          <input type="search" id="pred-search" class="feed-search" placeholder="Search market or question…" aria-label="Search your predictions">
          <button type="button" class="feed-chip is-active" data-filter="all">All</button>
          <button type="button" class="feed-chip" data-filter="active">Active</button>
          <button type="button" class="feed-chip" data-filter="correct">Correct</button>
          <button type="button" class="feed-chip" data-filter="incorrect">Incorrect</button>
          <span class="feed-count" id="pred-count" aria-live="polite"></span>
        </div>

        <main>
          <ul class="feed-list" id="predictions-body" aria-live="polite"></ul>
        </main>

      </div>
    </div>

  </div>

<script>
(function(){
  var body = document.getElementById('predictions-body');
  var countEl = document.getElementById('pred-count');
  var currentFilter = 'all';
  var allItems = [];

  function esc(s){ if (s === null || s === undefined) return '';
    return String(s).replace(/[&<>"']/g, function(m){ return ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[m]; }); }
  function fmtDate(ts){ if (!ts) return ''; var d = new Date(ts * 1000); return d.toLocaleDateString(); }
  function fmtPct(x, digits){ if (x === null || x === undefined) return '—'; return (x*100).toFixed(digits||0)+'%'; }
  function fmtPp(x){ if (x === null || x === undefined) return '—'; var v = x*100; return (v>=0?'+':'')+v.toFixed(0)+'pp'; }
  function initial(s){ s = (s || '').trim(); return s ? s.charAt(0).toUpperCase() : '?'; }

  function rowStatus(p){
    if (!p.resolved) return 'active';
    return p.resolved_correct ? 'correct' : 'incorrect';
  }

  function stateLabel(p){
    if (!p.resolved) return 'OPEN';
    return p.resolved_correct ? 'CORRECT' : 'MISS';
  }

  function renderRows(items){
    if (!items.length){
      body.innerHTML = '';
      body.insertAdjacentHTML('beforebegin', renderEmpty());
      countEl.textContent = '';
      return;
    }
    var existingEmpty = document.querySelector('.feed-shell .nv-empty[data-feed-empty]');
    if (existingEmpty) existingEmpty.remove();

    var html = items.map(function(p){
      var pct = Math.round((p.predicted_probability || 0) * 100);
      var edge = p.edge_at_prediction;
      var question = p.market_question || p.market_slug || '';
      var when = fmtDate(p.created_at);
      var status = rowStatus(p);
      var searchBlob = (question + ' ' + (p.market_slug || '')).toLowerCase();
      return (
        '<li data-pid="' + p.id + '" data-status="' + esc(status) + '" data-search="' + esc(searchBlob) + '">' +
          '<a class="feed-row" href="/market/' + encodeURIComponent(p.market_slug || '') + '">' +
            '<span class="feed-avatar" aria-hidden="true">' + esc(initial(question)) + '</span>' +
            '<div class="feed-body">' +
              '<div class="feed-handle">@you · ' + esc(stateLabel(p)) + (when ? ' · ' + esc(when) : '') + '</div>' +
              '<p class="feed-prose">' + esc(question) + '</p>' +
              '<div class="feed-meta">' +
                '<span>' + esc(p.predicted_outcome || '') + ' · ' + pct + '%</span>' +
                '<span>Edge ' + esc(fmtPp(edge)) + '</span>' +
              '</div>' +
            '</div>' +
            '<div class="feed-stats">' +
              '<span class="feed-stat-value">' + pct + '%</span>' +
              '<span class="feed-stat-label">Confidence</span>' +
            '</div>' +
            '<button type="button" class="feed-action feed-action--ghost save-btn" data-pid="' + p.id + '">Open</button>' +
          '</a>' +
        '</li>'
      );
    }).join('');
    body.innerHTML = html;
    applyClientFilter();
  }

  function renderEmpty(){
    return (
      '<div class="nv-empty" role="status" data-feed-empty>' +
        '<h2 class="nv-empty__title">No predictions yet</h2>' +
        '<p class="nv-empty__body">Open any market and record your call. Accuracy, Brier score, and streaks populate here as markets resolve — and your public profile surfaces the ones you got right.</p>' +
        '<div class="nv-empty__actions">' +
          '<a class="nv-empty__action nv-empty__action--primary" href="/dashboards">Browse markets</a>' +
          '<a class="nv-empty__action" href="/leaderboard">Top predictors</a>' +
        '</div>' +
      '</div>'
    );
  }

  function applyClientFilter(){
    var q = (document.getElementById('pred-search').value || '').trim().toLowerCase();
    var rows = body.querySelectorAll('li[data-pid]');
    var shown = 0;
    rows.forEach(function(row){
      var statusMatch = (currentFilter === 'all') ||
        (row.getAttribute('data-status') === currentFilter);
      var searchMatch = !q || (row.getAttribute('data-search') || '').indexOf(q) !== -1;
      var visible = statusMatch && searchMatch;
      row.style.display = visible ? '' : 'none';
      if (visible) shown += 1;
    });
    countEl.textContent = shown + ' / ' + rows.length;
  }

  function showSkeleton(){
    if (window.narveSkel && window.narveSkel.show) {
      // Editorial skeleton — render full-width row placeholders so the
      // page doesn't jolt when the fetch lands.
      var html = '';
      for (var i = 0; i < 6; i++) {
        html += '<li><div class="feed-row feed-row--skeleton" aria-hidden="true">' +
          '<span class="feed-avatar"></span>' +
          '<div class="feed-body">' +
            '<div class="feed-handle"></div>' +
            '<p class="feed-prose"></p>' +
          '</div>' +
          '<div class="feed-stats">' +
            '<span class="feed-stat-value"></span>' +
            '<span class="feed-stat-label"></span>' +
          '</div>' +
          '<span></span>' +
          '</div></li>';
      }
      body.innerHTML = html;
    } else {
      body.innerHTML = '';
    }
  }

  function load(){
    showSkeleton();
    fetch('/api/predictions/me?status=all')
      .then(function(r){
        if (!r.ok) throw new Error('http_' + r.status);
        return r.json();
      })
      .then(function(d){
        allItems = d.items || [];
        renderRows(allItems);
      })
      .catch(function(err){
        var is401 = err && String(err.message || '').indexOf('http_401') === 0;
        body.innerHTML =
          '<div class="error-state">' +
            '<svg class="error-state__icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true">' +
              '<circle cx="8" cy="8" r="6.5"/><line x1="8" y1="5" x2="8" y2="9"/><circle cx="8" cy="11.5" r="0.5" fill="currentColor"/>' +
            '</svg>' +
            '<div class="error-state__title">' +
              (is401 ? 'Your session expired' : 'Could not load predictions') +
            '</div>' +
            '<div class="error-state__body">' +
              (is401
                ? 'Sign in again to pick up where you left off.'
                : 'Check your connection and retry. If this keeps happening, it\'s on us.') +
            '</div>' +
            '<div class="error-state__actions">' +
              (is401
                ? '<a href="/token">Sign in</a>'
                : '<button type="button" id="pred-retry">Retry</button>') +
              '<a href="/dashboards">Back to dashboards</a>' +
            '</div>' +
          '</div>';
        var retry = document.getElementById('pred-retry');
        if (retry) retry.addEventListener('click', load);
      });
  }

  document.querySelectorAll('.feed-chip').forEach(function(chip){
    chip.addEventListener('click', function(){
      document.querySelectorAll('.feed-chip').forEach(function(c){ c.classList.remove('is-active'); });
      chip.classList.add('is-active');
      currentFilter = chip.getAttribute('data-filter');
      applyClientFilter();
    });
  });

  var searchInput = document.getElementById('pred-search');
  if (searchInput){ searchInput.addEventListener('input', applyClientFilter); }

  load();
})();
</script>
{{ raw_sitemap }}
<script src="/_gateway_static/theme.js?v=2" defer></script>
<script src="/_gateway_static/skeletons.js" defer></script>
<script src="/_gateway_static/toast.js" defer></script>
<script src="/_gateway_static/filter_panel.js" defer></script>
<script>
  document.addEventListener("DOMContentLoaded", function () {
    if (window.NarveFilterPanel && typeof window.NarveFilterPanel.mountSidebar === "function") {
      window.NarveFilterPanel.mountSidebar();
    }
  });
</script>
  <script src="/_gateway_static/js/cmdk.js" defer></script>
  <script src="/_gateway_static/js/share_menu.js" defer></script>
</body>
</html>
