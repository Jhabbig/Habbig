[pytest]
# Test discovery
testpaths = tests
# Adds qa_walk_*.py so tests/qa/ collects without renaming files.
# Original test_*.py glob still wins everywhere else.
python_files = test_*.py qa_walk_*.py
python_classes = Test*
python_functions = test_*

# Reporting: quiet by default, strict markers so typos fail loudly.
addopts = -q --strict-markers

# Explicit markers — opt-in categories the suite uses. The default run
# excludes slow + network tests by default via the tiered config below;
# CI flips the flag to include them with ``-m 'slow or network or not
# (slow or network)'``.
markers =
    slow: a single test > 2 s — skipped locally unless -m 'slow'
    network: requires upstream network (Polymarket/Kalshi/Anthropic live)
    integration: HTTP-level test that spins a TestClient against the app
    unit: pure-function unit test (no client, no DB fixtures)
    forensic: watermark / leak-protection checks
    e2e: full user-flow smoke test

# Async — pytest-asyncio is installed; default mode=strict so sync tests
# that accidentally leak a coroutine blow up loudly instead of silently
# passing.
asyncio_mode = strict

# Warnings: show DeprecationWarning from our own code but suppress the
# FastAPI on_event churn (already tracked upstream).
filterwarnings =
    ignore::DeprecationWarning:fastapi.*
    ignore::DeprecationWarning:starlette.*
    ignore::pytest.PytestDeprecationWarning
