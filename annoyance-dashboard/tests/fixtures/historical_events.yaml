# Historical ground-truth events for the annoyance-dashboard backtest.
#
# Each entry represents a real public-frustration moment the detector should
# have flagged had it been running. The ``target_window_iso`` is the hour we
# expect a spike for ``entity`` to have fired. ``corpus_posts`` is a seed
# list of representative social-media-style complaints — the backtest
# replays them through classify → aggregate → detect to check whether a
# spike fires for that entity in the target hour.
#
# Calibration (DECISIONS.md #9): 5–10 spikes/day at full production scale.
# The backtest prints per-event hit/miss AND a simulated daily rate against
# the current gate thresholds (z>=3, mult>=3, count>=5, multi-source).
#
# ``severity`` informs expected confidence_score only — not whether the
# spike fires. Values: minor | moderate | major | watershed.

events:

  # ── Airlines ───────────────────────────────────────────────────────────────
