[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"
asyncio_default_fixture_loop_scope = "function"
python_files = ["test_*.py"]
python_functions = ["test_*"]
addopts = [
    "-ra",
    "--strict-markers",
    "--tb=short",
]
markers = [
    "integration: end-to-end tests exercising multiple modules and the FastAPI surface",
    "requires_api_key: tests that call a real ANTHROPIC_API_KEY; skipped by default",
    "backtest: historical-event replay scenarios, slow, optional in CI",
]
filterwarnings = [
    "ignore::DeprecationWarning",
    "ignore::PendingDeprecationWarning",
]
