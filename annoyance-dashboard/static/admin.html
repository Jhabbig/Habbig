<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>narve.ai — Admin</title>
<link rel="stylesheet" href="/static/annoyance.css">
<style>
  .admin-main { max-width: 1100px; margin: 0 auto; padding: 28px; }
  .admin-head { margin-bottom: 20px; }
  .fp-grid {
    display: grid;
    grid-template-columns: 140px 1fr auto;
    gap: 10px 16px;
    align-items: start;
    font-size: 13px;
  }
  .fp-row {
    display: contents;
  }
  .fp-cell {
    padding: 12px 14px;
    background: var(--surface-elev);
    border: 1px solid var(--border);
    border-right: none;
  }
  .fp-cell:last-child { border-right: 1px solid var(--border); }
  .fp-entity { font-weight: 600; }
  .fp-meta {
    display: block;
    font-size: 10px;
    color: var(--text-muted);
    letter-spacing: 0.04em;
    text-transform: uppercase;
    margin-top: 4px;
  }
  .fp-reason {
    color: var(--text-dim);
    line-height: 1.45;
  }
  .fp-reason-empty { font-style: italic; color: var(--text-muted); }
  .fp-submitter { color: var(--text-muted); font-size: 11px; margin-top: 4px; }
  .fp-resolve {
    background: var(--accent);
    color: var(--bg);
    border: none;
    padding: 8px 14px;
    font-size: 12px;
    font-weight: 600;
    border-radius: 6px;
    cursor: pointer;
    align-self: center;
  }
  .fp-resolve:hover { opacity: 0.85; }
  .fp-resolve:disabled { opacity: 0.4; cursor: default; }

  /* Corroboration pill strip — surfaces posts/authors ratio so reviewers
     can spot coordinated gaming (many posts, few authors) at a glance. */
  .fp-sources {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-top: 8px;
  }
  .fp-src-pill {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 3px 8px;
    border-radius: 12px;
    background: var(--bg);
    border: 1px solid var(--border);
    font-size: 11px;
    letter-spacing: 0.02em;
  }
  .fp-src-name { font-weight: 600; text-transform: uppercase; font-size: 10px; color: var(--text-dim); }
  .fp-src-ratio { color: var(--text-muted); font-variant-numeric: tabular-nums; }
  .fp-src-pill.suspicious {
    border-color: #f59e0b;
    background: rgba(245, 158, 11, 0.08);
  }
  .fp-src-pill.suspicious .fp-src-ratio { color: #f59e0b; font-weight: 600; }
  .fp-src-pill[title] { cursor: help; }
</style>
</head>
<body>

<header class="topbar">
  <div class="brand">
    <a href="/" class="logo">narve.ai</a>
    <span class="divider">/</span>
    <span class="dashname">Admin</span>
  </div>
  <div class="status">
    <a href="/" class="source-pill" style="text-decoration:underline">← back</a>
  </div>
</header>

<main class="admin-main">
  <div class="admin-head">
    <h1 style="margin:0 0 4px;font-size:24px;font-weight:700;letter-spacing:-0.01em;">FP review queue</h1>
    <div style="font-size:12px;color:var(--text-dim);">Unresolved false-positive flags. Review → add a note → resolve.</div>
  </div>

  <div class="panel">
    <div id="fp-queue" class="fp-grid">
      <div class="empty-small" style="grid-column:1 / -1;">loading…</div>
    </div>
  </div>
</main>

<footer class="footer">
  <span class="muted">localhost + super_admin only</span>
</footer>

<script src="/static/admin.js"></script>
</body>
</html>
