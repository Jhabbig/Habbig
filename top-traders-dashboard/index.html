<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Polymarket · Top 3 Traders</title>
<style>
  :root {
    --bg: #0c0d10;
    --panel: #131417;
    --panel-2: #18191e;
    --border: rgba(255,255,255,0.06);
    --text: #ebebef;
    --text-dim: #8b8d98;
    --green: #34d399;
    --red: #f87171;
    --brand: #818cf8;
    --gold: #fbbf24;
    --silver: #c0c6d1;
    --bronze: #cd7f32;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    font-size: 14px;
  }
  header {
    padding: 20px 24px 14px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 12px;
    background: var(--panel);
  }
  header h1 {
    margin: 0;
    font-size: 20px;
    font-weight: 600;
    letter-spacing: 0.2px;
  }
  header .sub {
    color: var(--text-dim);
    font-size: 12px;
    margin-top: 2px;
  }
  .controls {
    display: flex;
    gap: 8px;
    align-items: center;
  }
  .controls label { color: var(--text-dim); font-size: 12px; }
  .controls select {
    background: var(--panel-2);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 6px 10px;
    font-size: 13px;
  }
  .status {
    color: var(--text-dim);
    font-size: 11px;
    font-family: "SF Mono", Menlo, monospace;
  }
  main {
    padding: 20px 24px 60px;
    max-width: 1600px;
    margin: 0 auto;
  }
  .grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 18px;
  }
  @media (max-width: 1100px) {
    .grid { grid-template-columns: 1fr; }
  }
  .trader-card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    min-height: 500px;
  }
  .trader-head {
    padding: 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    gap: 12px;
    align-items: center;
    background: var(--panel-2);
  }
  .rank-badge {
    width: 36px; height: 36px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-weight: 700;
    font-size: 15px;
    flex-shrink: 0;
    color: #0b0f14;
  }
  .rank-1 { background: var(--gold); }
  .rank-2 { background: var(--silver); }
  .rank-3 { background: var(--bronze); }
  .avatar {
    width: 44px; height: 44px;
    border-radius: 50%;
    background: #2a3446;
    flex-shrink: 0;
    object-fit: cover;
    border: 1px solid var(--border);
  }
  .trader-meta {
    flex: 1;
    min-width: 0;
  }
  .trader-name {
    font-size: 15px;
    font-weight: 600;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .trader-wallet {
    font-family: "SF Mono", Menlo, monospace;
    font-size: 10px;
    color: var(--text-dim);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .trader-volume {
    font-size: 12px;
    color: var(--brand);
    font-weight: 600;
    margin-top: 2px;
  }
  .trades-list {
    flex: 1;
    overflow-y: auto;
    padding: 4px 0;
    max-height: 70vh;
  }
  .trade {
    padding: 10px 16px;
    border-bottom: 1px solid rgba(36, 48, 68, 0.5);
    font-size: 12px;
    display: flex;
    gap: 10px;
    align-items: flex-start;
  }
  .trade:hover { background: rgba(79, 140, 255, 0.04); }
  .trade-icon {
    width: 28px; height: 28px;
    border-radius: 4px;
    flex-shrink: 0;
    background: #2a3446;
    object-fit: cover;
  }
  .trade-body { flex: 1; min-width: 0; }
  .trade-title {
    font-weight: 500;
    color: var(--text);
    line-height: 1.3;
    overflow: hidden;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
  }
  .trade-row {
    margin-top: 4px;
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    color: var(--text-dim);
    font-size: 11px;
  }
  .pill {
    padding: 1px 6px;
    border-radius: 4px;
    font-weight: 600;
    font-size: 10px;
    letter-spacing: 0.3px;
  }
  .pill-buy { background: rgba(46, 204, 113, 0.18); color: var(--green); }
  .pill-sell { background: rgba(255, 85, 102, 0.18); color: var(--red); }
  .pill-outcome-yes { background: rgba(79, 140, 255, 0.18); color: var(--brand); }
  .pill-outcome-no { background: rgba(255, 209, 102, 0.18); color: var(--gold); }
  .pill-outcome-other { background: rgba(139, 151, 170, 0.18); color: var(--text-dim); }
  .empty {
    padding: 40px 20px;
    text-align: center;
    color: var(--text-dim);
  }
  .loading { padding: 40px 20px; text-align: center; color: var(--text-dim); }
  .err {
    padding: 20px;
    background: rgba(255, 85, 102, 0.1);
    border: 1px solid rgba(255, 85, 102, 0.3);
    border-radius: 8px;
    color: var(--red);
    margin: 20px 0;
  }
  .notional { font-weight: 600; color: var(--text); }
</style>
</head>
<body>

<header>
  <div>
    <h1>Polymarket · Top 3 Traders</h1>
    <div class="sub">Live trades of the highest-volume wallets</div>
  </div>
  <div class="controls">
    <label for="window">Window</label>
    <select id="window">
      <option value="all">All time</option>
      <option value="30d">30 days</option>
      <option value="7d">7 days</option>
      <option value="1d">1 day</option>
    </select>
    <label for="limit">Trades</label>
    <select id="limit">
      <option value="25">25</option>
      <option value="50">50</option>
      <option value="100">100</option>
    </select>
    <span class="status" id="status">—</span>
  </div>
</header>

<main>
  <div id="err-box"></div>
  <div class="grid" id="grid">
    <div class="loading">Loading top traders…</div>
  </div>
</main>

<script>
const grid    = document.getElementById("grid");
const errBox  = document.getElementById("err-box");
const status  = document.getElementById("status");
const winSel  = document.getElementById("window");
const limSel  = document.getElementById("limit");

const fmtMoney = (n) => {
  if (n == null) return "—";
  const num = Number(n);
  if (num >= 1e9) return "$" + (num / 1e9).toFixed(2) + "B";
  if (num >= 1e6) return "$" + (num / 1e6).toFixed(2) + "M";
  if (num >= 1e3) return "$" + (num / 1e3).toFixed(1) + "K";
  return "$" + num.toFixed(2);
};

const fmtPrice = (p) => (p == null ? "—" : (Number(p) * 100).toFixed(1) + "¢");

const fmtAgo = (ts) => {
  if (!ts) return "—";
  const diff = Date.now() / 1000 - ts;
  if (diff < 60) return Math.round(diff) + "s ago";
  if (diff < 3600) return Math.round(diff / 60) + "m ago";
  if (diff < 86400) return Math.round(diff / 3600) + "h ago";
  return Math.round(diff / 86400) + "d ago";
};

const outcomePill = (outcome) => {
  const o = (outcome || "").toLowerCase();
  if (o === "yes") return "pill-outcome-yes";
  if (o === "no") return "pill-outcome-no";
  return "pill-outcome-other";
};

const shortAddr = (a) => (a ? a.slice(0, 6) + "…" + a.slice(-4) : "");

function renderTrade(t) {
  const side = (t.side || "").toUpperCase();
  const sideCls = side === "BUY" ? "pill-buy" : "pill-sell";
  const notional = (Number(t.size) || 0) * (Number(t.price) || 0);
  const icon = t.icon
    ? `<img class="trade-icon" src="${t.icon}" onerror="this.style.display='none'" />`
    : `<div class="trade-icon"></div>`;

  return `
    <div class="trade">
      ${icon}
      <div class="trade-body">
        <div class="trade-title">${escapeHtml(t.title || "(untitled market)")}</div>
        <div class="trade-row">
          <span class="pill ${sideCls}">${side}</span>
          <span class="pill ${outcomePill(t.outcome)}">${escapeHtml(t.outcome || "?")}</span>
          <span>@ ${fmtPrice(t.price)}</span>
          <span class="notional">${fmtMoney(notional)}</span>
          <span>· ${fmtAgo(t.timestamp)}</span>
        </div>
      </div>
    </div>
  `;
}

function renderTraderCard(trader) {
  const rank = trader.rank;
  const avatar = trader.profileImage
    ? `<img class="avatar" src="${trader.profileImage}" onerror="this.style.display='none'" />`
    : `<div class="avatar"></div>`;
  const trades = trader.trades || [];
  const tradesHtml = trades.length
    ? trades.map(renderTrade).join("")
    : `<div class="empty">No recent trades</div>`;

  return `
    <div class="trader-card">
      <div class="trader-head">
        <div class="rank-badge rank-${rank}">${rank}</div>
        ${avatar}
        <div class="trader-meta">
          <div class="trader-name">${escapeHtml(trader.name || "Anonymous")}</div>
          <div class="trader-wallet">${shortAddr(trader.proxyWallet)}</div>
          <div class="trader-volume">${fmtMoney(trader.volume)} volume</div>
        </div>
      </div>
      <div class="trades-list">${tradesHtml}</div>
    </div>
  `;
}

function escapeHtml(s) {
  return String(s || "")
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#039;");
}

async function loadData() {
  const window_ = winSel.value;
  const limit   = limSel.value;
  status.textContent = "loading…";
  errBox.innerHTML = "";

  try {
    const r = await fetch(`/api/top-traders?window=${window_}&trades_per_trader=${limit}`);
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    const data = await r.json();
    const traders = data.traders || [];

    if (!traders.length) {
      grid.innerHTML = `<div class="empty">No traders returned.</div>`;
    } else {
      grid.innerHTML = traders.map(renderTraderCard).join("");
    }

    const ts = new Date(data.fetched_at * 1000).toLocaleTimeString();
    status.textContent = `updated ${ts}`;
  } catch (e) {
    errBox.innerHTML = `<div class="err">Failed to load data: ${escapeHtml(e.message)}</div>`;
    status.textContent = "error";
  }
}

winSel.addEventListener("change", loadData);
limSel.addEventListener("change", loadData);
loadData();
setInterval(loadData, 30000); // refresh every 30s
</script>
</body>
</html>
