<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Culture — State of</title>
<style>
  :root {
    --bg: #0b0d10;
    --panel: #14181d;
    --panel-2: #1b2128;
    --border: #232a32;
    --fg: #e6edf3;
    --muted: #8b949e;
    --accent: #ec4899;
    --good: #34d399;
    --warn: #fbbf24;
    --bad:  #f87171;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; background: var(--bg); color: var(--fg);
               font-family: -apple-system, BlinkMacSystemFont, "Segoe UI",
                            Roboto, sans-serif; }
  header { padding: 18px 22px; border-bottom: 1px solid var(--border);
           display: flex; align-items: center; gap: 16px; }
  header h1 { margin: 0; font-size: 18px; font-weight: 600; }
  header .sub { color: var(--muted); font-size: 12px; }
  header button { margin-left: auto; background: var(--panel-2); color: var(--fg);
                  border: 1px solid var(--border); padding: 6px 12px;
                  border-radius: 6px; cursor: pointer; font-size: 12px; }
  header button:hover { border-color: var(--accent); }

  main { padding: 22px; max-width: 1400px; margin: 0 auto; }

  .top-row { display: grid; grid-template-columns: 320px 1fr;
             gap: 18px; margin-bottom: 22px; }
  @media (max-width: 800px) { .top-row { grid-template-columns: 1fr; } }

  .index-card { background: var(--panel); border: 1px solid var(--border);
                border-radius: 10px; padding: 22px; display: flex;
                flex-direction: column; gap: 6px; }
  .index-card .label { color: var(--muted); font-size: 12px;
                       text-transform: uppercase; letter-spacing: 0.08em; }
  .index-card .value { font-size: 56px; font-weight: 700; line-height: 1;
                       margin-top: 4px; color: var(--accent); }
  .index-card .meta { color: var(--muted); font-size: 12px; }
  .spark { width: 100%; height: 60px; margin-top: 6px; }
  .spark-empty { color: var(--muted); font-size: 11px;
                 text-align: center; padding: 16px 0; font-style: italic; }
  .dupes { color: var(--muted); font-size: 11px; margin-top: 2px; }
  .dupes a { color: var(--muted); text-decoration: underline dotted; }
  .dupes a:hover { color: var(--accent); }

  .breakdown { background: var(--panel); border: 1px solid var(--border);
               border-radius: 10px; padding: 18px; }
  .breakdown h2 { margin: 0 0 12px; font-size: 13px; color: var(--muted);
                  text-transform: uppercase; letter-spacing: 0.08em; }
  .bars { display: grid; gap: 8px; }
  .bar-row { display: grid; grid-template-columns: 130px 1fr 60px;
             gap: 10px; align-items: center; font-size: 13px; }
  .bar-row .name { text-transform: capitalize; color: var(--muted); }
  .bar-row .val { text-align: right; font-variant-numeric: tabular-nums; }
  .bar-track { height: 8px; background: var(--panel-2); border-radius: 4px;
               overflow: hidden; }
  .bar-fill { height: 100%; background: var(--accent); border-radius: 4px;
              transition: width 0.3s ease; }
  .bar-row.dim .name, .bar-row.dim .val { color: #555; }

  .sections { display: grid; grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
              gap: 18px; }
  .section { background: var(--panel); border: 1px solid var(--border);
             border-radius: 10px; padding: 16px; min-height: 240px; }
  .section h2 { margin: 0 0 4px; font-size: 14px; }
  .section .sub { color: var(--muted); font-size: 11px; margin-bottom: 12px; }
  .section ul { list-style: none; padding: 0; margin: 0;
                max-height: 480px; overflow-y: auto; }
  .section li { display: grid; grid-template-columns: 18px 40px 1fr; gap: 10px;
                padding: 8px 0; border-bottom: 1px solid var(--border);
                font-size: 13px; align-items: center; }
  .section li:last-child { border-bottom: none; }
  .rank { color: var(--muted); font-variant-numeric: tabular-nums;
          font-size: 11px; text-align: right; }
  .thumb { width: 40px; height: 40px; object-fit: cover; border-radius: 4px;
           background: var(--panel-2); }
  .thumb.empty { display: block; }
  .title { line-height: 1.3; }
  .title a { color: var(--fg); text-decoration: none; }
  .title a:hover { color: var(--accent); }
  .title .meta { color: var(--muted); font-size: 11px; margin-top: 2px; }
  .empty-state { color: var(--muted); font-size: 12px; padding: 40px 0;
                 text-align: center; font-style: italic; }

  .health-strip { font-size: 11px; color: var(--muted); margin-top: 24px;
                  padding-top: 14px; border-top: 1px solid var(--border); }
  .health-strip .src { display: inline-block; margin-right: 12px; }
  .health-strip .ok { color: var(--good); }
  .health-strip .err { color: var(--bad); }
</style>
</head>
<body>
<header>
  <h1>State of Culture</h1>
  <span class="sub" id="updated">loading…</span>
  <button id="refresh">Refresh now</button>
</header>

<main>
  <div class="top-row">
    <div class="index-card">
      <div class="label">Culture index</div>
      <div class="value" id="overall">—</div>
      <div class="meta" id="overall-meta">computing…</div>
      <svg class="spark" id="spark" viewBox="0 0 200 60" preserveAspectRatio="none"
           aria-hidden="true"></svg>
      <div class="spark-empty" id="spark-empty">history will appear after first hour</div>
    </div>
    <div class="breakdown">
      <h2>Section signal</h2>
      <div class="bars" id="bars"></div>
    </div>
  </div>

  <div class="sections" id="sections"></div>

  <div class="health-strip" id="health"></div>
</main>

<script>
const SECTION_META = {
  memes:         { title: "Memes & viral",  sub: "TikTok / Instagram / Reddit / KYM" },
  attention:     { title: "Attention",      sub: "Trends / Wikipedia / YouTube / X" },
  entertainment: { title: "Entertainment",  sub: "Box office, charts, Steam" },
  markets:       { title: "Culture markets",sub: "Polymarket — pop culture" },
  news:          { title: "News & sentiment", sub: "Top headlines · positive − negative" },
  language:      { title: "Language & ideas", sub: "Slang, Substack rising" },
  lifestyle:     { title: "Lifestyle",      sub: "NYT bestsellers · Lyst · Pinterest" },
};
const ORDER = ["memes", "attention", "entertainment", "markets", "news", "language", "lifestyle"];

function drawSpark(points) {
  const svg = document.getElementById("spark");
  const empty = document.getElementById("spark-empty");
  const vals = (points || []).map(p => p.overall).filter(v => v != null);
  if (vals.length < 2) {
    svg.innerHTML = "";
    empty.style.display = "block";
    return;
  }
  empty.style.display = "none";
  const W = 200, H = 60, pad = 4;
  const min = Math.min(...vals), max = Math.max(...vals);
  const range = (max - min) || 1;
  const step = (W - 2 * pad) / (vals.length - 1);
  const path = vals.map((v, i) => {
    const x = pad + i * step;
    const y = H - pad - ((v - min) / range) * (H - 2 * pad);
    return `${i === 0 ? "M" : "L"}${x.toFixed(1)},${y.toFixed(1)}`;
  }).join(" ");
  const last = vals[vals.length - 1];
  const lastY = H - pad - ((last - min) / range) * (H - 2 * pad);
  svg.innerHTML = `
    <path d="${path}" fill="none" stroke="var(--accent)" stroke-width="1.5"/>
    <circle cx="${(W - pad).toFixed(1)}" cy="${lastY.toFixed(1)}" r="2.5"
            fill="var(--accent)"/>`;
}

const fmt = n => {
  if (n == null) return "—";
  if (n >= 1e9) return (n / 1e9).toFixed(1) + "B";
  if (n >= 1e6) return (n / 1e6).toFixed(1) + "M";
  if (n >= 1e3) return (n / 1e3).toFixed(1) + "k";
  return Math.round(n).toString();
};

async function loadIndex() {
  const [r, rh] = await Promise.all([
    fetch("/api/index"),
    fetch("/api/index/history?hours=72"),
  ]);
  const data = await r.json();
  const history = await rh.json();
  document.getElementById("overall").textContent =
    data.overall == null ? "—" : data.overall.toFixed(1);
  document.getElementById("overall-meta").textContent =
    "weighted across " + Object.keys(data.sections).length + " sections";
  drawSpark(history.points);

  const bars = document.getElementById("bars");
  bars.innerHTML = "";
  for (const s of ORDER) {
    const row = data.sections[s] || {};
    const score = row.score;
    const dim = score == null;
    const div = document.createElement("div");
    div.className = "bar-row" + (dim ? " dim" : "");
    div.innerHTML = `
      <div class="name">${s}</div>
      <div class="bar-track"><div class="bar-fill"
        style="width:${dim ? 0 : score}%"></div></div>
      <div class="val">${dim ? "—" : score.toFixed(1)}</div>`;
    bars.appendChild(div);
  }
}

async function loadSection(section) {
  const r = await fetch("/api/section/" + section + "?limit=20");
  const { items } = await r.json();
  const card = document.createElement("section");
  card.className = "section";
  const meta = SECTION_META[section] || { title: section, sub: "" };
  card.innerHTML = `<h2>${meta.title}</h2><div class="sub">${meta.sub}</div>`;
  if (!items.length) {
    card.insertAdjacentHTML("beforeend",
      '<div class="empty-state">No data yet. Add API keys in .env or click Refresh.</div>');
    return card;
  }
  const ul = document.createElement("ul");
  items.forEach((it, i) => {
    const li = document.createElement("li");
    const titleHtml = it.url
      ? `<a href="${it.url}" target="_blank" rel="noopener noreferrer">${it.title}</a>`
      : it.title;
    const metaBits = [];
    if (it.source) metaBits.push(it.source);
    if (it.score != null) metaBits.push("score " + fmt(it.score));
    if (it.extra && it.extra.author) metaBits.push("@" + it.extra.author);
    if (it.extra && it.extra.sub) metaBits.push("r/" + it.extra.sub);
    let dupesHtml = "";
    const dupes = it.extra && it.extra.dupes;
    if (dupes && dupes.length) {
      const links = dupes.slice(0, 4).map(d =>
        d.url
          ? `<a href="${d.url}" target="_blank" rel="noopener noreferrer">${d.source}</a>`
          : d.source
      ).join(", ");
      dupesHtml = `<div class="dupes">also on ${links}` +
        (dupes.length > 4 ? ` +${dupes.length - 4}` : "") + `</div>`;
    }
    li.innerHTML = `
      <div class="rank">${i + 1}</div>
      ${it.image
        ? `<img class="thumb" src="${it.image}" loading="lazy"
                referrerpolicy="no-referrer"
                onerror="this.classList.add('empty');this.removeAttribute('src')">`
        : `<div class="thumb empty"></div>`}
      <div class="title">${titleHtml}<div class="meta">${metaBits.join(" · ")}</div>${dupesHtml}</div>`;
    ul.appendChild(li);
  });
  card.appendChild(ul);
  return card;
}

async function loadSections() {
  const root = document.getElementById("sections");
  root.innerHTML = "";
  const cards = await Promise.all(ORDER.map(loadSection));
  cards.forEach(c => root.appendChild(c));
}

async function loadHealth() {
  const r = await fetch("/api/health");
  const data = await r.json();
  const root = document.getElementById("health");
  root.innerHTML = data.sources.map(s => {
    const cls = s.last_ok ? "ok" : "err";
    const ago = s.last_run ? ((Date.now() / 1000 - s.last_run) / 60).toFixed(0) + "m" : "—";
    return `<span class="src ${cls}">${s.source}: ${ago}</span>`;
  }).join("");
}

async function refreshAll() {
  document.getElementById("updated").textContent = "refreshing…";
  await Promise.all([loadIndex(), loadSections(), loadHealth()]);
  document.getElementById("updated").textContent = new Date().toLocaleTimeString();
}

document.getElementById("refresh").addEventListener("click", async () => {
  await fetch("/api/refresh", { method: "POST" });
  setTimeout(refreshAll, 4000);
});

refreshAll();
setInterval(refreshAll, 5 * 60 * 1000);
</script>
</body>
</html>
