name: secret-scan

# TruffleHog scans every push + PR for committed secrets — Stripe keys,
# Anthropic keys, AWS keys, Slack tokens, and ~700 other detectable
# credential shapes. Any verified hit fails the workflow so the PR can't
# merge without the secret either being rotated + removed, or explicitly
# acknowledged as a false positive.
#
# Related:
#   - SECRETS.md  — rotation runbook if a real hit lands
#   - .gitignore  — should already exclude .env, .env.*, auth.db, keys.pem
#   - gateway/config.py validate_config() — catches misshapen (not leaked) secrets at runtime
#
# Rotation of any finding is mandatory. A delete-from-git-history is NOT
# sufficient — assume the history is mirrored somewhere you don't control.

on:
  push:
    branches: [main, feature/*]
  pull_request:
    branches: [main]
  # Manual trigger for running the scan against the full history on demand.
  workflow_dispatch:

permissions:
  contents: read

jobs:
  trufflehog:
    name: TruffleHog OSS
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history so diff-range scans have something to compare against.
          # For PRs, TruffleHog only scans the diff between base and head.
          fetch-depth: 0

      - name: TruffleHog OSS — verified-only
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          # Scan only the range from main to HEAD on PRs and pushes.
          # On workflow_dispatch / push to main we fall back to scanning
          # every commit since the repo started.
          base: ${{ github.event.pull_request.base.sha || github.event.before }}
          head: ${{ github.event.pull_request.head.sha || github.sha }}
          # --only-verified cuts false positives. TruffleHog tries each
          # detected secret against the issuer (e.g. Stripe) and only
          # flags if the issuer confirms "yes, this is a live key".
          extra_args: --only-verified --fail
