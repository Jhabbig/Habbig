name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_call:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff
      - name: Lint all services
        run: >
          ruff check
          gateway/
          crypto-dashboard/
          stock-dashboard/
          midterm-dashboard/
          top-traders-dashboard/
          polymarket_weather_dashboard/
          sports-dashboard/
          world-state-dashboard/

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build all images
        run: docker compose build
