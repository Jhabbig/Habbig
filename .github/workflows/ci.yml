name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_call:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff
      - name: Lint all services
        run: >
          ruff check
          gateway/
          crypto-dashboard/
          stock-dashboard/
          midterm-dashboard/
          top-traders-dashboard/
          polymarket_weather_dashboard/
          sports-dashboard/
          world-state-dashboard/
          climate-dashboard/

  test-climate-dashboard:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: climate-dashboard
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install runtime + test deps
        run: pip install -r requirements.txt pytest
      - name: Run pytest
        run: python -m pytest tests/

  headless-dom-check-climate-dashboard:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: climate-dashboard
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install jsdom (transient — not committed)
        run: npm install --no-save --no-package-lock jsdom@^25
      - name: Run headless-DOM smoke test
        run: node scripts/check_dom.js

  docker-build:
    runs-on: ubuntu-latest
    env:
      # Compose interpolates ${REDIS_PASSWORD:?...} at parse time, so the build
      # step needs *some* value. The password is only read at runtime by redis,
      # not during the build.
      REDIS_PASSWORD: ci-build
    steps:
      - uses: actions/checkout@v4
      - name: Build all images
        run: docker compose build
