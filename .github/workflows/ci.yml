name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_call:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff
      - name: Lint all services
        run: >
          ruff check
          gateway/
          crypto-dashboard/
          stock-dashboard/
          midterm-dashboard/
          top-traders-dashboard/
          polymarket_weather_dashboard/
          sports-dashboard/
          world-state-dashboard/
          climate-dashboard/

  docker-build:
    runs-on: ubuntu-latest
    env:
      # Compose interpolates ${REDIS_PASSWORD:?...} at parse time, so the build
      # step needs *some* value. The password is only read at runtime by redis,
      # not during the build.
      REDIS_PASSWORD: ci-build
    steps:
      - uses: actions/checkout@v4
      - name: Build all images
        run: docker compose build
