name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_call:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff
      - name: Lint all services
        run: >
          ruff check
          gateway/
          crypto-dashboard/
          stock-dashboard/
          midterm-dashboard/
          top-traders-dashboard/
          polymarket_weather_dashboard/
          sports-dashboard/
          world-state-dashboard/
          climate-dashboard/

  test-sports-dashboard:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sports-dashboard
    env:
      # Tests synthesize a local dev user via DEV_MODE so they can
      # exercise auth-gated endpoints without a real gateway.
      DEV_MODE: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            sports-dashboard/requirements.txt
            sports-dashboard/requirements-dev.txt
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt
      - name: Run test suite
        # Use `python -m pytest` so the installed deps and the test
        # runner come from the same interpreter (the one cached above).
        run: python -m pytest tests/ -q --color=yes

  docker-build:
    runs-on: ubuntu-latest
    env:
      # Compose interpolates ${REDIS_PASSWORD:?...} at parse time, so the build
      # step needs *some* value. The password is only read at runtime by redis,
      # not during the build.
      REDIS_PASSWORD: ci-build
    steps:
      - uses: actions/checkout@v4
      - name: Build all images
        run: docker compose build
