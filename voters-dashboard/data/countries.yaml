# Curated countries for the Voters Dashboard.
#
# Tier A — full depth (demographics, issue salience, democracy, elections, comments)
# Tier B — election-cycle deep (same fields, lighter polling history)
# Tier C — watchlist stub (election dates only)
#
# All `issue_salience` percentages are best-effort curated from public polling
# (Pew Global Attitudes, Eurobarometer, national pollsters, Edelman Trust
# Barometer). Each carries a `source` and `as_of` date — UI displays both.
# ETL scripts overwrite the demographics block with World Bank pulls; everything
# else is hand-curated and version-controlled.
#
# Latitude/longitude are approximate country centroids for the map.

