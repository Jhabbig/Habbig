# Political context overlay — current leader, party spectrum, regional
# breakdown. The server merges this into /api/country/{iso} so the drawer
# can show:
#   • who currently runs the country (and their approval)
#   • where each major party sits on the left-right axis (and seats/share)
#   • which provinces / states / regions tilt which way
#
# All positions are author-curated -10 (far left) to +10 (far right) on
# the economic axis. Where social-axis positioning materially differs
# from economic (e.g. Hindu-nationalist BJP, evangelical PiS), we add an
# optional `social` field with the same scale.
#
# Schema:
#   countries[ISO].leader:
#     name, role, party_abbr, since (YYYY-MM), approval_pct, approval_source,
#     bio (one-liner)
#   countries[ISO].parties[]:
#     abbr, name, position (-10..+10 econ), social (-10..+10, optional),
#     seats, total_seats, vote_share_pct, color (hex), in_government (bool),
#     leader (name)
#   countries[ISO].regions[]:
#     name, population_m (optional), top_issue, lean (party_abbr or "swing"),
#     note (one-liner)

