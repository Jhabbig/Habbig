# Supplementary voter-influence data — merged into the main influences
# overlay at request time. Adds:
#   • trust_extra:     trust in military / courts / police separately
#                      (Edelman Trust Barometer, Latinobarómetro, Afrobarometer, Arab Barometer)
#   • identity_extra:  Gini coefficient, generational mix, last-election turnout
#                      (World Bank, UN DESA, IDEA Voter Turnout DB)
#   • security:        homicide rate (UNODC), terror salience, climate-disaster
#                      memory, military's political role, internet freedom
#                      (UNODC, GTI, ND-GAIN climate vulnerability, Freedom House
#                      Internet Freedom 2024, V-Dem)
#   • economic_extra:  Gini, energy import dependence, food import dependence
#                      (World Bank, IEA, FAO)
#
# Where a number is reported but not surveyed independently (autocracies),
# the field carries `_estimated: true` and the source string names the
# specific external estimator (GAMAAN, Arab Barometer, ORC Consultores,
# Latinobarómetro, V-Dem expert ratings).

