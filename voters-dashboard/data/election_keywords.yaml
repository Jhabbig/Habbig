# Search keywords used to match countries to Polymarket and Kalshi markets.
#
# `must_any` — markets matching ANY of these strings are candidates.
# `must_not` — markets matching ANY of these are excluded (false positives).
# `boost`    — phrases that, if present, push a market higher in ranking.
#
# Lowercase, substring match against the market's question + slug + tags.
# Order roughly by election date (closest first).

USA:
  must_any: ["us house", "us senate", "us midterm", "us election", "us president", "midterm 2026", "2026 election", "control of congress", "republican", "democrat"]
  must_not: ["jr", "high school", "soccer"]
  boost:   ["midterm", "house majority", "senate majority"]

BRA:
  must_any: ["brazil", "brasil", "lula", "bolsonaro", "tarcisio", "tarcísio"]
  must_not: ["argentina"]
  boost:   ["brazil 2026", "brazilian president", "lula reelection"]

ISR:
  must_any: ["israel", "knesset", "netanyahu", "lapid", "gantz", "bennett"]
  must_not: ["israel-iran"]
  boost:   ["next israeli", "israeli election", "israeli pm"]

ARG:
  must_any: ["argentina", "milei", "argentine"]
  must_not: ["argentina football", "argentina soccer"]
  boost:   ["milei approval", "argentina 2027", "argentina dollar"]

NGA:
  must_any: ["nigeria", "tinubu", "atiku", "obi"]
  boost:   ["nigeria 2027", "nigerian president"]

