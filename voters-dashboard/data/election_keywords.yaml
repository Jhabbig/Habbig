  must_not: ["italian open"]
  boost:   ["italy 2027", "meloni"]

POL:
  must_any: ["poland", "polish", "tusk", "pis", "kaczynski"]
  boost:   ["poland 2027", "polish parliamentary"]

DEU:
  must_any: ["germany", "german", "merz", "afd", "weidel", "scholz"]
  must_not: ["german shepherd"]
  boost:   ["germany 2029", "german chancellor"]

