  must_not: ["french open"]
  boost:   ["france 2027", "french president", "rn"]

MEX:
  must_any: ["mexico", "sheinbaum", "morena", "amlo"]
  must_not: ["new mexico"]
  boost:   ["sheinbaum approval", "mexico 2027"]

ITA:
