# Voter-influence data overlay.
#
# What this captures: the measurable forces political-science research
# consistently links to vote choice. Five buckets, in roughly the order
# that voters report mattering when surveyed:
#
#   1. economic_pressure   — wages, jobs, inflation, housing, consumer
#                            confidence. Single best predictor of incumbent
#                            re-election in democracies (Bartels, Achen).
#   2. trust               — institutional trust, satisfaction with
#                            democracy, corruption perception, right-track.
#                            Drives populist surges and protest votes.
#   3. identity            — education, religion, urban-rural, generational
#                            mix, gender gap. The cleavage map.
#   4. information         — internet/social-media penetration, top
#                            platforms, press freedom, misinformation
#                            exposure. The shape of the information diet.
#   5. crisis_memory       — recent shocks still salient: pandemics, wars,
#                            terror attacks, scandals, riots.
#   6. demographic_shifts  — net migration, generational replacement,
#                            education trend. The slow-moving substrate.
#
# Conventions:
#   • Percentages are 0..100. Survey-derived numbers carry their pollster
#     in `source`. Trends use words (rising/falling/stable) rather than
#     numbers, so you can see direction without false precision.
#   • Ranks are out of total countries assessed (CPI ~180, Press Freedom ~180).
#   • `key_pressure`, `key_cleavage`, `key_shift` are one-liner takeaways.
#
# Data lineage: hand-curated from public sources cited per block —
# Pew Global Attitudes, Edelman Trust Barometer, World Values Survey,
# OECD Better Life Index, Transparency International CPI 2025, RSF Press
# Freedom Index 2025, World Bank, IMF, V-Dem, Pew Religious Landscape,
# DataReportal Digital, UN DESA, UNODC homicide data.

