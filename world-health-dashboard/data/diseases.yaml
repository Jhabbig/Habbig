# 508-Disease Atlas — seed file.
#
# This is a scaffolded subset of the full 508-disease atlas. Each row has:
#   - name:         common English name
#   - icd10:        ICD-10 code (or "—" if not applicable / multiple)
#   - category:     coarse bucket (viral, bacterial, parasitic, fungal,
#                   prion, ncd, other)
#   - prevalence:   rough global figure with units ("annual cases",
#                   "people living with", "deaths/yr", etc.) — these are
#                   order-of-magnitude WHO/Lancet estimates as of 2025.
#   - who_url:      canonical WHO factsheet URL when one exists
#   - status:       "tracked" (we have a model), "atlas" (atlas-only,
#                   no model), "scaffolded" (placeholder row)
#
# Production will load the rest of the 508-disease list from a separate
# build step; this file ships the most-asked-for diseases as a seed.

