<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>World Monitor</title>
<script src="https://cdn.jsdelivr.net/npm/globe.gl@2.35.1/dist/globe.gl.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<style>
:root {
  --bg-0: #0a0a0a;
  --bg-1: #161616;
  --bg-2: #1e1e1e;
  --bg-3: #252525;
  --border: #363636;
  --border-light: #444444;
  --text-0: #e0e0e0;
  --text-1: #a0a0a0;
  --text-2: #666666;
  --green: #16a34a;
  --green-dim: #0f5040;
  --green-bright: #4ade80;
  --red: #dc2626;
  --red-dim: rgba(220,38,38,0.15);
  --orange: #ea580c;
  --orange-dim: rgba(234,88,12,0.15);
  --yellow: #ca8a04;
  --blue: #2563eb;
  --teal: #0d9488;
  --mono: 'SF Mono', 'Cascadia Code', 'Fira Code', 'JetBrains Mono', Monaco, Consolas, 'Courier New', monospace;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: var(--mono);
  background: var(--bg-0);
  color: var(--text-0);
  font-size: 12px;
  line-height: 1.5;
  overflow-x: hidden;
}

/* ── Header ──────────────────────────────────────── */
.header {
  height: 40px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 16px;
  background: var(--bg-1);
  border-bottom: 1px solid var(--border);
  position: sticky;
  top: 0;
  z-index: 200;
}

.header-left {
  display: flex;
  align-items: center;
  gap: 12px;
}

.header-title {
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--green-bright);
}

.header-live {
  display: flex;
  align-items: center;
  gap: 5px;
  font-size: 10px;
  color: var(--green);
  text-transform: uppercase;
  letter-spacing: 1px;
}

.live-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--green);
  animation: blink 2s ease-in-out infinite;
}

@keyframes blink {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.2; }
}

.header-right {
  display: flex;
  align-items: center;
  gap: 16px;
}

.header-stat {
  font-size: 10px;
  color: var(--text-2);
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.header-stat span { color: var(--text-1); }

.threat-pill {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 1px;
  text-transform: uppercase;
  padding: 3px 10px;
  border-radius: 3px;
}

.threat-pill.elevated {
  background: var(--orange-dim);
  color: var(--orange);
  border: 1px solid rgba(234,88,12,0.3);
}

.threat-pill.critical {
  background: var(--red-dim);
  color: var(--red);
  border: 1px solid rgba(220,38,38,0.3);
}

/* ── Map Section ─────────────────────────────────── */
.map-section {
  position: relative;
  height: 55vh;
  min-height: 380px;
  background: #050505;
  border-bottom: 1px solid var(--border);
  overflow: hidden;
  isolation: isolate;
  z-index: 1;
}

#globe-container {
  width: 100%;
  height: 100%;
}

#globe-container canvas { cursor: grab; }
#globe-container canvas:active { cursor: grabbing; }

.map-overlay-top {
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 60px;
  background: linear-gradient(180deg, rgba(5,5,5,0.8) 0%, transparent 100%);
  pointer-events: none;
  z-index: 10;
}

.map-overlay-bottom {
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  height: 80px;
  background: linear-gradient(0deg, rgba(10,10,10,0.9) 0%, transparent 100%);
  pointer-events: none;
  z-index: 10;
}

.map-legend {
  position: absolute;
  bottom: 12px;
  left: 16px;
  display: flex;
  gap: 14px;
  z-index: 20;
  pointer-events: auto;
}

.legend-item {
  display: flex;
  align-items: center;
  gap: 5px;
  font-size: 10px;
  color: var(--text-2);
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.legend-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
}

.map-stats {
  position: absolute;
  bottom: 12px;
  right: 16px;
  display: flex;
  gap: 16px;
  z-index: 20;
  font-size: 10px;
  color: var(--text-2);
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.map-stats span { color: var(--green); }

/* Heatmap indicator */
.heatmap-indicator {
  display: none;
  position: absolute;
  top: 12px;
  left: 16px;
  background: rgba(10,10,10,0.9);
  border: 1px solid var(--green-bright);
  border-radius: 4px;
  padding: 6px 12px;
  z-index: 25;
  align-items: center;
  gap: 10px;
  backdrop-filter: blur(4px);
}
.heatmap-indicator.active { display: flex; }
.heatmap-indicator-label { font-size: 10px; color: var(--text-2); text-transform: uppercase; letter-spacing: 0.6px; }
.heatmap-indicator-country { font-size: 11px; font-weight: 700; color: var(--text-0); }
.heatmap-indicator-flag { font-size: 14px; }
.heatmap-clear-btn {
  background: none;
  border: 1px solid var(--border);
  color: var(--text-1);
  cursor: pointer;
  padding: 2px 8px;
  border-radius: 2px;
  font-family: var(--mono);
  font-size: 9px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
.heatmap-clear-btn:hover { border-color: var(--red); color: var(--red); }

/* ── Panels Grid ─────────────────────────────────── */
.panels-container {
  padding: 12px;
  position: relative;
  z-index: 2;
}

.panels-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 8px;
}

/* ── Panel Base ──────────────────────────────────── */
.panel {
  background: var(--bg-1);
  border: 1px solid var(--border);
  border-radius: 4px;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  max-height: 340px;
}

.panel-head {
  height: 32px;
  min-height: 32px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 10px;
  background: var(--bg-2);
  border-bottom: 1px solid var(--border);
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--text-1);
}

.panel-badge {
  font-size: 9px;
  font-weight: 700;
  padding: 1px 6px;
  border-radius: 2px;
  letter-spacing: 0.5px;
}

.panel-badge.red { background: var(--red-dim); color: var(--red); }
.panel-badge.orange { background: var(--orange-dim); color: var(--orange); }
.panel-badge.green { background: rgba(22,163,74,0.15); color: var(--green); }
.panel-badge.blue { background: rgba(37,99,235,0.15); color: var(--blue); }

.panel-body {
  flex: 1;
  overflow-y: auto;
  padding: 0;
}

.panel-body::-webkit-scrollbar { width: 4px; }
.panel-body::-webkit-scrollbar-track { background: transparent; }
.panel-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

/* ── Conflict Rows ───────────────────────────────── */
.c-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 6px 10px;
  border-bottom: 1px solid rgba(255,255,255,0.03);
  cursor: pointer;
  transition: background 0.15s;
  gap: 8px;
}

.c-row:hover { background: var(--bg-2); }
.c-row:last-child { border-bottom: none; }

.c-row-left { flex: 1; min-width: 0; }

.c-name {
  font-size: 11px;
  font-weight: 600;
  color: var(--text-0);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.c-meta {
  font-size: 9px;
  color: var(--text-2);
  margin-top: 1px;
}

.c-type {
  font-size: 9px;
  padding: 1px 4px;
  border-radius: 2px;
  background: rgba(37,99,235,0.1);
  color: var(--blue);
  text-transform: uppercase;
  letter-spacing: 0.3px;
}

.c-bars {
  display: flex;
  gap: 1px;
  flex-shrink: 0;
}

.c-bar {
  width: 3px;
  height: 12px;
  border-radius: 1px;
  background: var(--border);
}

.c-bar.on { background: var(--red); }
.c-bar.on.med { background: var(--orange); }
.c-bar.on.low { background: var(--yellow); }

/* ── Hotspot Rows ────────────────────────────────── */
.h-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 5px 10px;
  border-bottom: 1px solid rgba(255,255,255,0.03);
  cursor: pointer;
  transition: background 0.15s;
}

.h-row:hover { background: var(--bg-2); }
.h-row:last-child { border-bottom: none; }

.h-name {
  font-size: 11px;
  font-weight: 500;
  color: var(--text-0);
}

.h-note {
  font-size: 9px;
  color: var(--text-2);
  margin-top: 1px;
}

.h-level {
  font-size: 9px;
  font-weight: 700;
  padding: 1px 5px;
  border-radius: 2px;
  text-transform: uppercase;
  letter-spacing: 0.3px;
  flex-shrink: 0;
}

.h-level.high { background: var(--red-dim); color: var(--red); }
.h-level.elevated { background: var(--orange-dim); color: var(--orange); }
.h-level.watch { background: rgba(37,99,235,0.15); color: var(--blue); }

/* ── Indicator Panel ─────────────────────────────── */
.ind-body { padding: 10px; }

.ind-top {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 8px;
}

.ind-icon { font-size: 18px; line-height: 1; }

.ind-status {
  font-size: 9px;
  font-weight: 700;
  padding: 1px 6px;
  border-radius: 2px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.ind-status.critical { background: var(--red-dim); color: var(--red); }
.ind-status.elevated { background: var(--orange-dim); color: var(--orange); }
.ind-status.normal { background: rgba(22,163,74,0.15); color: var(--green); }
.ind-status.low { background: rgba(37,99,235,0.15); color: var(--blue); }

.ind-value {
  font-size: 26px;
  font-weight: 800;
  letter-spacing: -1px;
  line-height: 1;
  margin-bottom: 2px;
  font-variant-numeric: tabular-nums;
}

.ind-unit {
  font-size: 10px;
  color: var(--text-2);
  margin-left: 4px;
  font-weight: 400;
}

.ind-bar {
  width: 100%;
  height: 3px;
  background: rgba(255,255,255,0.05);
  border-radius: 1px;
  margin: 8px 0;
  overflow: hidden;
}

.ind-bar-fill {
  height: 100%;
  border-radius: 1px;
  transition: width 1s ease;
}

.ind-spark {
  height: 32px !important;
  max-height: 32px;
  width: 100% !important;
  margin: 6px 0;
  display: block;
}

.ind-desc {
  font-size: 10px;
  color: var(--text-2);
  line-height: 1.4;
}

.ind-source {
  font-size: 9px;
  color: var(--text-2);
  opacity: 0.5;
  margin-top: 4px;
}

/* ── Sanction Rows ───────────────────────────────── */
.s-row {
  display: flex;
  align-items: center;
  padding: 5px 10px;
  border-bottom: 1px solid rgba(255,255,255,0.03);
  gap: 8px;
  font-size: 11px;
}

.s-row:last-child { border-bottom: none; }
.s-from { color: var(--text-1); font-weight: 600; min-width: 80px; }
.s-arrow { color: var(--text-2); }
.s-target { color: var(--orange); font-weight: 600; min-width: 70px; }
.s-note { color: var(--text-2); font-size: 10px; flex: 1; }

/* ── Nuclear Rows ────────────────────────────────── */
.n-row {
  display: grid;
  grid-template-columns: 24px 1fr 60px;
  align-items: center;
  padding: 4px 10px;
  border-bottom: 1px solid rgba(255,255,255,0.03);
  gap: 8px;
  font-size: 11px;
}

.n-row:last-child { border-bottom: none; }
.n-flag { font-size: 14px; }
.n-info { display: flex; flex-direction: column; }
.n-country { font-weight: 600; font-size: 11px; }

.n-bar-wrap {
  display: flex;
  align-items: center;
  gap: 4px;
  margin-top: 2px;
}

.n-bar {
  flex: 1;
  height: 3px;
  background: rgba(255,255,255,0.05);
  border-radius: 1px;
  overflow: hidden;
}

.n-bar-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--orange), var(--red));
  border-radius: 1px;
}

.n-count {
  font-weight: 700;
  font-variant-numeric: tabular-nums;
  color: var(--red);
  text-align: right;
}

.n-status { font-size: 9px; color: var(--text-2); }

/* ── Militia Rows ───────────────────────────────── */
.m-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 5px 10px;
  border-bottom: 1px solid rgba(255,255,255,0.03);
  cursor: pointer;
  transition: background 0.15s;
}

.m-row:hover { background: var(--bg-2); }
.m-row:last-child { border-bottom: none; }
.m-row-left { flex: 1; min-width: 0; }
.m-name { font-size: 11px; font-weight: 600; color: var(--text-0); }
.m-meta { font-size: 9px; color: var(--text-2); margin-top: 1px; }
.m-type {
  font-size: 9px; padding: 1px 4px; border-radius: 2px;
  background: rgba(168,85,247,0.12); color: #a855f7;
  text-transform: uppercase; letter-spacing: 0.3px;
}
.m-strength { font-size: 9px; color: var(--text-2); flex-shrink: 0; text-align: right; }

/* ── News Rows ──────────────────────────────────── */
.news-row {
  padding: 8px 12px;
  border-bottom: 1px solid rgba(255,255,255,0.04);
  cursor: pointer;
  transition: background 0.15s;
  text-decoration: none;
  display: block;
}

.news-row:hover { background: var(--bg-2); }
.news-row:last-child { border-bottom: none; }

.news-meta {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 3px;
}

.news-source {
  font-size: 9px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  color: var(--green);
  padding: 1px 5px;
  border: 1px solid var(--border);
  border-radius: 2px;
}

.news-time {
  font-size: 9px;
  color: var(--text-2);
  font-variant-numeric: tabular-nums;
}

.news-title {
  font-size: 11px;
  font-weight: 500;
  color: var(--text-0);
  line-height: 1.35;
}

.news-desc {
  font-size: 10px;
  color: var(--text-2);
  line-height: 1.35;
  margin-top: 2px;
  overflow: hidden;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
}

.news-loading {
  padding: 16px;
  text-align: center;
  font-size: 10px;
  color: var(--text-2);
  text-transform: uppercase;
  letter-spacing: 1px;
}

/* ── Polymarket Rows ────────────────────────────── */
.poly-row {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px 12px;
  border-bottom: 1px solid rgba(255,255,255,0.04);
  cursor: pointer;
  transition: background 0.15s;
  text-decoration: none;
  color: inherit;
}
.poly-row:hover { background: var(--bg-2); }
.poly-row:last-child { border-bottom: none; }

.poly-gauge {
  width: 48px;
  height: 48px;
  flex-shrink: 0;
  position: relative;
}
.poly-gauge-svg { width: 100%; height: 100%; transform: rotate(-90deg); }
.poly-gauge-bg { fill: none; stroke: rgba(255,255,255,0.08); stroke-width: 5; }
.poly-gauge-fg { fill: none; stroke-width: 5; stroke-linecap: round; transition: stroke-dasharray 0.8s ease; }
.poly-gauge-text {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 11px;
  font-weight: 800;
  font-variant-numeric: tabular-nums;
}

.poly-info { flex: 1; min-width: 0; }
.poly-question {
  font-size: 11px;
  font-weight: 600;
  color: var(--text-0);
  line-height: 1.35;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}
.poly-meta {
  font-size: 9px;
  color: var(--text-2);
  margin-top: 4px;
  display: flex;
  gap: 10px;
  font-variant-numeric: tabular-nums;
}
.poly-meta-label { color: var(--text-2); }
.poly-meta-value { color: var(--text-1); font-weight: 600; }
.poly-outcome {
  font-size: 9px;
  padding: 2px 6px;
  border-radius: 2px;
  background: rgba(22,163,74,0.15);
  color: var(--green);
  text-transform: uppercase;
  letter-spacing: 0.4px;
  font-weight: 700;
  flex-shrink: 0;
}
.poly-outcome.no { background: var(--red-dim); color: var(--red); }

/* ── Relations Overlay ──────────────────────────── */
.relations-overlay {
  display: none;
  position: fixed;
  top: 40px;
  right: 0;
  width: 340px;
  max-height: calc(100vh - 52px);
  background: var(--bg-1);
  border-left: 1px solid var(--border);
  border-bottom: 1px solid var(--border);
  z-index: 150;
  overflow-y: auto;
  box-shadow: -4px 0 20px rgba(0,0,0,0.5);
}

.relations-overlay.open { display: block; }

.relations-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 12px; background: var(--bg-2);
  border-bottom: 1px solid var(--border);
}

.relations-title { font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; }
.relations-close {
  width: 24px; height: 24px; background: none; border: 1px solid var(--border);
  color: var(--text-1); cursor: pointer; font-size: 14px; border-radius: 3px;
  display: flex; align-items: center; justify-content: center;
  font-family: var(--mono);
}
.relations-close:hover { border-color: var(--text-0); color: var(--text-0); }

.rel-row {
  display: flex; align-items: center; padding: 6px 12px;
  border-bottom: 1px solid rgba(255,255,255,0.03);
  cursor: pointer; transition: background 0.15s; gap: 8px;
}
.rel-row:hover { background: var(--bg-2); }
.rel-row:last-child { border-bottom: none; }

.rel-flag { font-size: 16px; flex-shrink: 0; }
.rel-info { flex: 1; min-width: 0; }
.rel-name { font-size: 11px; font-weight: 600; }
.rel-detail { font-size: 9px; color: var(--text-2); margin-top: 1px; }
.rel-type {
  font-size: 9px; font-weight: 700; padding: 1px 6px; border-radius: 2px;
  text-transform: uppercase; letter-spacing: 0.3px; flex-shrink: 0;
}
.rel-type.ally { background: rgba(22,163,74,0.15); color: var(--green); }
.rel-type.partner { background: rgba(37,99,235,0.15); color: var(--blue); }
.rel-type.rival { background: var(--orange-dim); color: var(--orange); }
.rel-type.adversary { background: var(--red-dim); color: var(--red); }

/* ── Country Selector ───────────────────────────── */
.country-select-row {
  display: flex; align-items: center; gap: 6px;
  padding: 8px 12px; border-bottom: 1px solid var(--border);
}

.country-select-row select {
  flex: 1; background: var(--bg-2); color: var(--text-0); border: 1px solid var(--border);
  padding: 4px 8px; border-radius: 3px; font-family: var(--mono); font-size: 11px;
}

/* ── Country Profile Modal ──────────────────────── */
.country-modal {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.85);
  z-index: 300;
  overflow-y: auto;
  backdrop-filter: blur(4px);
}
.country-modal.open { display: block; }

.cm-dialog {
  max-width: 1100px;
  margin: 40px auto;
  background: var(--bg-1);
  border: 1px solid var(--border);
  border-radius: 6px;
  overflow: hidden;
  box-shadow: 0 20px 60px rgba(0,0,0,0.7);
}

.cm-header {
  display: flex;
  align-items: center;
  gap: 16px;
  padding: 18px 20px;
  background: var(--bg-2);
  border-bottom: 1px solid var(--border);
}
.cm-flag { font-size: 48px; line-height: 1; }
.cm-title-block { flex: 1; min-width: 0; }
.cm-title { font-size: 22px; font-weight: 800; color: var(--text-0); letter-spacing: 0.5px; }
.cm-subtitle { font-size: 11px; color: var(--text-2); margin-top: 4px; text-transform: uppercase; letter-spacing: 0.8px; }
.cm-close {
  width: 32px; height: 32px; background: var(--bg-3); border: 1px solid var(--border);
  color: var(--text-1); cursor: pointer; font-size: 18px; border-radius: 4px;
  display: flex; align-items: center; justify-content: center;
  font-family: var(--mono);
}
.cm-close:hover { border-color: var(--text-0); color: var(--text-0); }

  Data curated / simulated for indicators without live feeds. Conflict data based on open-source intelligence.
  Updated: <span id="last-updated"></span>

<script>
// ── Theme ────────────────────────────────────────────────
(function() {
  const saved = localStorage.getItem('wm-theme') || 'dark';
  if (saved !== 'dark') document.documentElement.setAttribute('data-theme', saved);
  document.querySelectorAll('.theme-btn').forEach(btn => {
    if (btn.dataset.theme === saved) btn.classList.add('active');
    else btn.classList.remove('active');
  });
})();

function setTheme(theme) {
  if (theme === 'dark') document.documentElement.removeAttribute('data-theme');
  else document.documentElement.setAttribute('data-theme', theme);
  localStorage.setItem('wm-theme', theme);
  document.querySelectorAll('.theme-btn').forEach(b => b.classList.toggle('active', b.dataset.theme === theme));
  // Update globe background
  if (globe) {
    const bgMap = { dark: '#050505', light: '#e0e0e0', green: '#030803', amber: '#080604', blue: '#040610' };
    globe.backgroundColor(bgMap[theme] || '#050505');
  }
}

document.addEventListener('click', e => {
  const btn = e.target.closest('.theme-btn');
  if (btn) setTheme(btn.dataset.theme);
});

// ── Helpers ───────────────────────────────────────────────
function countryFlag(code) {
  return code.toUpperCase().replace(/./g, c => String.fromCodePoint(0x1F1E6 + c.charCodeAt(0) - 65));
}

const ICONS = {
  'pentagon-pizza': '\u{1F355}', 'doomsday-clock': '\u{23F0}',
  'vix': '\u{1F4C9}', 'baltic-dry': '\u{1F6A2}',
  'big-mac': '\u{1F354}', 'misery-index': '\u{1F629}',
  'waffle-house': '\u{1F9C7}', 'lipstick-index': '\u{1F484}',
  'cardboard-box': '\u{1F4E6}', 'underwear-index': '\u{1FA72}',
  'copper-gold': '\u{2696}\u{FE0F}', 'skyscraper-index': '\u{1F3D7}\u{FE0F}',
};

const STATUS_COLORS = {
  critical: '#dc2626', elevated: '#ea580c',
  normal: '#16a34a', low: '#2563eb',
};

let globe;
let data = {};
let relationArcs = [];

// ── Init ─────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', async () => {
  await loadData();
  try { initGlobe(); } catch(e) { console.warn('Globe init failed:', e); }
  renderPanels();
  updateHeaderStats();
  document.getElementById('last-updated').textContent = new Date().toLocaleString();
  // Fetch news asynchronously (may take a few seconds from RSS feeds)
  loadNews();
  loadPolymarket();
  // Refresh news every 5 minutes, polymarket every 3 minutes
  setInterval(loadNews, 5 * 60 * 1000);
  setInterval(loadPolymarket, 3 * 60 * 1000);
});

async function loadData() {
  try {
    const resp = await fetch('/api/all');
    data = await resp.json();
    data.news = [];
    data.polymarket = [];
  } catch (e) {
    console.error('Failed to load data:', e);
    data = { conflicts: [], hotspots: [], indicators: [], sanctions: [], nuclear: [], militias: [], relations: {}, profiles: {}, news: [], polymarket: [], threat_level: 'UNKNOWN', threat_note: '' };
  }
}

async function loadPolymarket() {
  try {
    const resp = await fetch('/api/polymarket');
    const d = await resp.json();
    data.polymarket = d.markets || [];
    const body = document.getElementById('poly-panel-body');
    if (body) body.innerHTML = buildPolyRows();
  } catch (e) {
    console.error('Failed to load polymarket:', e);
  }
}

async function loadNews() {
  try {
    const resp = await fetch('/api/news');
    const d = await resp.json();
    data.news = d.news || [];
    // Update just the news panel
    const newsBody = document.getElementById('news-panel-body');
    if (newsBody) newsBody.innerHTML = buildNewsRows();
  } catch (e) {
    console.error('Failed to load news:', e);
  }
}

// ── Globe ────────────────────────────────────────────────
function initGlobe() {
  const container = document.getElementById('globe-container');
  const w = container.clientWidth;
  const h = container.clientHeight;

  // Combine hotspots + militias into points layer
  const hotspotPts = (data.hotspots || []).map(h => ({...h, _kind: 'hotspot'}));
  const militiaPts = (data.militias || []).map(m => ({...m, _kind: 'militia'}));
  const allPoints = [...hotspotPts, ...militiaPts];

  globe = Globe()
    .width(w).height(h)
    .backgroundColor('#050505')
    .globeImageUrl('https://unpkg.com/three-globe@2.35.1/example/img/earth-night.jpg')
    .atmosphereColor('#0f5040')
    .atmosphereAltitude(0.18)
    .arcsData(data.conflicts)
    .arcStartLat(d => d.startLat).arcStartLng(d => d.startLng)
    .arcEndLat(d => d.endLat).arcEndLng(d => d.endLng)
    .arcColor(d => {
      // Score arcs (country profile heatmap) use _scoreArc + _score
      if (d._scoreArc) {
        const c = scoreColor(d._score);
        return [c + 'e6', c + '55'];
      }
      // Relation arcs use _relType
      if (d._relType === 'ally') return ['rgba(22,163,74,0.9)', 'rgba(22,163,74,0.4)'];
      if (d._relType === 'partner') return ['rgba(37,99,235,0.9)', 'rgba(37,99,235,0.4)'];
      if (d._relType === 'rival') return ['rgba(234,88,12,0.9)', 'rgba(234,88,12,0.4)'];
      if (d._relType === 'adversary') return ['rgba(220,38,38,0.9)', 'rgba(220,38,38,0.4)'];
      // Conflict arcs
      if (d.intensity >= 5) return ['rgba(220,38,38,0.9)', 'rgba(220,38,38,0.4)'];
      if (d.intensity >= 4) return ['rgba(234,88,12,0.9)', 'rgba(234,88,12,0.4)'];
      return ['rgba(202,138,4,0.8)', 'rgba(202,138,4,0.3)'];
    })
    .arcDashLength(d => d._scoreArc ? 0.4 : (d._relType ? 0.3 : 0.5))
    .arcDashGap(d => d._scoreArc ? 0.2 : (d._relType ? 0.15 : 0.25))
    .arcDashAnimateTime(d => d._scoreArc ? 2000 : (d._relType ? 1500 : 2500))
    .arcStroke(d => d._scoreArc ? 0.6 : (d._relType ? 0.8 : 0.2 + (d.intensity || 0) * 0.2))
    .arcLabel(d => {
      if (d._scoreArc) return `<div style="font-family:var(--mono);background:rgba(10,10,10,0.95);padding:6px 10px;border-radius:3px;font-size:11px;border:1px solid #333;max-width:220px">
        <b style="color:${scoreColor(d._score)}">${d._relName}</b><br>
        <span style="color:#999">Relation: ${d._score}/100 &middot; ${scoreLabel(d._score)}</span>
      </div>`;
      if (d._relType) return `<div style="font-family:var(--mono);background:rgba(10,10,10,0.95);padding:6px 10px;border-radius:3px;font-size:11px;border:1px solid #333;max-width:220px">
        <b style="color:#e0e0e0">${d._relName}</b><br>
        <span style="color:#666">${d._relDetail}</span>
      </div>`;
      return `<div style="font-family:var(--mono);background:rgba(10,10,10,0.95);padding:6px 10px;border-radius:3px;font-size:11px;border:1px solid #333;max-width:220px">
        <b style="color:#e0e0e0">${d.name}</b><br>
        <span style="color:#666">Since ${d.started} &middot; ${d.casualties}</span>
      </div>`;
    })
    .pointsData(allPoints)
    .pointLat(d => d.lat).pointLng(d => d.lng)
    .pointColor(d => {
      if (d._kind === 'score-self') return d._color || '#22d3ee';
      if (d._kind === 'score') return d._color;
      if (d._kind === 'militia') return '#a855f7';
      return d.level === 'high' ? '#dc2626' : d.level === 'elevated' ? '#ea580c' : '#2563eb';
    })
    .pointAltitude(d => {
      if (d._kind === 'score-self') return 0.18;
      if (d._kind === 'score') return 0.08 + (d._score || 0) * 0.001;
      if (d._kind === 'militia') return 0.06;
      return 0.05;
    })
    .pointRadius(d => {
      if (d._kind === 'score-self') return 0.55;
      if (d._kind === 'score') return 0.38;
      if (d._kind === 'militia') return 0.3;
      return 0.35;
    })
    .pointLabel(d => {
      if (d._kind === 'score-self') return `<div style="font-family:var(--mono);background:rgba(10,10,10,0.95);padding:6px 10px;border-radius:3px;font-size:11px;border:1px solid #22d3ee;max-width:220px">
        <b style="color:#22d3ee">${d.name}</b><br>
        <span style="color:#999">Selected country</span>
      </div>`;
      if (d._kind === 'score') return `<div style="font-family:var(--mono);background:rgba(10,10,10,0.95);padding:6px 10px;border-radius:3px;font-size:11px;border:1px solid #333;max-width:220px">
        <b style="color:${d._color}">${d.name}</b><br>
        <span style="color:#999">Relation: ${d._score}/100 &middot; ${scoreLabel(d._score)}</span>
      </div>`;
      if (d._kind === 'militia') return `<div style="font-family:var(--mono);background:rgba(10,10,10,0.95);padding:6px 10px;border-radius:3px;font-size:11px;border:1px solid #333;max-width:220px">
        <b style="color:#a855f7">${d.name}</b><br>
        <span style="color:#999">${d.country}</span><br>
        <span style="color:#666">${d.type} &middot; ${d.strength}</span><br>
        <span style="color:#555">${d.note}</span>
      </div>`;
      return `<div style="font-family:var(--mono);background:rgba(10,10,10,0.95);padding:6px 10px;border-radius:3px;font-size:11px;border:1px solid #333;max-width:200px">
        <b style="color:#e0e0e0">${d.name}</b><br>
        <span style="color:#666">${d.note}</span>
      </div>`;
    })
    .ringsData([...data.hotspots, ...data.militias.map(m => ({...m, level: 'militia'}))])
    .ringLat(d => d.lat).ringLng(d => d.lng)
    .ringColor(d => {
      if (d.level === 'militia') return t => `rgba(168,85,247,${1 - t})`;
      if (d.level === 'high') return t => `rgba(220,38,38,${1 - t})`;
      if (d.level === 'elevated') return t => `rgba(234,88,12,${1 - t})`;
      return t => `rgba(37,99,235,${1 - t})`;
    })
    .ringMaxRadius(2.5).ringPropagationSpeed(1.2).ringRepeatPeriod(2000)
    (container);

  globe.pointOfView({ lat: 20, lng: 40, altitude: 2.0 }, 1000);
  globe.controls().autoRotate = true;
  globe.controls().autoRotateSpeed = 0.25;
  globe.controls().enableDamping = true;

  window.addEventListener('resize', () => {
    globe.width(container.clientWidth).height(container.clientHeight);
  });
}

function focusGlobe(lat, lng, alt = 1.5) {
  if (!globe) return;
  globe.pointOfView({ lat, lng, altitude: alt }, 800);
  globe.controls().autoRotate = false;
}

    const circumference = 2 * Math.PI * 20;
    const dash = (pct / 100) * circumference;
    const vol24 = formatVolume(m.volume_24h);
    const volTot = formatVolume(m.volume_total);
    const endStr = formatEndDate(m.end_date);
    const outcomeClass = (m.top_outcome || '').toLowerCase() === 'no' ? 'no' : '';
    const url = m.slug ? `https://polymarket.com/event/${m.slug}` : 'https://polymarket.com';
    const safeQ = (m.question || '').replace(/"/g, '&quot;');

          <circle class="poly-gauge-fg" cx="24" cy="24" r="20"

      </div>

          ${endStr ? `<span><span class="poly-meta-label">ends:</span> <span class="poly-meta-value">${endStr}</span></span>` : ''}
        </div>
      </div>
      <span class="poly-outcome ${outcomeClass}">${m.top_outcome || 'Yes'}</span>
    </a>`;
  }).join('');

function formatVolume(v) {
  if (!v || v < 1) return '0';
  if (v >= 1e9) return (v / 1e9).toFixed(1) + 'B';
  if (v >= 1e6) return (v / 1e6).toFixed(1) + 'M';
  if (v >= 1e3) return (v / 1e3).toFixed(1) + 'K';
  return Math.round(v).toString();
}

function formatEndDate(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  if (isNaN(d)) return '';
  const diffMs = d.getTime() - Date.now();
  if (diffMs < 0) return 'ended';
  const days = Math.floor(diffMs / 86400000);
  if (days === 0) return 'today';
  if (days === 1) return '1d';
  if (days < 30) return days + 'd';
  const months = Math.floor(days / 30);
  if (months < 12) return months + 'mo';
  return Math.floor(days / 365) + 'y';
}

function formatNewsTime(pubDate) {
  if (!pubDate) return '';
  const d = new Date(pubDate);
  if (isNaN(d)) return '';
  const diffMs = Date.now() - d.getTime();
  const mins = Math.floor(diffMs / 60000);
  if (mins < 1) return 'just now';
  if (mins < 60) return mins + 'm ago';
  const hrs = Math.floor(mins / 60);
  if (hrs < 24) return hrs + 'h ago';
  const days = Math.floor(hrs / 24);
  if (days < 7) return days + 'd ago';
  return d.toLocaleDateString();
}

// ── Country Relations ───────────────────────────────────
function initRelations() {
  const sel = document.getElementById('country-select');
  const overlay = document.getElementById('relations-overlay');
  const closeBtn = document.getElementById('relations-close');

  // Populate dropdown
  if (data.relations) {
    Object.keys(data.relations).sort().forEach(code => {
      const c = data.relations[code];
      const opt = document.createElement('option');
      opt.value = code;
      opt.textContent = `${countryFlag(code)} ${c.name}`;
      sel.appendChild(opt);
    });
  }

  sel.addEventListener('change', () => {
    if (sel.value) showRelations(sel.value);
    else clearRelations();
  });

  closeBtn.addEventListener('click', () => {
    overlay.classList.remove('open');
    clearRelations();
    sel.value = '';
  });

  // Also allow clicking on the globe to open relations (via header button)
  document.getElementById('relations-title').addEventListener('click', () => {
    overlay.classList.toggle('open');
  });
}

function showRelations(code) {
  const overlay = document.getElementById('relations-overlay');
  const list = document.getElementById('relations-list');
  const title = document.getElementById('relations-title');
  const c = data.relations[code];
  if (!c) return;

  overlay.classList.add('open');
  title.textContent = `${countryFlag(code)} ${c.name}`;

  // Build relation rows
  list.innerHTML = c.relations.map(r => `
    <div class="rel-row" data-lat="${r.lat}" data-lng="${r.lng}">
      <span class="rel-flag">${countryFlag(r.target)}</span>
      <div class="rel-info">
        <div class="rel-name">${r.name}</div>
        <div class="rel-detail">${r.detail}</div>
      </div>
      <span class="rel-type ${r.type}">${r.type}</span>
    </div>
  `).join('');

  // Click on a relation row to focus globe there
  list.querySelectorAll('.rel-row').forEach(el => {
    el.addEventListener('click', () => focusGlobe(parseFloat(el.dataset.lat), parseFloat(el.dataset.lng), 1.8));
  });

  // Draw arcs on globe
  drawRelationArcs(code);

  // Focus globe on the selected country
  focusGlobe(c.lat, c.lng, 1.8);
}

function drawRelationArcs(code) {
  if (!globe) return;
  const c = data.relations[code];
  if (!c) return;

  // Merge conflict arcs + relation arcs
  const relArcs = c.relations.map(r => ({
    startLat: c.lat, startLng: c.lng,
    endLat: r.lat, endLng: r.lng,
    _relType: r.type,
    _relName: r.name,
    _relDetail: r.detail,
  }));

  relationArcs = relArcs;
  globe.arcsData([...data.conflicts, ...relationArcs]);
}

function clearRelations() {
  if (!globe) return;
  relationArcs = [];
  globe.arcsData(data.conflicts);
}

function scoreColor(score) {
  // 0 = red, 50 = yellow, 100 = green
  if (score >= 75) return '#16a34a';
  if (score >= 60) return '#65a30d';
  if (score >= 45) return '#ca8a04';
  if (score >= 30) return '#ea580c';
  return '#dc2626';
}

function scoreLabel(score) {
  if (score >= 85) return 'ally';
  if (score >= 65) return 'partner';
  if (score >= 45) return 'neutral';
  if (score >= 25) return 'tension';
  return 'adversary';
}

function showCountryProfile(code) {
  const p = (data.profiles || {})[code];
  if (!p) return;
  const dialog = document.getElementById('cm-dialog');
  const modal = document.getElementById('country-modal');

  // Build sections
  const leaders = (p.leaders || []).map(l =>
    `<div class="cm-leader">
      <div class="cm-leader-role">${l.role}</div>
      <div class="cm-leader-name">${l.name}</div>
    </div>`).join('');

  const memberships = (p.memberships || []).map(m =>
    `<span class="cm-membership">${m}</span>`).join('');

  const POLICY_LABELS = {
    abortion: 'Abortion',
    lgbtq_rights: 'LGBTQ+ Rights',
    death_penalty: 'Death Penalty',
    gun_control: 'Gun Control',
    healthcare: 'Healthcare',
    climate: 'Climate Policy',
    immigration: 'Immigration',
    nuclear_stance: 'Nuclear Stance',
  };
  const policies = Object.entries(p.policies || {}).map(([key, v]) => {
    const label = POLICY_LABELS[key] || key.replace(/_/g, ' ');
    const statusClass = (v.status || '').toLowerCase().split('-')[0];
    return `<div class="cm-policy">
      <div class="cm-policy-head">
        <span class="cm-policy-name">${label}</span>
        <span class="cm-policy-status ${statusClass}">${v.status}</span>
      </div>
      <div class="cm-policy-detail">${v.detail}</div>
    </div>`;
  }).join('');

  // Relations sorted by score desc
  const scores = p.relation_scores || {};
  const sortedCodes = Object.keys(scores).sort((a, b) => scores[b] - scores[a]);
  const relations = sortedCodes.map(rc => {
    const score = scores[rc];
    const color = scoreColor(score);
    const otherName = (data.profiles && data.profiles[rc] && data.profiles[rc].name)
      || (COUNTRY_COORDS[rc] && COUNTRY_COORDS[rc].name)
      || rc;
    return `<div class="cm-rel" data-code="${rc}">
      <span class="cm-rel-flag">${countryFlag(rc)}</span>
      <span class="cm-rel-name">${otherName}</span>
      <div class="cm-rel-bar"><div class="cm-rel-bar-fill" style="width:${score}%;background:${color}"></div></div>
      <span class="cm-rel-score" style="color:${color}">${score}</span>
    </div>`;
  }).join('');

  dialog.innerHTML = `
    <div class="cm-header">
      <span class="cm-flag">${countryFlag(code)}</span>
      <div class="cm-title-block">
        <div class="cm-title">${p.name}</div>
        <div class="cm-subtitle">${p.govt}</div>
      </div>
      <button class="cm-close" onclick="closeCountryProfile()">&times;</button>
    </div>
    <div class="cm-stats">
      <div class="cm-stat"><div class="cm-stat-label">Capital</div><div class="cm-stat-value">${p.capital}</div></div>
      <div class="cm-stat"><div class="cm-stat-label">Population</div><div class="cm-stat-value">${p.population}</div></div>
      <div class="cm-stat"><div class="cm-stat-label">GDP</div><div class="cm-stat-value">${p.gdp}</div></div>
      <div class="cm-stat"><div class="cm-stat-label">Military Rank</div><div class="cm-stat-value">#${p.military_rank}</div></div>
    </div>
    <div class="cm-section">
      <div class="cm-section-title">Leadership</div>
      <div class="cm-leaders">${leaders}</div>
    </div>
    <div class="cm-section">
      <div class="cm-section-title">International Memberships</div>
      <div class="cm-memberships">${memberships}</div>
    </div>
    <div class="cm-section">
      <div class="cm-section-title">Policies on Major Issues</div>
      <div class="cm-policies">${policies}</div>
    </div>
    <div class="cm-section">
      <div class="cm-section-title">Foreign Relations (green=ally, red=adversary)</div>
      <div class="cm-relations-list">${relations}</div>
    </div>
  `;

  // Click a relation row to jump to that country
  dialog.querySelectorAll('.cm-rel').forEach(el => {
    el.addEventListener('click', () => {
      const target = el.dataset.code;
      if (data.profiles && data.profiles[target]) {
        showCountryProfile(target);
      }
    });
  });

  modal.classList.add('open');

  // Paint the globe with this country's relation scores
  drawRelationHeatmap(code);
  focusGlobe(p.lat, p.lng, 2.2);
}

function closeCountryProfile() {
  document.getElementById('country-modal').classList.remove('open');
  // Keep heatmap visible on the globe so user can see relations.
  // User can click "Clear" in the heatmap indicator to remove.
}

function drawRelationHeatmap(code) {
  if (!globe) return;
  const p = (data.profiles || {})[code];
  if (!p) return;

  // Update the heatmap indicator on the map
  const ind = document.getElementById('heatmap-indicator');
  if (ind) {
    ind.classList.add('active');
    document.getElementById('heatmap-flag').textContent = countryFlag(code);
    document.getElementById('heatmap-country').textContent = p.name;
  }

  // Build a points layer: the selected country + every country in its relation_scores
  const scoreSet = p.relation_scores || {};
  const scorePts = [];

  // Center marker (the selected country itself) — bright cyan
  scorePts.push({
    lat: p.lat, lng: p.lng, _kind: 'score-self',
    name: p.name, _score: 100, _color: '#22d3ee',
  });

  // All countries that have a relation score from this one
  Object.entries(scoreSet).forEach(([rc, score]) => {
    const target = (data.profiles || {})[rc];
    let lat, lng, name;
    if (target) {
      lat = target.lat; lng = target.lng; name = target.name;
    } else {
      // Fall back to COUNTRY_COORDS lookup
      const fb = COUNTRY_COORDS[rc];
      if (!fb) return;
      lat = fb.lat; lng = fb.lng; name = fb.name;
    }
    scorePts.push({
      lat, lng, _kind: 'score', _code: rc,
      name, _score: score, _color: scoreColor(score),
    });
  });

  // Combine with existing hotspots + militias
  const hotspotPts = (data.hotspots || []).map(h => ({...h, _kind: 'hotspot'}));
  const militiaPts = (data.militias || []).map(m => ({...m, _kind: 'militia'}));
  const combined = [...hotspotPts, ...militiaPts, ...scorePts];

  globe.pointsData(combined);

  // Also draw arcs from the center country to every scored country
  const scoreArcs = Object.entries(scoreSet).map(([rc, score]) => {
    const target = (data.profiles || {})[rc] || COUNTRY_COORDS[rc];
    if (!target) return null;
    return {
      startLat: p.lat, startLng: p.lng,
      endLat: target.lat, endLng: target.lng,
      _scoreArc: true, _score: score,
      _relName: target.name || rc,
    };
  }).filter(Boolean);

  globe.arcsData([...data.conflicts, ...scoreArcs]);
}

function clearRelationHeatmap() {
  if (!globe) return;
  const hotspotPts = (data.hotspots || []).map(h => ({...h, _kind: 'hotspot'}));
  const militiaPts = (data.militias || []).map(m => ({...m, _kind: 'militia'}));
  globe.pointsData([...hotspotPts, ...militiaPts]);
  globe.arcsData(data.conflicts);
  const ind = document.getElementById('heatmap-indicator');
  if (ind) ind.classList.remove('active');
}
