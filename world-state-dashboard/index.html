<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>World Monitor</title>
<script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js" crossorigin="anonymous"></script>
<link href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" rel="stylesheet" crossorigin="anonymous">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js" crossorigin="anonymous"></script>
<style>
:root {
  --bg-0: #0c0d10;
  --bg-1: #131417;
  --bg-2: #18191e;
  --bg-3: #1f2027;
  --border: rgba(255,255,255,0.06);
  --border-light: rgba(255,255,255,0.08);
  --text-0: #ebebef;
  --text-1: #8b8d98;
  --text-2: #5c5e6a;
  --green: #34d399;
  --green-dim: rgba(52,211,153,0.12);
  --green-bright: #6ee7b7;
  --red: #f87171;
  --red-dim: rgba(248,113,113,0.12);
  --orange: #fb923c;
  --orange-dim: rgba(251,146,60,0.12);
  --yellow: #fbbf24;
  --blue: #818cf8;
  --teal: #2dd4bf;
  --mono: 'SF Mono', 'Cascadia Code', 'Fira Code', 'JetBrains Mono', Monaco, Consolas, 'Courier New', monospace;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: var(--mono);
  background: var(--bg-0);
  color: var(--text-0);
  font-size: 12px;
  line-height: 1.5;
  overflow-x: hidden;
}

/* ── Header ──────────────────────────────────────── */
.header {
  height: 40px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 16px;
  background: var(--bg-1);
  border-bottom: 1px solid var(--border);
  position: sticky;
  top: 0;
  z-index: 200;
}

.header-left {
  display: flex;
  align-items: center;
  gap: 12px;
}

.header-title {
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--green-bright);
}

.header-live {
  display: flex;
  align-items: center;
  gap: 5px;
  font-size: 10px;
  color: var(--green);
  text-transform: uppercase;
  letter-spacing: 1px;
}

.live-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--green);
  animation: blink 2s ease-in-out infinite;
}

@keyframes blink {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.2; }
}

.header-right {
  display: flex;
  align-items: center;
  gap: 16px;
}

.header-stat {
  font-size: 10px;
  color: var(--text-2);
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.header-stat span { color: var(--text-1); }

.threat-pill {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 1px;
  text-transform: uppercase;
  padding: 3px 10px;
  border-radius: 3px;
}

.threat-pill.elevated {
  background: var(--orange-dim);
  color: var(--orange);
  border: 1px solid rgba(234,88,12,0.3);
}

.threat-pill.critical {
  background: var(--red-dim);
  color: var(--red);
  border: 1px solid rgba(220,38,38,0.3);
}

/* ── Map Section ─────────────────────────────────── */
.map-section {
  position: relative;
  height: 55vh;
  min-height: 380px;
  background: #050505;
  border-bottom: 1px solid var(--border);
  overflow: hidden;
  isolation: isolate;
  z-index: 1;
}

#globe-container {
  width: 100%;
  height: 100%;
}

#globe-container canvas { cursor: grab; }
#globe-container canvas:active { cursor: grabbing; }

.map-overlay-top {
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 60px;
  background: linear-gradient(180deg, rgba(5,5,5,0.8) 0%, transparent 100%);
  pointer-events: none;
  z-index: 10;
}

.map-overlay-bottom {
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  height: 80px;
  background: linear-gradient(0deg, rgba(10,10,10,0.9) 0%, transparent 100%);
  pointer-events: none;
  z-index: 10;
}

.map-legend {
  position: absolute;
  bottom: 12px;
  left: 16px;
  display: flex;
  flex-wrap: wrap;
  gap: 4px 10px;
  z-index: 20;
  pointer-events: auto;
  max-width: 60%;
}

.legend-item {
  display: flex;
  align-items: center;
  gap: 4px;
  font-size: 9px;
  color: var(--text-2);
  text-transform: uppercase;
  letter-spacing: 0.4px;
}

.legend-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
}



/* Layer Toggles */
.map-layer-toggles {
  position: absolute; top: 12px; left: 16px; z-index: 25;
  display: flex; flex-direction: column; gap: 3px;
  background: rgba(10,10,10,0.92); backdrop-filter: blur(6px);
  border: 1px solid var(--border); border-radius: 4px; padding: 0;
  max-width: 180px; transition: max-height 0.3s ease, opacity 0.3s ease;
  overflow: hidden;
}
.map-layer-toggles.collapsed .layer-toggles-body { display: none; }
.layer-toggles-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 5px 8px; cursor: pointer; border-bottom: 1px solid var(--border);
  font-size: 9px; text-transform: uppercase; letter-spacing: 0.8px;
  color: var(--green); font-weight: 700; font-family: var(--mono);
  user-select: none;
}
.layer-toggles-header:hover { color: var(--green-bright); }
.layer-toggles-header .arrow { transition: transform 0.2s; font-size: 8px; }
.map-layer-toggles.collapsed .layer-toggles-header .arrow { transform: rotate(-90deg); }
.layer-toggles-body { padding: 4px 8px 6px; display: flex; flex-direction: column; gap: 2px; }
.layer-toggle {
  display: flex; align-items: center; gap: 5px; font-size: 9px;
  color: var(--text-2); cursor: pointer; text-transform: uppercase; letter-spacing: 0.4px;
  white-space: nowrap; padding: 1px 0;
}
.layer-toggle:hover { color: var(--text-0); }
.layer-toggle input { width: 11px; height: 11px; accent-color: var(--green); cursor: pointer; }
.layer-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }

/* MapLibre globe overrides */
#globe-container { width: 100%; height: 100%; }
#globe-container .maplibregl-canvas { outline: none; }
#globe-container .maplibregl-ctrl-attrib { display: none !important; }
.globe-popup .maplibregl-popup-content {
  background: rgba(10,10,10,0.95); color: #e0e0e0; font-family: var(--mono);
  font-size: 11px; padding: 6px 10px; border-radius: 3px;
  border: 1px solid #333; max-width: 260px; line-height: 1.4;
}
.globe-popup .maplibregl-popup-tip { border-top-color: rgba(10,10,10,0.95); }

/* Sources bar at page bottom */
.sources-bar {
  text-align: center; padding: 12px 0; font-size: 10px;
  color: #888; text-transform: uppercase; letter-spacing: 0.5px;
  border-top: 1px solid var(--border); margin-top: 8px;
}
.sources-bar span { color: var(--green); font-weight: 600; }

/* Heatmap indicator */
.heatmap-indicator {
  display: none;
  position: absolute;
  top: 12px;
  left: 16px;
  background: rgba(10,10,10,0.9);
  border: 1px solid var(--green-bright);
  border-radius: 4px;
  padding: 6px 12px;
  z-index: 25;
  align-items: center;
  gap: 10px;
  backdrop-filter: blur(4px);
}
.heatmap-indicator.active { display: flex; }
.heatmap-indicator-label { font-size: 10px; color: var(--text-2); text-transform: uppercase; letter-spacing: 0.6px; }
.heatmap-indicator-country { font-size: 11px; font-weight: 700; color: var(--text-0); }
.heatmap-indicator-flag { font-size: 14px; }
.heatmap-clear-btn {
  background: none;
  border: 1px solid var(--border);
  color: var(--text-1);
  cursor: pointer;
  padding: 2px 8px;
  border-radius: 2px;
  font-family: var(--mono);
  font-size: 9px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
.heatmap-clear-btn:hover { border-color: var(--red); color: var(--red); }

/* ── Panels Grid ─────────────────────────────────── */
.panels-container {
  padding: 12px;
  position: relative;
  z-index: 2;
}

.panels-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 8px;
}

/* ── Panel Base ──────────────────────────────────── */
.panel {
  background: var(--bg-1);
  border: 1px solid var(--border);
  border-radius: 4px;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  max-height: 340px;
}

.panel-head {
  height: 32px;
  min-height: 32px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 10px;
  background: var(--bg-2);
  border-bottom: 1px solid var(--border);
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--text-1);
}

.panel-badge {
  font-size: 9px;
  font-weight: 700;
  padding: 1px 6px;
  border-radius: 2px;
  letter-spacing: 0.5px;
}

.panel-badge.red { background: var(--red-dim); color: var(--red); }
.panel-badge.orange { background: var(--orange-dim); color: var(--orange); }
.panel-badge.green { background: rgba(22,163,74,0.15); color: var(--green); }
.panel-badge.blue { background: rgba(37,99,235,0.15); color: var(--blue); }

.panel-body {
  flex: 1;
  overflow-y: auto;
  padding: 0;
}

.panel-body::-webkit-scrollbar { width: 4px; }
.panel-body::-webkit-scrollbar-track { background: transparent; }
.panel-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

/* ── Conflict Rows ───────────────────────────────── */
.c-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 6px 10px;
  border-bottom: 1px solid rgba(255,255,255,0.03);
  cursor: pointer;
  transition: background 0.15s;
  gap: 8px;
}

.c-row:hover { background: var(--bg-2); }
.c-row:last-child { border-bottom: none; }

.c-row-left { flex: 1; min-width: 0; }

.c-name {
  font-size: 11px;
  font-weight: 600;
  color: var(--text-0);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.c-meta {
  font-size: 9px;
  color: var(--text-2);
  margin-top: 1px;
}

.c-type {
  font-size: 9px;
  padding: 1px 4px;
  border-radius: 2px;
  background: rgba(37,99,235,0.1);
  color: var(--blue);
  text-transform: uppercase;
  letter-spacing: 0.3px;
}

.c-bars {
  display: flex;
  gap: 1px;
  flex-shrink: 0;
}

.c-bar {
  width: 3px;
  height: 12px;
  border-radius: 1px;
  background: var(--border);
}

.c-bar.on { background: var(--red); }
.c-bar.on.med { background: var(--orange); }
.c-bar.on.low { background: var(--yellow); }

/* ── Hotspot Rows ────────────────────────────────── */
.h-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 5px 10px;
  border-bottom: 1px solid rgba(255,255,255,0.03);
  cursor: pointer;
  transition: background 0.15s;
}

.h-row:hover { background: var(--bg-2); }
.h-row:last-child { border-bottom: none; }

.h-name {
  font-size: 11px;
  font-weight: 500;
  color: var(--text-0);
}

.h-note {
  font-size: 9px;
  color: var(--text-2);
  margin-top: 1px;
}

.h-level {
  font-size: 9px;
  font-weight: 700;
  padding: 1px 5px;
  border-radius: 2px;
  text-transform: uppercase;
  letter-spacing: 0.3px;
  flex-shrink: 0;
}

.h-level.high { background: var(--red-dim); color: var(--red); }
.h-level.elevated { background: var(--orange-dim); color: var(--orange); }
.h-level.watch { background: rgba(37,99,235,0.15); color: var(--blue); }

/* ── Indicator Panel ─────────────────────────────── */
.ind-body { padding: 10px; }

.ind-top {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 8px;
}

.ind-icon { font-size: 18px; line-height: 1; }

.ind-status {
  font-size: 9px;
  font-weight: 700;
  padding: 1px 6px;
  border-radius: 2px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.ind-status.critical { background: var(--red-dim); color: var(--red); }
.ind-status.elevated { background: var(--orange-dim); color: var(--orange); }
.ind-status.normal { background: rgba(22,163,74,0.15); color: var(--green); }
.ind-status.low { background: rgba(37,99,235,0.15); color: var(--blue); }

.ind-value {
  font-size: 26px;
  font-weight: 800;
  letter-spacing: -1px;
  line-height: 1;
  margin-bottom: 2px;
  font-variant-numeric: tabular-nums;
}

.ind-unit {
  font-size: 10px;
  color: var(--text-2);
  margin-left: 4px;
  font-weight: 400;
}

.ind-bar {
  width: 100%;
  height: 3px;
  background: rgba(255,255,255,0.05);
  border-radius: 1px;
  margin: 8px 0;
  overflow: hidden;
}

.ind-bar-fill {
  height: 100%;
  border-radius: 1px;
  transition: width 1s ease;
}

.ind-spark {
  height: 32px !important;
  max-height: 32px;
  width: 100% !important;
  margin: 6px 0;
  display: block;
}

.ind-desc {
  font-size: 10px;
  color: var(--text-2);
  line-height: 1.4;
}

.ind-source {
  font-size: 9px;
  color: var(--text-2);
  opacity: 0.5;
  margin-top: 4px;
}

/* ── Sanction Rows ───────────────────────────────── */
.s-row {
  display: flex;
  align-items: center;
  padding: 5px 10px;
  border-bottom: 1px solid rgba(255,255,255,0.03);
  gap: 8px;
  font-size: 11px;
}

.s-row:last-child { border-bottom: none; }
.s-from { color: var(--text-1); font-weight: 600; min-width: 80px; }
.s-arrow { color: var(--text-2); }
.s-target { color: var(--orange); font-weight: 600; min-width: 70px; }
.s-note { color: var(--text-2); font-size: 10px; flex: 1; }

/* ── Nuclear Rows ────────────────────────────────── */
.n-row {
  display: grid;
  grid-template-columns: 24px 1fr 60px;
  align-items: center;
  padding: 4px 10px;
  border-bottom: 1px solid rgba(255,255,255,0.03);
  gap: 8px;
  font-size: 11px;
}

.n-row:last-child { border-bottom: none; }
.n-flag { font-size: 14px; }
.n-info { display: flex; flex-direction: column; }
.n-country { font-weight: 600; font-size: 11px; }

.n-bar-wrap {
  display: flex;
  align-items: center;
  gap: 4px;
  margin-top: 2px;
}

.n-bar {
  flex: 1;
  height: 3px;
  background: rgba(255,255,255,0.05);
  border-radius: 1px;
  overflow: hidden;
}

.n-bar-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--orange), var(--red));
  border-radius: 1px;
}

.n-count {
  font-weight: 700;
  font-variant-numeric: tabular-nums;
  color: var(--red);
  text-align: right;
}

.n-status { font-size: 9px; color: var(--text-2); }

/* ── Militia Rows ───────────────────────────────── */
.m-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 5px 10px;
  border-bottom: 1px solid rgba(255,255,255,0.03);
  cursor: pointer;
  transition: background 0.15s;
}

.m-row:hover { background: var(--bg-2); }
.m-row:last-child { border-bottom: none; }
.m-row-left { flex: 1; min-width: 0; }
.m-name { font-size: 11px; font-weight: 600; color: var(--text-0); }
.m-meta { font-size: 9px; color: var(--text-2); margin-top: 1px; }
.m-type {
  font-size: 9px; padding: 1px 4px; border-radius: 2px;
  background: rgba(168,85,247,0.12); color: #a855f7;
  text-transform: uppercase; letter-spacing: 0.3px;
}
.m-strength { font-size: 9px; color: var(--text-2); flex-shrink: 0; text-align: right; }

/* ── News Rows ──────────────────────────────────── */
.news-row {
  padding: 8px 12px;
  border-bottom: 1px solid rgba(255,255,255,0.04);
  cursor: pointer;
  transition: background 0.15s;
  text-decoration: none;
  display: block;
}

.news-row:hover { background: var(--bg-2); }
.news-row:last-child { border-bottom: none; }

.news-meta {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 3px;
}

.news-source {
  font-size: 9px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  color: var(--green);
  padding: 1px 5px;
  border: 1px solid var(--border);
  border-radius: 2px;
}

.news-time {
  font-size: 9px;
  color: var(--text-2);
  font-variant-numeric: tabular-nums;
}

.news-title {
  font-size: 11px;
  font-weight: 500;
  color: var(--text-0);
  line-height: 1.35;
}

.news-desc {
  font-size: 10px;
  color: var(--text-2);
  line-height: 1.35;
  margin-top: 2px;
  overflow: hidden;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
}

.news-loading {
  padding: 16px;
  text-align: center;
  font-size: 10px;
  color: var(--text-2);
  text-transform: uppercase;
  letter-spacing: 1px;
}

/* ── Polymarket Rows ────────────────────────────── */
.poly-row {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px 12px;
  border-bottom: 1px solid rgba(255,255,255,0.04);
  cursor: pointer;
  transition: background 0.15s;
  text-decoration: none;
  color: inherit;
}
.poly-row:hover { background: var(--bg-2); }
.poly-row:last-child { border-bottom: none; }

.poly-gauge {
  width: 48px;
  height: 48px;
  flex-shrink: 0;
  position: relative;
}
.poly-gauge-svg { width: 100%; height: 100%; transform: rotate(-90deg); }
.poly-gauge-bg { fill: none; stroke: rgba(255,255,255,0.08); stroke-width: 5; }
.poly-gauge-fg { fill: none; stroke-width: 5; stroke-linecap: round; transition: stroke-dasharray 0.8s ease; }
.poly-gauge-text {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 11px;
  font-weight: 800;
  font-variant-numeric: tabular-nums;
}

.poly-info { flex: 1; min-width: 0; }
.poly-question {
  font-size: 11px;
  font-weight: 600;
  color: var(--text-0);
  line-height: 1.35;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}
.poly-meta {
  font-size: 9px;
  color: var(--text-2);
  margin-top: 4px;
  display: flex;
  gap: 10px;
  font-variant-numeric: tabular-nums;
}
.poly-meta-label { color: var(--text-2); }
.poly-meta-value { color: var(--text-1); font-weight: 600; }
.poly-outcome {
  font-size: 9px;
  padding: 2px 6px;
  border-radius: 2px;
  background: rgba(22,163,74,0.15);
  color: var(--green);
  text-transform: uppercase;
  letter-spacing: 0.4px;
  font-weight: 700;
  flex-shrink: 0;
}
.poly-outcome.no { background: var(--red-dim); color: var(--red); }

/* ── Relations Overlay ──────────────────────────── */
.relations-overlay {
  display: none;
  position: fixed;
  top: 40px;
  right: 0;
  width: 340px;
  max-height: calc(100vh - 52px);
  background: var(--bg-1);
  border-left: 1px solid var(--border);
  border-bottom: 1px solid var(--border);
  z-index: 150;
  overflow-y: auto;
  box-shadow: -4px 0 20px rgba(0,0,0,0.5);
}

.relations-overlay.open { display: block; }

.relations-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 12px; background: var(--bg-2);
  border-bottom: 1px solid var(--border);
}

.relations-title { font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; }
.relations-close {
  width: 24px; height: 24px; background: none; border: 1px solid var(--border);
  color: var(--text-1); cursor: pointer; font-size: 14px; border-radius: 3px;
  display: flex; align-items: center; justify-content: center;
  font-family: var(--mono);
}
.relations-close:hover { border-color: var(--text-0); color: var(--text-0); }

.rel-row {
  display: flex; align-items: center; padding: 6px 12px;
  border-bottom: 1px solid rgba(255,255,255,0.03);
  cursor: pointer; transition: background 0.15s; gap: 8px;
}
.rel-row:hover { background: var(--bg-2); }
.rel-row:last-child { border-bottom: none; }

.rel-flag { font-size: 16px; flex-shrink: 0; }
.rel-info { flex: 1; min-width: 0; }
.rel-name { font-size: 11px; font-weight: 600; }
.rel-detail { font-size: 9px; color: var(--text-2); margin-top: 1px; }
.rel-type {

}
.rel-type.ally { background: rgba(22,163,74,0.15); color: var(--green); }
.rel-type.partner { background: rgba(37,99,235,0.15); color: var(--blue); }

/* ── Country Selector ───────────────────────────── */
.country-select-row {
  display: flex; align-items: center; gap: 6px;
  padding: 8px 12px; border-bottom: 1px solid var(--border);
}

.country-select-row select {
  flex: 1; background: var(--bg-2); color: var(--text-0); border: 1px solid var(--border);
  padding: 4px 8px; border-radius: 3px; font-family: var(--mono); font-size: 11px;
}

/* ── Country Profile Modal ──────────────────────── */
.country-modal {
  display: none;

  inset: 0;

  z-index: 300;
  overflow-y: auto;
  backdrop-filter: blur(4px);
}

.cm-dialog {
  max-width: 1100px;
  margin: 40px auto;
  background: var(--bg-1);
  border: 1px solid var(--border);
  border-radius: 6px;
  overflow: hidden;

}

.cm-header {
  display: flex;
  align-items: center;
  gap: 16px;
  padding: 18px 20px;
  background: var(--bg-2);
  border-bottom: 1px solid var(--border);
}
.cm-flag { font-size: 48px; line-height: 1; }
.cm-title-block { flex: 1; min-width: 0; }
.cm-title { font-size: 22px; font-weight: 800; color: var(--text-0); letter-spacing: 0.5px; }
.cm-subtitle { font-size: 11px; color: var(--text-2); margin-top: 4px; text-transform: uppercase; letter-spacing: 0.8px; }
.cm-close {
  width: 32px; height: 32px; background: var(--bg-3); border: 1px solid var(--border);
  color: var(--text-1); cursor: pointer; font-size: 18px; border-radius: 4px;
  display: flex; align-items: center; justify-content: center;
  font-family: var(--mono);
}
.cm-close:hover { border-color: var(--text-0); color: var(--text-0); }

.cm-stats {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
  gap: 0;
  border-bottom: 1px solid var(--border);
}
.cm-stat {
  padding: 12px 16px;
  border-right: 1px solid var(--border);
}
.cm-stat:last-child { border-right: none; }
.cm-stat-label { font-size: 9px; color: var(--text-2); text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 3px; }
.cm-stat-value { font-size: 14px; font-weight: 700; color: var(--text-0); }

.cm-section {
  padding: 16px 20px;
  border-bottom: 1px solid var(--border);
}
.cm-section:last-child { border-bottom: none; }

.cm-section-title {
  font-size: 10px;
  font-weight: 700;
  color: var(--green-bright);
  text-transform: uppercase;
  letter-spacing: 1.2px;
  margin-bottom: 10px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.cm-section-title::before {
  content: '';
  width: 4px; height: 12px;
  background: var(--green-bright);
  border-radius: 1px;
}

.cm-leaders {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 8px;
}
.cm-leader {
  padding: 10px 12px;
  background: var(--bg-2);
  border: 1px solid var(--border);
  border-radius: 4px;
}
.cm-leader-role { font-size: 9px; color: var(--text-2); text-transform: uppercase; letter-spacing: 0.6px; }
.cm-leader-name { font-size: 13px; font-weight: 600; color: var(--text-0); margin-top: 2px; }

.cm-memberships { display: flex; flex-wrap: wrap; gap: 6px; }
.cm-membership {
  font-size: 10px;
  padding: 4px 10px;
  background: rgba(37,99,235,0.1);
  color: var(--blue);
  border: 1px solid rgba(37,99,235,0.3);
  border-radius: 3px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.4px;
}

.cm-policies {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 8px;
}
.cm-policy {
  padding: 10px 12px;
  background: var(--bg-2);
  border: 1px solid var(--border);
  border-left: 3px solid var(--border-light);
  border-radius: 4px;
}
.cm-policy-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 4px;
}
.cm-policy-name {
  font-size: 11px;
  font-weight: 700;
  color: var(--text-0);
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
.cm-policy-status {
  font-size: 9px;
  font-weight: 700;
  padding: 2px 6px;
  border-radius: 2px;
  text-transform: uppercase;
  letter-spacing: 0.4px;
  background: rgba(255,255,255,0.05);
  color: var(--text-1);
}
.cm-policy-status.legal, .cm-policy-status.active, .cm-policy-status.universal,
.cm-policy-status.open, .cm-policy-status.protected { background: rgba(22,163,74,0.15); color: var(--green); }
.cm-policy-status.restricted, .cm-policy-status.mixed, .cm-policy-status.limited,
.cm-policy-status.moderate, .cm-policy-status.complex { background: var(--orange-dim); color: var(--orange); }
.cm-policy-status.banned, .cm-policy-status.strict, .cm-policy-status.reduced,
.cm-policy-status.closed, .cm-policy-status.low, .cm-policy-status.minimal { background: var(--red-dim); color: var(--red); }
.cm-policy-status.abolished, .cm-policy-status.moratorium,
.cm-policy-status.non-nuclear { background: rgba(37,99,235,0.15); color: var(--blue); }
.cm-policy-detail { font-size: 10px; color: var(--text-1); line-height: 1.45; }

.cm-relations-list {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 4px;
}
.cm-rel {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 6px 10px;
  background: var(--bg-2);
  border-radius: 3px;
  border: 1px solid transparent;
}
.cm-rel:hover { border-color: var(--border); cursor: pointer; }
.cm-rel-flag { font-size: 16px; flex-shrink: 0; }
.cm-rel-name { font-size: 11px; font-weight: 600; color: var(--text-0); flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.cm-rel-bar {
  width: 60px;
  height: 6px;
  background: rgba(255,255,255,0.08);
  border-radius: 3px;
  overflow: hidden;
  flex-shrink: 0;
}
.cm-rel-bar-fill {
  height: 100%;
  border-radius: 3px;
  transition: width 0.5s ease;
}
.cm-rel-score {
  font-size: 10px;
  font-weight: 700;
  font-variant-numeric: tabular-nums;
  width: 24px;
  text-align: right;
  flex-shrink: 0;
}

/* ── Country Browser Panel Cards ───────────────── */
.cb-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
  gap: 6px;
  padding: 10px;
}
.cb-card {
  padding: 8px 10px;
  background: var(--bg-2);
  border: 1px solid var(--border);
  border-radius: 4px;
  cursor: pointer;
  transition: border-color 0.15s, transform 0.15s;
  display: flex;
  align-items: center;
  gap: 8px;
}
.cb-card:hover {
  border-color: var(--green-bright);
  transform: translateY(-1px);
}
.cb-card-flag { font-size: 22px; flex-shrink: 0; }
.cb-card-info { flex: 1; min-width: 0; }
.cb-card-name { font-size: 11px; font-weight: 700; color: var(--text-0); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.cb-card-meta { font-size: 9px; color: var(--text-2); margin-top: 2px; }

/* ── Trend Sparklines ─────────────────────────────── */
.trend-row {
  display: flex; align-items: center; gap: 10px;
  padding: 8px 12px;
  border-bottom: 1px solid rgba(255,255,255,0.04);
}
.trend-row:last-child { border-bottom: none; }
.trend-label { flex: 1; min-width: 0; }
.trend-title { font-size: 11px; font-weight: 700; color: var(--text-0); }
.trend-sub { font-size: 9px; color: var(--text-2); margin-top: 1px; }
.trend-spark { width: 80px; height: 28px; flex-shrink: 0; }
.trend-val { font-size: 13px; font-weight: 800; color: var(--text-0); font-variant-numeric: tabular-nums; width: 50px; text-align: right; flex-shrink: 0; }
.trend-dir { font-size: 9px; font-weight: 600; padding: 2px 6px; border-radius: 3px; text-transform: uppercase; flex-shrink: 0; }
.trend-dir.up { background: rgba(220,38,38,0.15); color: #dc2626; }
.trend-dir.down { background: rgba(22,163,74,0.15); color: #16a34a; }
.trend-dir.stable { background: rgba(202,138,4,0.15); color: #ca8a04; }

/* ── Alliance Blocs ──────────────────────────────── */
.bloc-row {
  display: flex; align-items: center; gap: 8px;
  padding: 7px 12px;
  border-bottom: 1px solid rgba(255,255,255,0.04);
  cursor: pointer;
  transition: background 0.15s;
}
.bloc-row:hover { background: var(--bg-2); }
.bloc-row:last-child { border-bottom: none; }
.bloc-name { font-size: 12px; font-weight: 700; color: var(--text-0); min-width: 80px; }
.bloc-stat { font-size: 10px; color: var(--text-2); }
.bloc-stat b { color: var(--text-0); font-variant-numeric: tabular-nums; }
.bloc-trend { font-size: 9px; font-weight: 600; padding: 2px 6px; border-radius: 3px; text-transform: uppercase; margin-left: auto; flex-shrink: 0; }
.bloc-trend.expanding { background: rgba(22,163,74,0.15); color: #16a34a; }
.bloc-trend.stable { background: rgba(202,138,4,0.15); color: #ca8a04; }
.bloc-trend.weakening { background: rgba(220,38,38,0.15); color: #dc2626; }
.bloc-trend.deepening { background: rgba(37,99,235,0.15); color: #3b82f6; }
.bloc-trend.reforming { background: rgba(168,85,247,0.15); color: #a855f7; }
.bloc-trend.consolidating { background: rgba(37,99,235,0.15); color: #3b82f6; }
.bloc-trend.maturing { background: rgba(22,163,74,0.15); color: #16a34a; }
.bloc-trend.diversifying { background: rgba(202,138,4,0.15); color: #ca8a04; }
.bloc-trend.refocusing { background: rgba(202,138,4,0.15); color: #ca8a04; }
.bloc-trend.fractured { background: rgba(220,38,38,0.15); color: #dc2626; }

/* ── Democracy Tracker ───────────────────────────── */
.dem-bar-container { padding: 12px; }
.dem-bar-wrap { margin-bottom: 10px; }
.dem-bar-label {
  display: flex; justify-content: space-between; align-items: center;
  font-size: 10px; margin-bottom: 4px;
}
.dem-bar-label-name { font-weight: 700; color: var(--text-0); }
.dem-bar-label-num { font-weight: 600; font-variant-numeric: tabular-nums; }
.dem-bar-track { height: 16px; background: var(--bg-2); border-radius: 3px; overflow: hidden; position: relative; }
.dem-bar-fill { height: 100%; border-radius: 3px; transition: width 1s ease; display: flex; align-items: center; padding-left: 6px; }
.dem-bar-pct { font-size: 8px; font-weight: 700; color: #fff; text-shadow: 0 0 3px rgba(0,0,0,0.6); }
.dem-examples { font-size: 9px; color: var(--text-2); margin-top: 3px; }

/* ── GDP Share Shift ─────────────────────────────── */
.gdp-shift-row {
  display: flex; align-items: center; gap: 8px;
  padding: 6px 12px;
  border-bottom: 1px solid rgba(255,255,255,0.04);
}
.gdp-shift-row:last-child { border-bottom: none; }
.gdp-shift-year { font-size: 11px; font-weight: 700; color: var(--text-0); width: 40px; flex-shrink: 0; }
.gdp-shift-bars { flex: 1; display: flex; height: 18px; border-radius: 3px; overflow: hidden; }
.gdp-shift-seg { height: 100%; display: flex; align-items: center; justify-content: center; font-size: 8px; font-weight: 700; color: #fff; text-shadow: 0 0 3px rgba(0,0,0,0.5); transition: width 1s ease; }

/* ── Country Indices in Modal ────────────────────── */
.cm-indices-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 6px; padding: 4px 0;
}
.cm-idx-card {
  padding: 8px; background: var(--bg-2); border: 1px solid var(--border); border-radius: 4px; text-align: center;
}
.cm-idx-val { font-size: 18px; font-weight: 800; font-variant-numeric: tabular-nums; }
.cm-idx-label { font-size: 9px; color: var(--text-2); margin-top: 2px; text-transform: uppercase; letter-spacing: 0.5px; }
.cm-idx-bar { height: 3px; border-radius: 2px; margin-top: 4px; background: var(--bg-2); overflow: hidden; }
.cm-idx-bar-fill { height: 100%; border-radius: 2px; }

/* ── Econ Ranking Panel ──────────────────────────── */
.econ-row {
  display: flex; align-items: center; gap: 8px;
  padding: 6px 12px;
  border-bottom: 1px solid rgba(255,255,255,0.04);
  font-size: 11px;
}
.econ-row:last-child { border-bottom: none; }
.econ-rank { font-size: 10px; font-weight: 700; color: var(--text-2); width: 18px; text-align: right; }
.econ-flag { font-size: 16px; }
.econ-name { flex: 1; font-weight: 600; color: var(--text-0); min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.econ-gdp { font-weight: 800; font-variant-numeric: tabular-nums; color: var(--text-0); width: 50px; text-align: right; }
.econ-growth { font-size: 10px; font-weight: 700; width: 46px; text-align: right; font-variant-numeric: tabular-nums; }
.econ-growth.pos { color: #16a34a; }
.econ-growth.neg { color: #dc2626; }
.econ-debt { font-size: 9px; color: var(--text-2); width: 42px; text-align: right; }

/* ── Footer ──────────────────────────────────────── */
.footer {
  padding: 12px 16px;
  text-align: center;
  font-size: 9px;
  color: var(--text-2);
  border-top: 1px solid var(--border);
  letter-spacing: 0.3px;
}

/* ── Theme Switcher ──────────────────────────────── */
.theme-switcher {
  display: flex;
  gap: 4px;
  align-items: center;
  margin-left: 8px;
  padding-left: 12px;
  border-left: 1px solid var(--border);
}

.theme-btn {
  width: 16px;
  height: 16px;
  border-radius: 3px;
  border: 1px solid var(--border);
  cursor: pointer;
  transition: transform 0.15s, border-color 0.15s;
  position: relative;
}

.theme-btn:hover { transform: scale(1.15); border-color: var(--text-1); }
.theme-btn.active { border-color: var(--text-0); box-shadow: 0 0 4px rgba(255,255,255,0.2); }
.theme-btn.active::after {
  content: '';
  position: absolute;
  bottom: -4px;
  left: 50%;
  transform: translateX(-50%);
  width: 4px;
  height: 2px;
  border-radius: 1px;
  background: var(--green);
}

.theme-btn[data-theme="dark"] { background: #0a0a0a; }
.theme-btn[data-theme="light"] { background: #f0f0f0; }
.theme-btn[data-theme="green"] { background: #0a1a0a; }
.theme-btn[data-theme="amber"] { background: #1a150a; }
.theme-btn[data-theme="blue"] { background: #0a0a1a; }

  --bg-0: #f0f0f0;

  --bg-2: #f5f5f5;
  --bg-3: #eaeaea;

  --green-bright: #15803d;

  --red-dim: rgba(220,38,38,0.1);

[data-theme="light"] .c-row, [data-theme="light"] .h-row,

/* ── Theme: Green Terminal ───────────────────────── */

  --bg-3: #1a2a1a;

/* ── Theme: Amber Terminal ───────────────────────── */

  --text-2: #886611;

  --green-bright: #ffcc44;
  --red: #ff4444;
  --red-dim: rgba(255,68,68,0.15);

/* ── Scrollbar ───────────────────────────────────── */

  </div>

      <span class="arrow">&#9660;</span>
    </div>
    <div class="layer-toggles-body">
      <label class="layer-toggle"><input type="checkbox" id="lyr-conflicts" checked><span class="layer-dot" style="background:#dc2626"></span>Conflicts</label>

      <label class="layer-toggle"><input type="checkbox" id="lyr-reactors"><span class="layer-dot" style="background:#84cc16"></span>Reactors</label>
      <label class="layer-toggle"><input type="checkbox" id="lyr-shipping"><span class="layer-dot" style="background:#60a5fa"></span>Shipping</label>
      <label class="layer-toggle"><input type="checkbox" id="lyr-industrial"><span class="layer-dot" style="background:#f472b6"></span>Industrial</label>
      <label class="layer-toggle"><input type="checkbox" id="lyr-ecozones"><span class="layer-dot" style="background:#c084fc"></span>Econ Zones</label>
      <label class="layer-toggle"><input type="checkbox" id="lyr-oilfields"><span class="layer-dot" style="background:#d97706"></span>Oil/Rare Earth</label>

<div class="footer">
  Data curated / simulated for indicators without live feeds. Conflict data based on open-source intelligence.
  Updated: <span id="last-updated"></span>
</div>

<script>
// ── Theme ────────────────────────────────────────────────
(function() {
  const saved = localStorage.getItem('wm-theme') || 'dark';
  if (saved !== 'dark') document.documentElement.setAttribute('data-theme', saved);
  document.querySelectorAll('.theme-btn').forEach(btn => {
    if (btn.dataset.theme === saved) btn.classList.add('active');
    else btn.classList.remove('active');
  });
})();

function setTheme(theme) {
  if (theme === 'dark') document.documentElement.removeAttribute('data-theme');
  else document.documentElement.setAttribute('data-theme', theme);
  localStorage.setItem('wm-theme', theme);
  document.querySelectorAll('.theme-btn').forEach(b => b.classList.toggle('active', b.dataset.theme === theme));
  // Update globe background (MapLibre sky/fog)
  if (globeMap) {
    const bgMap = { dark: '#050505', light: '#e0e0e0', green: '#030803', amber: '#080604', blue: '#040610' };
    const bg = bgMap[theme] || '#050505';
    try { globeMap.setFog({ color: bg, 'horizon-blend': 0.02 }); } catch(e) {}
  }
}

document.addEventListener('click', e => {
  const btn = e.target.closest('.theme-btn');
  if (btn) setTheme(btn.dataset.theme);
});

// ── Helpers ───────────────────────────────────────────────
function countryFlag(code) {
  return code.toUpperCase().replace(/./g, c => String.fromCodePoint(0x1F1E6 + c.charCodeAt(0) - 65));
}

const ICONS = {
  'pentagon-pizza': '\u{1F355}', 'doomsday-clock': '\u{23F0}',
  'vix': '\u{1F4C9}', 'baltic-dry': '\u{1F6A2}',
  'big-mac': '\u{1F354}', 'misery-index': '\u{1F629}',
  'waffle-house': '\u{1F9C7}', 'lipstick-index': '\u{1F484}',
  'cardboard-box': '\u{1F4E6}', 'underwear-index': '\u{1FA72}',
  'copper-gold': '\u{2696}\u{FE0F}', 'skyscraper-index': '\u{1F3D7}\u{FE0F}',
};

const STATUS_COLORS = {
  critical: '#dc2626', elevated: '#ea580c',
  normal: '#16a34a', low: '#2563eb',
};

let globe;
let data = {};
let relationArcs = [];

// ── Init ─────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', async () => {
  await loadData();
  try { initGlobe(); } catch(e) { console.warn('Globe init failed:', e); }
  renderPanels();
  updateHeaderStats();
  document.getElementById('last-updated').textContent = new Date().toLocaleString();

  // Collapsible layer panel
  document.getElementById('layer-toggles-header').addEventListener('click', () => {
    document.getElementById('map-layer-toggles').classList.toggle('collapsed');
  });

  // Layer toggle checkboxes
  document.querySelectorAll('.map-layer-toggles input').forEach(cb => {
    cb.addEventListener('change', () => {
      updateLayerCount();
      refreshGlobePoints();
      refreshGlobeArcs();
      // Fetch data on first toggle
      if (cb.id === 'lyr-aircraft' && cb.checked && aircraftData.length === 0) loadAircraft();
      if (cb.id === 'lyr-disasters' && cb.checked && globeDisasters.length === 0) loadDisasters();
      if (cb.id === 'lyr-satellites' && cb.checked && globeSatellites.length === 0) loadSatellites();
    });
  });

  // Fetch news & polymarket asynchronously
  loadNews();
  loadPolymarket();
  setInterval(loadNews, 90 * 1000);
  setInterval(loadPolymarket, 60 * 1000);
  // Refresh aircraft every 30s if layer is on
  setInterval(() => {
    if (document.getElementById('lyr-aircraft')?.checked) loadAircraft();
  }, 30 * 1000);
});

async function loadData() {
  try {
    const resp = await fetch('/api/all');
    data = await resp.json();
    data.news = [];
    data.polymarket = [];
  } catch (e) {
    console.error('Failed to load data:', e);
    data = { conflicts: [], hotspots: [], indicators: [], sanctions: [], nuclear: [], militias: [], relations: {}, profiles: {}, news: [], polymarket: [], threat_level: 'UNKNOWN', threat_note: '' };
  }
}

async function loadPolymarket() {
  try {
    const resp = await fetch('/api/polymarket');
    const d = await resp.json();
    data.polymarket = d.markets || [];
    const body = document.getElementById('poly-panel-body');
    if (body) body.innerHTML = buildPolyRows();
  } catch (e) {
    console.error('Failed to load polymarket:', e);
  }
}

async function loadNews() {
  try {
    const resp = await fetch('/api/news');
    const d = await resp.json();
    data.news = d.news || [];
    // Update just the news panel
    const newsBody = document.getElementById('news-panel-body');
    if (newsBody) newsBody.innerHTML = buildNewsRows();
  } catch (e) {
    console.error('Failed to load news:', e);
  }
}

// ── Globe (MapLibre GL) ──────────────────────────────────
let globeMap = null;
let _globeReady = false;
let globeDisasters = [];
let globeSatellites = [];
const _globePopup = typeof maplibregl !== 'undefined' ? new maplibregl.Popup({ closeButton: false, closeOnClick: false, className: 'globe-popup', offset: 10 }) : null;

// Point layer configs: id, color, radius, strokeWidth
const _ptLayers = [
  { id: 'hotspots', color: '#ea580c', radius: 6, sw: 2 },
  { id: 'militias', color: '#a855f7', radius: 5, sw: 1 },
  { id: 'bases', color: '#3b82f6', radius: 5, sw: 1 },
  { id: 'nukes', color: '#f59e0b', radius: 6, sw: 1 },
  { id: 'vessels', color: '#06b6d4', radius: 10, sw: 2 },
  { id: 'aircraft', color: '#a3e635', radius: 4, sw: 0 },
  { id: 'disasters', color: '#ef4444', radius: 7, sw: 2 },
  { id: 'satellites', color: '#818cf8', radius: 2, sw: 0 },
  { id: 'capitals', color: '#fbbf24', radius: 6, sw: 1 },
  { id: 'datacenters', color: '#34d399', radius: 5, sw: 1 },
  { id: 'reactors', color: '#84cc16', radius: 5, sw: 1 },
];

function _pt(lng, lat, name, note, extra) {
  const props = { name, note };
  if (extra) Object.assign(props, extra);
  return { type: 'Feature', geometry: { type: 'Point', coordinates: [lng, lat] }, properties: props };
}
function _emptyGJ() { return { type: 'FeatureCollection', features: [] }; }

function initGlobe() {
  const container = document.getElementById('globe-container');
  globeMap = new maplibregl.Map({
    container,
    style: {
      version: 8,
      sources: {
        satellite: {
          type: 'raster',
          tiles: ['https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}'],
          tileSize: 256, maxzoom: 19,
        },
      },
      layers: [{ id: 'satellite-base', type: 'raster', source: 'satellite' }],
      glyphs: 'https://demotiles.maplibre.org/font/{fontstack}/{range}.pbf',
    },
    center: [40, 20],
    zoom: 1.5,
    maxZoom: 18,
    projection: 'globe',
    attributionControl: false,
  });
  globe = globeMap; // backward compat

  globeMap.on('load', () => {
    _globeReady = true;

    // ─── Create custom icon images ───
    function _makeIcon(size, drawFn) {
      const c = document.createElement('canvas');
      c.width = size; c.height = size;
      const ctx = c.getContext('2d');
      drawFn(ctx, size);
      return ctx.getImageData(0, 0, size, size);
    }
    globeMap.addImage('plane-icon', _makeIcon(32, (ctx) => {
      ctx.fillStyle = '#a3e635';
      ctx.beginPath();
      ctx.moveTo(16, 0); ctx.lineTo(32, 12); ctx.lineTo(20, 11); ctx.lineTo(22, 32); ctx.lineTo(16, 27);
      ctx.lineTo(10, 32); ctx.lineTo(12, 11); ctx.lineTo(0, 12); ctx.closePath();
      ctx.fill();
      ctx.strokeStyle = 'rgba(0,0,0,0.5)'; ctx.lineWidth = 1; ctx.stroke();
    }));
    globeMap.addImage('ship-icon', _makeIcon(28, (ctx) => {
      ctx.fillStyle = '#06b6d4';
      ctx.beginPath();
      ctx.moveTo(14, 0); ctx.lineTo(22, 10); ctx.lineTo(20, 10); ctx.lineTo(20, 24);
      ctx.lineTo(8, 24); ctx.lineTo(8, 10); ctx.lineTo(6, 10); ctx.closePath();
      ctx.fill();
      ctx.strokeStyle = 'rgba(255,255,255,0.4)'; ctx.lineWidth = 1; ctx.stroke();
    }));

    // ─── Country borders ───
    globeMap.addSource('countries', {
      type: 'geojson',
      data: 'https://raw.githubusercontent.com/nvkelso/natural-earth-vector/master/geojson/ne_110m_admin_0_countries.geojson',
    });
    globeMap.addLayer({ id: 'country-fill', type: 'fill', source: 'countries',
      paint: { 'fill-color': 'rgba(30,200,120,0.04)' } });
    globeMap.addLayer({ id: 'country-borders', type: 'line', source: 'countries',
      paint: { 'line-color': 'rgba(30,200,120,0.4)', 'line-width': 0.8 } });
    globeMap.addLayer({ id: 'country-hover', type: 'fill', source: 'countries',
      paint: { 'fill-color': 'rgba(30,200,120,0.18)' }, filter: ['==', 'NAME', ''] });

    // ─── Point sources + layers ───
    _ptLayers.forEach(cfg => {
      globeMap.addSource('src-' + cfg.id, { type: 'geojson', data: _emptyGJ() });
      if (cfg.id === 'aircraft') {
        globeMap.addLayer({
          id: 'lyr-pt-aircraft', type: 'symbol', source: 'src-aircraft',
          layout: {
            'icon-image': 'plane-icon', 'icon-size': 0.65,
            'icon-rotate': ['get', 'heading'], 'icon-rotation-alignment': 'map',
            'icon-allow-overlap': true, 'icon-ignore-placement': true,
          },
          paint: { 'icon-opacity': 0.9 },
        });
      } else if (cfg.id === 'vessels') {
        globeMap.addLayer({
          id: 'lyr-pt-vessels', type: 'symbol', source: 'src-vessels',
          layout: {
            'icon-image': 'ship-icon', 'icon-size': 0.7,
            'icon-rotate': ['get', 'heading'], 'icon-rotation-alignment': 'map',
            'icon-allow-overlap': true, 'icon-ignore-placement': true,
          },
          paint: { 'icon-opacity': 0.95 },
        });
      } else {
        globeMap.addLayer({
          id: 'lyr-pt-' + cfg.id, type: 'circle', source: 'src-' + cfg.id,
          paint: {
            'circle-radius': cfg.radius, 'circle-color': cfg.color,
            'circle-stroke-width': cfg.sw, 'circle-stroke-color': 'rgba(255,255,255,0.3)',
            'circle-opacity': 0.9,
          },
        });
      }
    });

    // ─── New line layer: shipping routes ───
    globeMap.addSource('src-shipping', { type: 'geojson', data: _emptyGJ() });
    globeMap.addLayer({ id: 'lyr-shipping', type: 'line', source: 'src-shipping',
      paint: { 'line-color': '#60a5fa', 'line-width': 2, 'line-opacity': 0.5, 'line-dasharray': [8, 4] } });

    // ─── New point layers for new data ───
    ['industrial', 'ecozones', 'oilfields'].forEach(id => {
      const colors = { industrial: '#f472b6', ecozones: '#c084fc', oilfields: '#d97706' };
      globeMap.addSource('src-' + id, { type: 'geojson', data: _emptyGJ() });
      globeMap.addLayer({
        id: 'lyr-pt-' + id, type: 'circle', source: 'src-' + id,
        paint: {
          'circle-radius': 5, 'circle-color': colors[id],
          'circle-stroke-width': 1, 'circle-stroke-color': 'rgba(255,255,255,0.3)',
          'circle-opacity': 0.9,
        },
      });
    });

    // ─── Line sources + layers ───
    ['conflict-arcs', 'cables', 'pipelines', 'relation-arcs', 'score-arcs'].forEach(id => {
      globeMap.addSource('src-' + id, { type: 'geojson', data: _emptyGJ() });
    });
    globeMap.addLayer({ id: 'lyr-conflict-arcs', type: 'line', source: 'src-conflict-arcs',
      paint: { 'line-color': ['get', 'color'], 'line-width': 2, 'line-opacity': 0.7 },
      layout: { 'line-cap': 'round' } });
    globeMap.addLayer({ id: 'lyr-cables', type: 'line', source: 'src-cables',
      paint: { 'line-color': '#38bdf8', 'line-width': 1.5, 'line-opacity': 0.6, 'line-dasharray': [6, 3] } });
    globeMap.addLayer({ id: 'lyr-pipelines', type: 'line', source: 'src-pipelines',
      paint: { 'line-color': '#fb923c', 'line-width': 2, 'line-opacity': 0.7, 'line-dasharray': [5, 3] } });
    globeMap.addLayer({ id: 'lyr-relation-arcs', type: 'line', source: 'src-relation-arcs',
      paint: { 'line-color': ['get', 'color'], 'line-width': 2, 'line-opacity': 0.8 } });
    globeMap.addLayer({ id: 'lyr-score-arcs', type: 'line', source: 'src-score-arcs',
      paint: { 'line-color': ['get', 'color'], 'line-width': 1.5, 'line-opacity': 0.6 } });

    // ─── Country click ───
    globeMap.on('click', 'country-fill', e => {
      const code = e.features?.[0]?.properties?.ISO_A2;
      if (code && (data.profiles || {})[code]) showCountryProfile(code);
    });
    globeMap.on('mousemove', 'country-fill', e => {
      globeMap.getCanvas().style.cursor = 'pointer';
      if (e.features?.length) {
        globeMap.setFilter('country-hover', ['==', 'NAME', e.features[0].properties.NAME]);
        const props = e.features[0].properties;
        const code = props.ISO_A2 || '';
        const profile = (data.profiles || {})[code];
        const html = `<b style="color:#1ec878">${props.NAME || ''}</b>${profile ? '<br><span style="color:#888">Pop: ' + profile.population + '</span><br><span style="color:#666">Click for profile</span>' : ''}`;
        _globePopup.setLngLat(e.lngLat).setHTML(html).addTo(globeMap);
      }
    });
    globeMap.on('mouseleave', 'country-fill', () => {
      globeMap.getCanvas().style.cursor = '';
      globeMap.setFilter('country-hover', ['==', 'NAME', '']);
      _globePopup.remove();
    });

    // ─── Point hover popup ───
    const allPopupLayers = [
      ..._ptLayers.map(c => ({ layerId: 'lyr-pt-' + c.id, color: c.color })),
      { layerId: 'lyr-pt-industrial', color: '#f472b6' },
      { layerId: 'lyr-pt-ecozones', color: '#c084fc' },
      { layerId: 'lyr-pt-oilfields', color: '#d97706' },
    ];
    allPopupLayers.forEach(({ layerId, color }) => {
      globeMap.on('mouseenter', layerId, e => {
        globeMap.getCanvas().style.cursor = 'pointer';
        const f = e.features[0];
        _globePopup.setLngLat(e.lngLat)
          .setHTML(`<b style="color:${color}">${f.properties.name || ''}</b><br><span style="color:#999">${f.properties.note || ''}</span>`)
          .addTo(globeMap);
      });
      globeMap.on('mouseleave', layerId, () => {
        globeMap.getCanvas().style.cursor = '';
        _globePopup.remove();
      });
    });

    // Build initial data
    refreshGlobePoints();
    refreshGlobeArcs();
  });
}

function refreshGlobePoints() {
  if (!_globeReady) return;
  const lyr = id => document.getElementById(id)?.checked;

  // Build feature arrays per layer
  const feats = {};
  _ptLayers.forEach(c => { feats[c.id] = []; });

  if (lyr('lyr-conflicts')) {
    (data.hotspots || []).forEach(h => feats.hotspots.push(_pt(h.lng, h.lat, h.name, h.note)));
    (data.militias || []).forEach(m => feats.militias.push(_pt(m.lng, m.lat, m.name, m.country + ' · ' + m.type)));
  }
  if (lyr('lyr-bases')) {
    (data.bases || []).forEach(b => feats.bases.push(_pt(b.lng, b.lat, b.name, b.country + ' · ' + b.type)));
  }
  if (lyr('lyr-vessels')) {
    (data.vessels || []).forEach(v => feats.vessels.push(_pt(v.lng, v.lat, v.name,
      v.vessels + ' · Hdg ' + v.heading + '° · ' + v.speed_kts + 'kts',
      { heading: v.heading || 0 })));
  }
  if (lyr('lyr-aircraft') && aircraftData.length) {
    aircraftData.slice(0, 500).forEach(p => {
      const note = [p.origin, p.type_desc || '', p.alt_m + 'm', p.speed_kts + 'kts', 'Hdg ' + (p.heading||0) + '°'].filter(Boolean).join(' · ');
      feats.aircraft.push(_pt(p.lng, p.lat, p.callsign || p.icao, note, { heading: p.heading || 0 }));
    });
  }
  if (lyr('lyr-nukes')) {
    (data.facilities || []).forEach(f => feats.nukes.push(_pt(f.lng, f.lat, f.name, f.type.replace(/_/g, ' ') + ' · ' + f.status)));
  }
  if (lyr('lyr-disasters')) {
    globeDisasters.forEach(d => feats.disasters.push(_pt(d.lng, d.lat, d.title, d.category + (d.magnitude ? ' · Mag ' + d.magnitude : ''))));
  }
  if (lyr('lyr-capitals')) {
    (data.capitals || []).forEach(c => feats.capitals.push(_pt(c.lng, c.lat, c.name, c.country + ' · pop ' + c.pop)));
  }
  if (lyr('lyr-datacenters')) {
    (data.data_centers || []).forEach(d => feats.datacenters.push(_pt(d.lng, d.lat, d.name, d.operator + ' · ' + d.detail)));
  }
  if (lyr('lyr-reactors')) {
    (data.reactors || []).forEach(r => feats.reactors.push(_pt(r.lng, r.lat, r.name, r.capacity_mw + 'MW · ' + r.status)));
  }
  if (lyr('lyr-satellites')) {
    globeSatellites.forEach(s => feats.satellites.push(_pt(s.lng, s.lat, s.name, s.group.toUpperCase() + ' · NORAD ' + s.norad_id + ' · Alt ' + s.alt_km + 'km')));
  }

  // Update each MapLibre source
  _ptLayers.forEach(cfg => {
    const src = globeMap.getSource('src-' + cfg.id);
    if (src) src.setData({ type: 'FeatureCollection', features: feats[cfg.id] || [] });
  });

  // New point layers
  const industrialFeats = [];
  if (lyr('lyr-industrial')) {
    (data.industrial_centers || []).forEach(c => industrialFeats.push(_pt(c.lng, c.lat, c.name, c.type + ' · ' + c.detail)));
  }
  globeMap.getSource('src-industrial')?.setData({ type: 'FeatureCollection', features: industrialFeats });

  const ezFeats = [];
  if (lyr('lyr-ecozones')) {
    (data.economic_zones || []).forEach(z => ezFeats.push(_pt(z.lng, z.lat, z.name, z.type.toUpperCase() + ' · ' + z.detail)));
  }
  globeMap.getSource('src-ecozones')?.setData({ type: 'FeatureCollection', features: ezFeats });

  const oilFeats = [];
  if (lyr('lyr-oilfields')) {
    (data.oil_rare_earth || []).forEach(o => oilFeats.push(_pt(o.lng, o.lat, o.name, o.type.toUpperCase() + (o.reserves ? ' · ' + o.reserves : '') + ' · ' + o.detail)));
  }
  globeMap.getSource('src-oilfields')?.setData({ type: 'FeatureCollection', features: oilFeats });

  updateLayerCount();
}

function _line(startLng, startLat, endLng, endLat, props) {
  return { type: 'Feature', geometry: { type: 'LineString', coordinates: [[startLng, startLat], [endLng, endLat]] }, properties: props };
}

function refreshGlobeArcs() {
  if (!_globeReady) return;
  const lyr = id => document.getElementById(id)?.checked;

  // Conflict arcs
  const conflictFeats = [];
  if (lyr('lyr-conflicts')) {
    (data.conflicts || []).forEach(c => {
      const color = c.intensity >= 5 ? '#dc2626' : c.intensity >= 4 ? '#ea580c' : '#ca8a04';
      conflictFeats.push(_line(c.startLng, c.startLat, c.endLng, c.endLat, { color, name: c.name }));
    });
  }
  globeMap.getSource('src-conflict-arcs')?.setData({ type: 'FeatureCollection', features: conflictFeats });

  // Cables
  const cableFeats = [];
  if (lyr('lyr-cables')) {
    (data.undersea_cables || []).forEach(c => {
      cableFeats.push(_line(c.landing_a.lng, c.landing_a.lat, c.landing_b.lng, c.landing_b.lat, { name: c.name }));
    });
  }
  globeMap.getSource('src-cables')?.setData({ type: 'FeatureCollection', features: cableFeats });

  // Pipelines
  const pipeFeats = [];
  if (lyr('lyr-pipelines')) {
    (data.pipelines || []).forEach(p => {
      pipeFeats.push(_line(p.from_loc.lng, p.from_loc.lat, p.to_loc.lng, p.to_loc.lat, { name: p.name }));
    });
  }
  globeMap.getSource('src-pipelines')?.setData({ type: 'FeatureCollection', features: pipeFeats });

  // Shipping routes
  const shipFeats = [];
  if (lyr('lyr-shipping')) {
    (data.shipping_routes || []).forEach(r => {
      shipFeats.push(_line(r.from_loc.lng, r.from_loc.lat, r.to_loc.lng, r.to_loc.lat, { name: r.name }));
    });
  }
  globeMap.getSource('src-shipping')?.setData({ type: 'FeatureCollection', features: shipFeats });
}

function focusGlobe(lat, lng, alt = 1.5) {
  if (!globeMap) return;
  // Convert globe.gl altitude (1.5 ≈ far, 0.5 ≈ close) to zoom level
  const zoom = Math.max(1, Math.min(12, 4 / alt));
  globeMap.flyTo({ center: [lng, lat], zoom, duration: 800 });
}

// ── Global Trends Panel ─────────────────────────────────
function buildTrendsPanel() {
  const trends = data.trends || {};
  const keys = Object.keys(trends);
  if (!keys.length) return '';
  const rows = keys.map(k => {
    const t = trends[k];
    const vals = t.values || [];
    const latest = vals[vals.length - 1];
    const prev = vals[vals.length - 2];
    const dir = latest > prev ? 'up' : latest < prev ? 'down' : 'stable';
    const dirLabel = t.trend || dir;
    const dirCls = dirLabel.includes('rising') || dirLabel.includes('worsening') || dirLabel.includes('elevated') ? 'up'
      : dirLabel.includes('declining') || dirLabel.includes('recovering') ? 'down' : 'stable';
    return `<div class="trend-row">
      <div class="trend-label">
        <div class="trend-title">${t.title}</div>
        <div class="trend-sub">${t.description || ''}</div>
      </div>
      <canvas class="trend-spark" id="tsp-${k}" width="80" height="28"></canvas>
      <div class="trend-val" style="color:${t.color || 'var(--text-0)'}">${latest}${t.unit === 'countries' || t.unit === 'active' || t.unit === 'total stockpile' || t.unit === 'country programs' || t.unit === '# countries bad/v.bad' ? '' : t.unit === 'million' ? 'M' : t.unit === '$T/yr' ? 'T' : t.unit === 'thousands/yr' ? 'K' : ''}</div>
      <span class="trend-dir ${dirCls}">${dirLabel}</span>
    </div>`;
  }).join('');
  return `<div class="panel" style="grid-column: span 2; max-height: 520px;">
    <div class="panel-head">Global Geopolitical Trends <span class="panel-badge red">${keys.length}</span></div>
    <div class="panel-body">${rows}</div>
  </div>`;
}

function drawTrendSparklines() {
  const trends = data.trends || {};
  Object.keys(trends).forEach(k => {
    const t = trends[k];
    const canvas = document.getElementById(`tsp-${k}`);
    if (!canvas || !t.values) return;
    new Chart(canvas, {
      type: 'line',
      data: {
        labels: t.years || t.values.map((_, i) => i),
        datasets: [{
          data: t.values,
          borderColor: t.color || '#22d3ee',
          backgroundColor: (t.color || '#22d3ee') + '15',
          fill: true, tension: 0.4, pointRadius: 0, borderWidth: 1.5,
        }],
      },
      options: {
        responsive: false, maintainAspectRatio: false,
        plugins: { legend: { display: false }, tooltip: { enabled: false } },
        scales: { x: { display: false }, y: { display: false, beginAtZero: false } },
        animation: { duration: 800 },
      },
    });
  });
}

// ── Polymarket Panel ────────────────────────────────────
function buildPolyPanel() {
  return `<div class="panel" style="grid-column: span 2; max-height: 480px;">
    <div class="panel-head">
      Polymarket — What Traders Think
      <span class="panel-badge green" id="poly-count">loading...</span>
    </div>
    <div class="panel-body" id="poly-panel-body">
      <div class="news-loading">Fetching live prediction market odds...</div>
    </div>
  </div>`;
}

function buildPolyRows() {
  const markets = data.polymarket || [];
  if (markets.length === 0) {
    return '<div class="news-loading">No markets available</div>';
  }
  const badge = document.getElementById('poly-count');
  if (badge) badge.textContent = markets.length;

  return markets.map(m => {
    const pct = Math.round((m.top_price || 0) * 100);
    const color = pct >= 70 ? '#16a34a' : pct >= 40 ? '#ca8a04' : '#dc2626';
    const circumference = 2 * Math.PI * 20;
    const dash = (pct / 100) * circumference;
    const vol24 = formatVolume(m.volume_24h);
    const volTot = formatVolume(m.volume_total);
    const endStr = formatEndDate(m.end_date);
    const outcomeClass = (m.top_outcome || '').toLowerCase() === 'no' ? 'no' : '';
    const url = m.slug ? `https://polymarket.com/event/${m.slug}` : 'https://polymarket.com';
    const safeQ = escapeHtml(m.question);
    return `<a class="poly-row" href="${url}" target="_blank" rel="noopener noreferrer">
      <div class="poly-gauge">
        <svg class="poly-gauge-svg" viewBox="0 0 48 48">
          <circle class="poly-gauge-bg" cx="24" cy="24" r="20"/>
          <circle class="poly-gauge-fg" cx="24" cy="24" r="20"
            stroke="${color}" stroke-dasharray="${dash} ${circumference}"/>
        </svg>
        <div class="poly-gauge-text" style="color:${color}">${pct}%</div>
      </div>
      <div class="poly-info">
        <div class="poly-question">${safeQ}</div>
        <div class="poly-meta">
          <span><span class="poly-meta-label">24h:</span> <span class="poly-meta-value">$${vol24}</span></span>
          <span><span class="poly-meta-label">vol:</span> <span class="poly-meta-value">$${volTot}</span></span>
          ${endStr ? `<span><span class="poly-meta-label">ends:</span> <span class="poly-meta-value">${endStr}</span></span>` : ''}
        </div>
      </div>
      <span class="poly-outcome ${outcomeClass}">${m.top_outcome || 'Yes'}</span>
    </a>`;
  }).join('');
}

function escapeHtml(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

function formatVolume(v) {
  if (!v || v < 1) return '0';
  if (v >= 1e9) return (v / 1e9).toFixed(1) + 'B';
  if (v >= 1e6) return (v / 1e6).toFixed(1) + 'M';
  if (v >= 1e3) return (v / 1e3).toFixed(1) + 'K';
  return Math.round(v).toString();
}

function formatEndDate(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  if (isNaN(d)) return '';
  const diffMs = d.getTime() - Date.now();
  if (diffMs < 0) return 'ended';
  const days = Math.floor(diffMs / 86400000);
  if (days === 0) return 'today';
  if (days === 1) return '1d';
  if (days < 30) return days + 'd';
  const months = Math.floor(days / 30);
  if (months < 12) return months + 'mo';
  return Math.floor(days / 365) + 'y';
}

function formatNewsTime(pubDate) {
  if (!pubDate) return '';
  const d = new Date(pubDate);
  if (isNaN(d)) return '';
  const diffMs = Date.now() - d.getTime();
  const mins = Math.floor(diffMs / 60000);
  if (mins < 1) return 'just now';
  if (mins < 60) return mins + 'm ago';
  const hrs = Math.floor(mins / 60);
  if (hrs < 24) return hrs + 'h ago';
  const days = Math.floor(hrs / 24);
  if (days < 7) return days + 'd ago';
  return d.toLocaleDateString();
}

// ── Country Relations ───────────────────────────────────
function initRelations() {
  const sel = document.getElementById('country-select');
  const overlay = document.getElementById('relations-overlay');
  const closeBtn = document.getElementById('relations-close');

  // Populate dropdown
  if (data.relations) {
    Object.keys(data.relations).sort().forEach(code => {
      const c = data.relations[code];
      const opt = document.createElement('option');
      opt.value = code;
      opt.textContent = `${countryFlag(code)} ${c.name}`;
      sel.appendChild(opt);
    });
  }

  sel.addEventListener('change', () => {
    if (sel.value) showRelations(sel.value);
    else clearRelations();
  });

  closeBtn.addEventListener('click', () => {
    overlay.classList.remove('open');
    clearRelations();
    sel.value = '';
  });

  // Also allow clicking on the globe to open relations (via header button)
  document.getElementById('relations-title').addEventListener('click', () => {
    overlay.classList.toggle('open');
  });
}

function showRelations(code) {
  const overlay = document.getElementById('relations-overlay');
  const list = document.getElementById('relations-list');
  const title = document.getElementById('relations-title');
  const c = data.relations[code];
  if (!c) return;

  overlay.classList.add('open');
  title.textContent = `${countryFlag(code)} ${c.name}`;

  // Build relation rows
  list.innerHTML = c.relations.map(r => `
    <div class="rel-row" data-lat="${r.lat}" data-lng="${r.lng}">
      <span class="rel-flag">${countryFlag(r.target)}</span>
      <div class="rel-info">
        <div class="rel-name">${escapeHtml(r.name)}</div>
        <div class="rel-detail">${escapeHtml(r.detail)}</div>
      </div>
      <span class="rel-type ${escapeHtml(r.type)}">${escapeHtml(r.type)}</span>
    </div>
  `).join('');

  // Click on a relation row to focus globe there
  list.querySelectorAll('.rel-row').forEach(el => {
    el.addEventListener('click', () => focusGlobe(parseFloat(el.dataset.lat), parseFloat(el.dataset.lng), 1.8));
  });

  // Draw arcs on globe
  drawRelationArcs(code);

  // Focus globe on the selected country
  focusGlobe(c.lat, c.lng, 1.8);
}

function drawRelationArcs(code) {
  if (!globeMap || !_globeReady) return;
  const c = data.relations[code];
  if (!c) return;

  // Merge conflict arcs + relation arcs
  const relArcs = c.relations.map(r => ({
    startLat: c.lat, startLng: c.lng,
    endLat: r.lat, endLng: r.lng,
    _relType: r.type,
    _relName: r.name,
    _relDetail: r.detail,
  }));

  relationArcs = relArcs;
  // Build GeoJSON for relation arcs
  const features = relationArcs.map(a =>
    _line(a.startLng, a.startLat, a.endLng, a.endLat, {
      _relType: a._relType, _relName: a._relName, _relDetail: a._relDetail
    })
  );
  const src = globeMap.getSource('src-relation-arcs');
  if (src) src.setData({ type: 'FeatureCollection', features });
  // Also refresh conflict arcs
  refreshGlobeArcs();
}

function clearRelations() {
  if (!globeMap || !_globeReady) return;
  relationArcs = [];
  const src = globeMap.getSource('src-relation-arcs');
  if (src) src.setData(_emptyGJ());
  refreshGlobeArcs();
}

// ── Country Profiles ────────────────────────────────────
function buildCountryBrowserPanel() {
  const profiles = data.profiles || {};
  const codes = Object.keys(profiles).sort((a, b) => profiles[a].name.localeCompare(profiles[b].name));
  const cards = codes.map(code => {
    const p = profiles[code];
    return `<div class="cb-card" data-code="${code}">
      <span class="cb-card-flag">${countryFlag(code)}</span>
      <div class="cb-card-info">
        <div class="cb-card-name">${p.name}</div>
        <div class="cb-card-meta">${p.population} &middot; ${p.gdp}</div>
      </div>
    </div>`;
  }).join('');
  return `<div class="panel" style="grid-column: span 2; max-height: 420px;">
    <div class="panel-head">Country Profiles <span class="panel-badge green">${codes.length}</span></div>
    <div class="panel-body"><div class="cb-grid">${cards}</div></div>
  </div>`;
}

function bindCountryBrowserClicks() {
  document.querySelectorAll('.cb-card').forEach(el => {
    el.addEventListener('click', () => showCountryProfile(el.dataset.code));
  });
}

function initCountryModal() {
  const modal = document.getElementById('country-modal');
  modal.addEventListener('click', e => {
    if (e.target === modal) closeCountryProfile();
  });
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape' && modal.classList.contains('open')) closeCountryProfile();
  });
  // Heatmap clear button
  const clearBtn = document.getElementById('heatmap-clear');
  if (clearBtn) clearBtn.addEventListener('click', clearRelationHeatmap);
}

function scoreColor(score) {
  // 0 = red, 50 = yellow, 100 = green
  if (score >= 75) return '#16a34a';
  if (score >= 60) return '#65a30d';
  if (score >= 45) return '#ca8a04';
  if (score >= 30) return '#ea580c';
  return '#dc2626';
}

function scoreLabel(score) {
  if (score >= 85) return 'ally';
  if (score >= 65) return 'partner';
  if (score >= 45) return 'neutral';
  if (score >= 25) return 'tension';
  return 'adversary';
}

function showCountryProfile(code) {
  const p = (data.profiles || {})[code];
  if (!p) return;
  const dialog = document.getElementById('cm-dialog');
  const modal = document.getElementById('country-modal');

  // Build sections
  const leaders = (p.leaders || []).map(l =>
    `<div class="cm-leader">
      <div class="cm-leader-role">${escapeHtml(l.role)}</div>
      <div class="cm-leader-name">${escapeHtml(l.name)}</div>
    </div>`).join('');

  const memberships = (p.memberships || []).map(m =>
    `<span class="cm-membership">${escapeHtml(m)}</span>`).join('');

  const POLICY_LABELS = {
    abortion: 'Abortion',
    lgbtq_rights: 'LGBTQ+ Rights',
    death_penalty: 'Death Penalty',
    gun_control: 'Gun Control',
    healthcare: 'Healthcare',
    climate: 'Climate Policy',
    immigration: 'Immigration',
    nuclear_stance: 'Nuclear Stance',
  };
  const policies = Object.entries(p.policies || {}).map(([key, v]) => {
    const label = POLICY_LABELS[key] || key.replace(/_/g, ' ');
    const statusClass = (v.status || '').toLowerCase().split('-')[0];
    return `<div class="cm-policy">
      <div class="cm-policy-head">
        <span class="cm-policy-name">${escapeHtml(label)}</span>
        <span class="cm-policy-status ${escapeHtml(statusClass)}">${escapeHtml(v.status)}</span>
      </div>
      <div class="cm-policy-detail">${escapeHtml(v.detail)}</div>
    </div>`;
  }).join('');

  // Geopolitical indices
  const idx = (data.indices || {})[code];
  let indicesHtml = '';
  if (idx) {
    const idxItems = [
      { key: 'democracy_index', label: 'Democracy', max: 10, fmt: v => v.toFixed(1), colorFn: v => v >= 8 ? '#16a34a' : v >= 6 ? '#65a30d' : v >= 4 ? '#ca8a04' : '#dc2626' },
      { key: 'corruption_cpi', label: 'Anti-Corruption', max: 100, fmt: v => v, colorFn: v => v >= 60 ? '#16a34a' : v >= 40 ? '#ca8a04' : '#dc2626' },
      { key: 'press_freedom', label: 'Press Freedom', max: 100, fmt: v => v.toFixed(0), colorFn: v => v <= 25 ? '#16a34a' : v <= 45 ? '#ca8a04' : '#dc2626', invert: true },
      { key: 'hdi', label: 'HDI', max: 1, fmt: v => v.toFixed(3), colorFn: v => v >= 0.8 ? '#16a34a' : v >= 0.6 ? '#ca8a04' : '#dc2626' },
      { key: 'military_spend_pct', label: 'Mil. Spend', max: 10, fmt: v => v.toFixed(1) + '%', colorFn: v => v >= 5 ? '#dc2626' : v >= 2 ? '#ca8a04' : '#16a34a' },
      { key: 'gdp_growth', label: 'GDP Growth', max: 10, fmt: v => (v >= 0 ? '+' : '') + v.toFixed(1) + '%', colorFn: v => v >= 3 ? '#16a34a' : v >= 0 ? '#ca8a04' : '#dc2626' },
      { key: 'fragile_state', label: 'Fragility', max: 120, fmt: v => v.toFixed(0), colorFn: v => v <= 40 ? '#16a34a' : v <= 70 ? '#ca8a04' : '#dc2626', invert: true },
    ];
    const cards = idxItems.filter(it => idx[it.key] !== undefined).map(it => {
      const v = idx[it.key];
      const color = it.colorFn(v);
      const pct = it.invert ? ((it.max - v) / it.max) * 100 : (v / it.max) * 100;
      return `<div class="cm-idx-card">
        <div class="cm-idx-val" style="color:${color}">${it.fmt(v)}</div>
        <div class="cm-idx-label">${it.label}</div>
        <div class="cm-idx-bar"><div class="cm-idx-bar-fill" style="width:${Math.max(0, Math.min(100, pct))}%;background:${color}"></div></div>
      </div>`;
    }).join('');
    indicesHtml = `<div class="cm-section">
      <div class="cm-section-title">Geopolitical Indices</div>
      <div class="cm-indices-grid">${cards}</div>
    </div>`;
  }

  // Relations sorted by score desc
  const scores = p.relation_scores || {};
  const sortedCodes = Object.keys(scores).sort((a, b) => scores[b] - scores[a]);
  const relations = sortedCodes.map(rc => {
    const score = scores[rc];
    const color = scoreColor(score);
    const otherName = (data.profiles && data.profiles[rc] && data.profiles[rc].name)
      || (COUNTRY_COORDS[rc] && COUNTRY_COORDS[rc].name)
      || rc;
    return `<div class="cm-rel" data-code="${escapeHtml(rc)}">
      <span class="cm-rel-flag">${countryFlag(rc)}</span>
      <span class="cm-rel-name">${escapeHtml(otherName)}</span>
      <div class="cm-rel-bar"><div class="cm-rel-bar-fill" style="width:${score}%;background:${color}"></div></div>
      <span class="cm-rel-score" style="color:${color}">${score}</span>
    </div>`;
  }).join('');

  dialog.innerHTML = `
    <div class="cm-header">
      <span class="cm-flag">${countryFlag(code)}</span>
      <div class="cm-title-block">
        <div class="cm-title">${escapeHtml(p.name)}</div>
        <div class="cm-subtitle">${escapeHtml(p.govt)}</div>
      </div>
      <button class="cm-close" onclick="closeCountryProfile()">&times;</button>
    </div>
    <div class="cm-stats">
      <div class="cm-stat"><div class="cm-stat-label">Capital</div><div class="cm-stat-value">${escapeHtml(p.capital)}</div></div>
      <div class="cm-stat"><div class="cm-stat-label">Population</div><div class="cm-stat-value">${escapeHtml(p.population)}</div></div>
      <div class="cm-stat"><div class="cm-stat-label">GDP</div><div class="cm-stat-value">${escapeHtml(p.gdp)}</div></div>
      <div class="cm-stat"><div class="cm-stat-label">Military Rank</div><div class="cm-stat-value">#${escapeHtml(String(p.military_rank))}</div></div>
    </div>
    ${indicesHtml}
    <div class="cm-section">
      <div class="cm-section-title">Leadership</div>
      <div class="cm-leaders">${leaders}</div>
    </div>
    <div class="cm-section">
      <div class="cm-section-title">International Memberships</div>
      <div class="cm-memberships">${memberships}</div>
    </div>
    <div class="cm-section">
      <div class="cm-section-title">Policies on Major Issues</div>
      <div class="cm-policies">${policies}</div>
    </div>
    <div class="cm-section">
      <div class="cm-section-title">Foreign Relations (green=ally, red=adversary)</div>
      <div class="cm-relations-list">${relations}</div>
    </div>
  `;

  // Click a relation row to jump to that country
  dialog.querySelectorAll('.cm-rel').forEach(el => {
    el.addEventListener('click', () => {
      const target = el.dataset.code;
      if (data.profiles && data.profiles[target]) {
        showCountryProfile(target);
      }
    });
  });

  modal.classList.add('open');

  // Paint the globe with this country's relation scores
  drawRelationHeatmap(code);
  focusGlobe(p.lat, p.lng, 2.2);
}

function closeCountryProfile() {
  document.getElementById('country-modal').classList.remove('open');
  // Keep heatmap visible on the globe so user can see relations.
  // User can click "Clear" in the heatmap indicator to remove.
}

function drawRelationHeatmap(code) {
  if (!globeMap || !_globeReady) return;
  const p = (data.profiles || {})[code];
  if (!p) return;

  // Update the heatmap indicator on the map
  const ind = document.getElementById('heatmap-indicator');
  if (ind) {
    ind.classList.add('active');
    document.getElementById('heatmap-flag').textContent = countryFlag(code);
    document.getElementById('heatmap-country').textContent = p.name;
  }

  // Build score points as GeoJSON features for the score-arcs layer
  const scoreSet = p.relation_scores || {};
  const scoreFeatures = [];

  // Center marker (the selected country itself) — bright cyan
  scoreFeatures.push(_pt(p.lng, p.lat, p.name, 'Selected country'));

  // All countries that have a relation score from this one
  Object.entries(scoreSet).forEach(([rc, score]) => {
    const target = (data.profiles || {})[rc];
    let lat, lng, name;
    if (target) {
      lat = target.lat; lng = target.lng; name = target.name;
    } else {
      const fb = COUNTRY_COORDS[rc];
      if (!fb) return;
      lat = fb.lat; lng = fb.lng; name = fb.name;
    }
    scoreFeatures.push(_pt(lng, lat, name, `Score: ${score}`));
  });

  // Update score-points source (reuse existing or add to an existing layer)
  const src = globeMap.getSource('src-score-arcs');

  // Draw arcs from the center country to every scored country
  const arcFeatures = Object.entries(scoreSet).map(([rc, score]) => {
    const target = (data.profiles || {})[rc] || COUNTRY_COORDS[rc];
    if (!target) return null;
    return _line(p.lng, p.lat, target.lng, target.lat, {
      _scoreArc: true, _score: score, _relName: target.name || rc
    });
  }).filter(Boolean);

  if (src) src.setData({ type: 'FeatureCollection', features: arcFeatures });

  // Refresh normal points so score points overlay on map
  refreshGlobePoints();
}

function clearRelationHeatmap() {
  if (!globeMap || !_globeReady) return;
  const src = globeMap.getSource('src-score-arcs');
  if (src) src.setData(_emptyGJ());
  refreshGlobePoints();
  refreshGlobeArcs();
  const ind = document.getElementById('heatmap-indicator');
  if (ind) ind.classList.remove('active');
}
